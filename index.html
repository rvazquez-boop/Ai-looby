        :root {

            --dark: #1A0A0E; --brown: #3E1C11; --rose: #C7959B; --green: #2A5A3A;

        body { font-family:'Inter',sans-serif; background:var(--dark); color:var(--cream); overflow-x:hidden; }

        .loading-screen .bell { font-size:4rem; margin-bottom:20px; animation:bounce 1s infinite; }
        .loading-screen h2 { font-family:'Playfair Display',serif; color:var(--gold); font-size:2rem; }
        .loading-screen p { color:var(--rose); margin-top:10px; font-size:0.85rem; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

        /* LOGIN */
        .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--burgundy),var(--dark)); padding:20px; }
        .login-card { background:rgba(26,10,14,0.9); border:2px solid var(--gold); border-radius:16px; padding:40px; max-width:420px; width:100%; text-align:center; position:relative; }
        .login-card .bell { font-size:3.5rem; margin-bottom:10px; }
        .login-card h1 { font-family:'Playfair Display',serif; color:var(--gold); font-size:2.2rem; margin-bottom:5px; }
        .login-card h3 { color:var(--rose); font-weight:400; font-size:0.9rem; margin-bottom:30px; font-style:italic; }
        .login-card input { width:100%; padding:14px; border:1px solid var(--gold); border-radius:8px; background:rgba(255,255,255,0.05); color:var(--cream); font-size:1rem; margin-bottom:15px; outline:none; }
        .login-card input:focus { border-color:var(--wine); box-shadow:0 0 10px rgba(155,35,53,0.3); }
        .login-card .login-btn { width:100%; padding:14px; background:var(--wine); color:var(--cream); border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.3s; }
        .login-card .login-btn:hover { background:var(--burgundy); transform:translateY(-2px); }
        .login-error { color:#ff6b6b; font-size:0.85rem; margin-bottom:10px; }
        .lang-toggle { position:absolute; top:15px; right:15px; background:none; border:1px solid var(--gold); color:var(--gold); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:0.8rem; }

        /* LOBBY */
        .lobby-header { background:linear-gradient(135deg,var(--burgundy),var(--dark)); padding:20px 30px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--gold); flex-wrap:wrap; gap:10px; }
        .lobby-title h1 { font-family:'Playfair Display',serif; color:var(--gold); font-size:1.8rem; }
        .lobby-title p { color:var(--rose); font-size:0.8rem; font-style:italic; }
        .lobby-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .user-badge { display:flex; align-items:center; gap:8px; }
        .avatar { width:36px; height:36px; border-radius:50%; background:var(--wine); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.8rem; border:2px solid var(--gold); }
        .role-tag { background:var(--gold); color:var(--dark); padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600; text-transform:uppercase; }
        .btn { padding:8px 16px; border:none; border-radius:8px; cursor:pointer; font-size:0.85rem; font-weight:600; transition:all 0.3s; }
        .btn-gold { background:var(--gold); color:var(--dark); }
        .btn-wine { background:var(--wine); color:var(--cream); }
        .btn-outline { background:none; border:1px solid var(--gold); color:var(--gold); }
        .btn:hover { transform:translateY(-2px); opacity:0.9; }

        /* FLOOR TABS */
        .floor-tabs { display:flex; justify-content:center; gap:10px; padding:20px; background:rgba(90,26,42,0.3); flex-wrap:wrap; }
        .floor-tab { padding:12px 24px; border:2px solid transparent; border-radius:10px; background:rgba(255,255,255,0.05); color:var(--rose); cursor:pointer; font-weight:600; transition:all 0.3s; }
        .floor-tab.active { border-color:var(--gold); color:var(--gold); background:rgba(212,168,67,0.1); }
        .floor-tab:hover { border-color:var(--rose); }

        /* ROOM GRID */
        .room-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; padding:30px; max-width:1200px; margin:0 auto; }
        .room-card { border-radius:12px; overflow:hidden; border:2px solid rgba(212,168,67,0.2); background:rgba(26,10,14,0.8); cursor:pointer; transition:all 0.3s; }
        .room-card:hover { transform:translateY(-5px); border-color:var(--gold); box-shadow:0 8px 30px rgba(212,168,67,0.2); }
        .room-img { height:160px; background-size:cover; background-position:center; position:relative; }
        .room-badge { position:absolute; top:10px; right:10px; background:var(--wine); color:var(--cream); padding:4px 10px; border-radius:6px; font-size:0.7rem; font-weight:600; text-transform:uppercase; }
        .room-info { padding:15px; }
        .room-number { color:var(--gold); font-size:0.75rem; font-weight:700; }
        .room-name { font-family:'Playfair Display',serif; font-size:1.1rem; margin-top:4px; }
        .empty-floor { text-align:center; padding:60px; color:var(--rose); }
        .empty-floor .icon { font-size:3rem; margin-bottom:15px; }

        /* EXPANDED ROOM MODAL */
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; }
        .modal-card { background:var(--dark); border:2px solid var(--gold); border-radius:16px; max-width:550px; width:100%; max-height:90vh; overflow-y:auto; }
        .modal-img { height:200px; background-size:cover; background-position:center; border-radius:14px 14px 0 0; position:relative; }
        .modal-close { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); color:var(--cream); border:none; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:1.2rem; }
        .modal-body { padding:25px; }
        .modal-body h2 { font-family:'Playfair Display',serif; color:var(--gold); font-size:1.5rem; margin-bottom:10px; }
        .modal-body .desc { color:var(--rose); margin-bottom:15px; line-height:1.5; }
        .meta-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
        .meta-chip { background:rgba(212,168,67,0.1); border:1px solid var(--gold); padding:4px 10px; border-radius:6px; font-size:0.75rem; color:var(--gold); }
        .access-badge { display:inline-block; padding:4px 12px; border-radius:6px; font-size:0.8rem; font-weight:600; margin-bottom:15px; }
        .access-full { background:var(--green); color:white; }
        .access-view { background:var(--gold); color:var(--dark); }
        .access-no { background:#666; color:#ccc; }
        .enter-btn { display:block; width:100%; padding:14px; background:var(--wine); color:var(--cream); border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; text-align:center; text-decoration:none; }
        .enter-btn:hover { background:var(--burgundy); }

        /* BACK OFFICE */
        .bo-wrap { display:flex; min-height:100vh; }
        .bo-sidebar { width:220px; background:linear-gradient(180deg,var(--burgundy),var(--dark)); padding:20px; border-right:2px solid var(--gold); }
        .bo-sidebar h2 { font-family:'Playfair Display',serif; color:var(--gold); font-size:1.3rem; margin-bottom:20px; }
        .bo-nav-item { padding:12px; border-radius:8px; color:var(--rose); cursor:pointer; margin-bottom:5px; transition:all 0.2s; font-size:0.9rem; }
        .bo-nav-item.active { background:rgba(212,168,67,0.15); color:var(--gold); border-left:3px solid var(--gold); }
        .bo-nav-item:hover { background:rgba(255,255,255,0.05); }
        .bo-content { flex:1; padding:30px; overflow-y:auto; }
        .bo-content h3 { font-family:'Playfair Display',serif; color:var(--gold); font-size:1.4rem; margin-bottom:20px; }

        /* UPLOAD */
        .upload-steps { display:flex; gap:10px; margin-bottom:25px; }
        .step-indicator { padding:8px 16px; border-radius:20px; font-size:0.8rem; font-weight:600; }
        .step-active { background:var(--gold); color:var(--dark); }
        .step-inactive { background:rgba(255,255,255,0.1); color:var(--rose); }
        .dropzone { border:3px dashed var(--gold); border-radius:12px; padding:60px; text-align:center; cursor:pointer; transition:all 0.3s; }
        .dropzone:hover,.dropzone.dragging { background:rgba(212,168,67,0.1); border-color:var(--wine); }
        .dropzone .icon { font-size:3rem; margin-bottom:10px; }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; color:var(--gold); font-weight:600; margin-bottom:5px; font-size:0.85rem; }
        .form-group input,.form-group select,.form-group textarea { width:100%; padding:10px; border:1px solid rgba(212,168,67,0.3); border-radius:8px; background:rgba(255,255,255,0.05); color:var(--cream); font-size:0.9rem; outline:none; }
        .form-group textarea { height:100px; resize:vertical; }
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--gold); }
        .checkbox-group { display:flex; gap:15px; flex-wrap:wrap; }
        .checkbox-group label { display:flex; align-items:center; gap:5px; color:var(--cream); font-size:0.85rem; cursor:pointer; }

        /* TABLES */
        .bo-table { width:100%; border-collapse:collapse; }
        .bo-table th { text-align:left; padding:12px; color:var(--gold); border-bottom:2px solid var(--gold); font-size:0.85rem; }
        .bo-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.85rem; }
        .bo-table tr:hover { background:rgba(212,168,67,0.05); }
        .del-btn { background:none; border:1px solid #ff6b6b; color:#ff6b6b; padding:4px 10px; border-radius:6px; cursor:pointer; font-size:0.75rem; }
        .del-btn:hover { background:#ff6b6b; color:white; }
        .add-form { display:flex; gap:10px; margin-top:15px; flex-wrap:wrap; align-items:flex-end; }
        .add-form input,.add-form select { padding:8px; border:1px solid rgba(212,168,67,0.3); border-radius:6px; background:rgba(255,255,255,0.05); color:var(--cream); font-size:0.85rem; outline:none; }

        /* CELEBRATION */
        .celebration { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:2000; }
        .celebration-card { text-align:center; animation:popIn 0.5s ease; }
        .celebration-card .emoji { font-size:5rem; animation:bounce 0.8s infinite; }
        .celebration-card .phrase { font-family:'Playfair Display',serif; color:var(--gold); font-size:1.5rem; margin-top:15px; max-width:350px; }
        @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }

        /* TOAST */
        .toast { position:fixed; bottom:20px; right:20px; background:var(--gold); color:var(--dark); padding:12px 20px; border-radius:8px; font-weight:600; z-index:3000; animation:slideIn 0.3s ease; }
        @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

        /* CONFIRM DIALOG */
        .confirm-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:2500; }
        .confirm-card { background:var(--dark); border:2px solid var(--wine); border-radius:12px; padding:30px; text-align:center; max-width:350px; }
        .confirm-card .emoji { font-size:2.5rem; margin-bottom:10px; }
        .confirm-card h4 { color:var(--cream); margin-bottom:10px; }
        .confirm-card p { color:var(--rose); font-size:0.85rem; margin-bottom:20px; }
        .confirm-btns { display:flex; gap:10px; justify-content:center; }

        /* DISCREPANCY */
        .disc-card { background:rgba(155,35,53,0.1); border:1px solid var(--wine); border-radius:8px; padding:15px; margin-bottom:10px; }
        .disc-card h4 { color:var(--gold); margin-bottom:5px; }
        .disc-card p { color:var(--rose); font-size:0.85rem; }

        @media(max-width:768px) {
            .bo-wrap { flex-direction:column; }
            .bo-sidebar { width:100%; border-right:none; border-bottom:2px solid var(--gold); }
            .lobby-header { flex-direction:column; text-align:center; }
            .room-grid { grid-template-columns:1fr; padding:15px; }
        }
    </style>
</head>

                'https://images.unsplash.com/photo-1496065187959-7f07b8353c55?w=600&h=300&fit=crop',
            ],
            strategy: [
                'https://images.unsplash.com/photo-1517502884422-41eaead166d4?w=600&h=300&fit=crop',
                'https://images.unsplash.com/photo-1552664730-d307ca884978?w=600&h=300&fit=crop',
                'https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&h=300&fit=crop',
                'https://images.unsplash.com/photo-1497215842964-222b430dc094?w=600&h=300&fit=crop',
                'https://images.unsplash.com/photo-1577412647305-991150c7d163?w=600&h=300&fit=crop',
            ],
        };

        function getImg(p, sec) {
            var imgs = hotelImages[sec] || hotelImages.tools;
            var seed = (p.name||'').split('').reduce(function(a,c){return a+c.charCodeAt(0)},0) + (p.id||0);
            return imgs[seed % imgs.length];
        }

        function analyzeCode(content) {
            if (!content) return 1;
            var s = 0, lines = content.split('\n').length;
            s += Math.min(lines/10, 30);
            s += ((content.match(/function\s|=>\s*\{|\.prototype\./g)||[]).length) * 2;
            s += Math.min((content.match(/<[a-zA-Z][^>]*>/g)||[]).length / 5, 15);
            s += Math.min((content.match(/\{[^}]*:[^}]*\}/g)||[]).length, 10);
            s += ((content.match(/import\s|require\(/g)||[]).length) * 1.5;
            s += ((content.match(/if\s*\(|switch\s*\(/g)||[]).length) * 1.5;
            s += ((content.match(/for\s*\(|while\s*\(|\.map\(|\.forEach\(|\.filter\(|\.reduce\(/g)||[]).length) * 2;
            s += ((content.match(/use[A-Z]\w*\(/g)||[]).length) * 2;
            s += ((content.match(/fetch\(|axios\.|XMLHttpRequest/g)||[]).length) * 3;
            s += ((content.match(/addEventListener|on[A-Z]\w+\s*=/g)||[]).length) * 1.5;
            s += Math.min(content.length/1000, 20);
            return Math.max(1, Math.ceil(s));
        }

        function calcScores(platforms) {
            if (!platforms.length) return platforms;
            var maxRaw = Math.max.apply(null, platforms.map(function(p){return p.rawScore||1}));
            return platforms.map(function(p){
                return Object.assign({}, p, { score: Math.max(1, Math.round(((p.rawScore||1)/maxRaw)*100)) });
            });
        }

        // ===================== BACK OFFICE =====================
        function BackOfficeScreen({ currentUser, onBack, platforms, setPlatforms, users, setUsers, t, lang, savePlatform, saveUser, deleteUser, deletePlatform }) {
            var [activeTab, setActiveTab] = useState('upload');
            var [uploadStep, setUploadStep] = useState(1);
            var [fileContent, setFileContent] = useState('');
            var [fileName, setFileName] = useState('');
            var [fileSize, setFileSize] = useState('');
            var [formData, setFormData] = useState({ name:'', section:'tools', description:'', url:'', roles:['bellboy'] });
            var [showCeleb, setShowCeleb] = useState(false);
            var [toast, setToast] = useState('');
            var [confirmDel, setConfirmDel] = useState(null);
            var [dragging, setDragging] = useState(false);
            var [newUser, setNewUser] = useState({ name:'', email:'', role:'guest' });

            function showToast(msg) { setToast(msg); setTimeout(function(){ setToast('') }, 3000); }

            // Upload handlers
            function handleFile(file) {
                setFileName(file.name);
                setFileSize((file.size/1024).toFixed(1) + ' KB');
                var reader = new FileReader();
                reader.onload = function(e) { setFileContent(e.target.result); };
                reader.readAsText(file);
            }
            function handleDrop(e) { e.preventDefault(); setDragging(false); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }
            function handleDragOver(e) { e.preventDefault(); setDragging(true); }
            function handleDragLeave() { setDragging(false); }

            function handlePublish() {
                var raw = analyzeCode(fileContent);
                var newP = {
                    id: Date.now(),
                    roomNumber: platforms.length + 1,
                    name: formData.name,
                    section: formData.section,
                    uploadedBy: currentUser.name,
                    uploadedDate: new Date().toLocaleDateString(),
                    description: formData.description,
                    url: formData.url,
                    fileSize: fileSize,
                    rawScore: raw,
                    accessRoles: formData.roles,
                };
                var all = calcScores([].concat(platforms, [newP]));
                setPlatforms(all);
                // Save to Firebase
                savePlatform(all);
                setUploadStep(1);
                setFileContent(''); setFileName(''); setFileSize('');
                setFormData({ name:'', section:'tools', description:'', url:'', roles:['bellboy'] });
                setShowCeleb(true);
                setTimeout(function(){ setShowCeleb(false) }, 6000);
                showToast(t('platformAdded'));
            }

            function handleAddUser() {
                if (!newUser.name || !newUser.email) return;
                var u = {
                    id: Date.now(),
                    name: newUser.name,
                    email: newUser.email,
                    role: newUser.role,
                    avatar: newUser.name.split(' ').map(function(n){return n[0]}).join('').toUpperCase().slice(0,2)
                };
                var updated = [].concat(users, [u]);
                setUsers(updated);
                saveUser(u);
                setNewUser({ name:'', email:'', role:'guest' });
                showToast(t('userAdded'));
            }

            function handleDeleteUser(uid) {
                if (uid === currentUser.id) return;
                var updated = users.filter(function(u){return u.id !== uid});
                setUsers(updated);
                deleteUser(uid);
                setConfirmDel(null);
                showToast(t('userRemoved'));
            }

            function handleDeletePlatform(pid) {
                var updated = platforms.filter(function(p){return p.id !== pid});
                setPlatforms(calcScores(updated));
                deletePlatform(pid);
            }

            // Discrepancies
            var discrepancies = [];
            ['tools','analysis','strategy'].forEach(function(sec) {
                var sp = platforms.filter(function(p){return p.section===sec});
                for(var i=0;i<sp.length;i++) {
                    for(var j=i+1;j<sp.length;j++) {
                        if(Math.abs((sp[i].score||0)-(sp[j].score||0)) > 30) {
                            discrepancies.push({ a:sp[i].name, b:sp[j].name, section:sec, gap:Math.abs((sp[i].score||0)-(sp[j].score||0)) });
                        }
                    }
                }
            });

            var tabs = [
                { key:'upload', label: t('uploadTab') },
                { key:'registry', label: t('registryTab') },
                { key:'scores', label: t('scoresTab') },
                { key:'disc', label: t('discTab') },
            ];

            return (
                <div className="bo-wrap">
                    <div className="bo-sidebar">
                        <h2>{t('backOffice')}</h2>
                        {tabs.map(function(tab){
                            return <div key={tab.key} className={"bo-nav-item"+(activeTab===tab.key?" active":"")} onClick={function(){setActiveTab(tab.key)}}>{tab.label}</div>
                        })}
                        <div style={{marginTop:'30px'}}>
                            <button className="btn btn-outline" style={{width:'100%',marginBottom:'8px'}} onClick={onBack}>{t('backToLobby')}</button>
                            <button className="btn btn-wine" style={{width:'100%'}} onClick={function(){localStorage.removeItem('ailobby_lang');window.location.reload()}}>{t('logout')}</button>
                        </div>
                    </div>
                    <div className="bo-content">
                        {/* UPLOAD TAB */}
                        {activeTab === 'upload' && (
                            <div>
                                <h3>{t('uploadTab')}</h3>
                                <div className="upload-steps">
                                    <span className={"step-indicator "+(uploadStep>=1?"step-active":"step-inactive")}>{t('step1')}</span>
                                    <span className={"step-indicator "+(uploadStep>=2?"step-active":"step-inactive")}>{t('step2')}</span>
                                    <span className={"step-indicator "+(uploadStep>=3?"step-active":"step-inactive")}>{t('step3')}</span>
                                </div>
                                {uploadStep === 1 && (
                                    <div>
                                        <div className={"dropzone"+(dragging?" dragging":"")} onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onClick={function(){document.getElementById('fileInput').click()}}>
                                            <div className="icon">📁</div>
                                            <p style={{color:'var(--gold)',fontWeight:600}}>{t('dropText')}</p>
                                            <p style={{color:'var(--rose)',fontSize:'0.85rem',marginTop:'5px'}}>{t('dropSub')}</p>
                                        </div>
                                        <input id="fileInput" type="file" style={{display:'none'}} onChange={function(e){if(e.target.files[0])handleFile(e.target.files[0])}} />
                                        {fileName && (
                                            <div style={{marginTop:'15px',padding:'10px',background:'rgba(212,168,67,0.1)',borderRadius:'8px'}}>
                                                <span style={{color:'var(--gold)'}}>{t('fileName')}: </span>{fileName}
                                                <span style={{marginLeft:'15px',color:'var(--gold)'}}>{t('fileSize')}: </span>{fileSize}
                                            </div>
                                        )}
                                        {fileName && <button className="btn btn-gold" style={{marginTop:'15px'}} onClick={function(){setUploadStep(2)}}>{t('next')}</button>}
                                    </div>
                                )}
                                {uploadStep === 2 && (
                                    <div>
                                        <div className="form-group">
                                            <label>{t('nameLabel')}</label>
                                            <input value={formData.name} onChange={function(e){setFormData(Object.assign({},formData,{name:e.target.value}))}} />
                                        </div>
                                        <div className="form-group">
                                            <label>{t('sectionLabel')}</label>
                                            <select value={formData.section} onChange={function(e){setFormData(Object.assign({},formData,{section:e.target.value}))}}>
                                                <option value="tools">{t('tools')}</option>
                                                <option value="analysis">{t('analysis')}</option>
                                                <option value="strategy">{t('strategy')}</option>
                                            </select>
                                        </div>
                                        <div className="form-group">
                                            <label>{t('descLabel')}</label>
                                            <textarea value={formData.description} onChange={function(e){setFormData(Object.assign({},formData,{description:e.target.value}))}} />
                                        </div>
                                        <div className="form-group">
                                            <label>{t('urlLabel')}</label>
                                            <input value={formData.url} onChange={function(e){setFormData(Object.assign({},formData,{url:e.target.value}))}} />
                                        </div>
                                        <div className="form-group">
                                            <label>{t('rolesLabel')}</label>
                                            <div className="checkbox-group">
                                                {['bellboy','concierge','guest'].map(function(r){
                                                    return (
                                                        <label key={r}>
                                                            <input type="checkbox" checked={formData.roles.indexOf(r)>-1} onChange={function(){
                                                                var newRoles = formData.roles.indexOf(r)>-1 ? formData.roles.filter(function(x){return x!==r}) : [].concat(formData.roles,[r]);
                                                                setFormData(Object.assign({},formData,{roles:newRoles}));
                                                            }} />
                                                            {r}
                                                        </label>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                        <div style={{display:'flex',gap:'10px'}}>
                                            <button className="btn btn-outline" onClick={function(){setUploadStep(1)}}>{t('back')}</button>
                                            <button className="btn btn-gold" onClick={function(){if(formData.name)setUploadStep(3)}}>{t('next')}</button>
                                        </div>
                                    </div>
                                )}
                                {uploadStep === 3 && (
                                    <div>
                                        <h3 style={{marginBottom:'10px'}}>{t('preview')}</h3>
                                        <div style={{background:'rgba(212,168,67,0.05)',border:'1px solid var(--gold)',borderRadius:'12px',padding:'20px',marginBottom:'20px'}}>
                                            <p><strong style={{color:'var(--gold)'}}>{t('nameLabel')}:</strong> {formData.name}</p>
                                            <p><strong style={{color:'var(--gold)'}}>{t('sectionLabel')}:</strong> {formData.section}</p>
                                            <p><strong style={{color:'var(--gold)'}}>{t('descLabel')}:</strong> {formData.description}</p>
                                            <p><strong style={{color:'var(--gold)'}}>{t('urlLabel')}:</strong> {formData.url}</p>
                                            <p><strong style={{color:'var(--gold)'}}>{t('fileName')}:</strong> {fileName} ({fileSize})</p>
                                        </div>
                                        <div style={{display:'flex',gap:'10px'}}>
                                            <button className="btn btn-outline" onClick={function(){setUploadStep(2)}}>{t('back')}</button>
                                            <button className="btn btn-gold" onClick={handlePublish}>{t('publish')}</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* REGISTRY TAB */}
                        {activeTab === 'registry' && (
                            <div>
                                <h3>{t('registryTab')}</h3>
                                <table className="bo-table">
                                    <thead>
                                        <tr>
                                            <th></th>
                                            <th>{t('name')}</th>
                                            <th>{t('email')}</th>
                                            <th>{t('role')}</th>
                                            {currentUser.role === 'bellboy' && <th>{t('actions')}</th>}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {users.map(function(u){
                                            return (
                                                <tr key={u.id}>
                                                    <td><div className="avatar" style={{width:'30px',height:'30px',fontSize:'0.7rem'}}>{u.avatar}</div></td>
                                                    <td>{u.name}</td>
                                                    <td>{u.email}</td>
                                                    <td><span className="role-tag">{u.role}</span></td>
                                                    {currentUser.role === 'bellboy' && (
                                                        <td>
                                                            {u.id !== currentUser.id && <button className="del-btn" onClick={function(){setConfirmDel(u.id)}}>🗑️</button>}
                                                        </td>
                                                    )}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                                <div className="add-form">
                                    <input placeholder={t('name')} value={newUser.name} onChange={function(e){setNewUser(Object.assign({},newUser,{name:e.target.value}))}} />
                                    <input placeholder={t('email')} value={newUser.email} onChange={function(e){setNewUser(Object.assign({},newUser,{email:e.target.value}))}} />
                                    <select value={newUser.role} onChange={function(e){setNewUser(Object.assign({},newUser,{role:e.target.value}))}}>
                                        <option value="bellboy">Bellboy</option>

                                        <option value="guest">Guest</option>
                                    </select>
                                    <button className="btn btn-gold" onClick={handleAddUser}>{t('addUser')}</button>

                        )}

                        {/* SCORES TAB */}
                        {activeTab === 'scores' && (
                            <div>
                                <h3>{t('scoresTab')}</h3>
                                <table className="bo-table">
                                    <thead>
                                        <tr>
                                            <th>{t('platform')}</th>
                                            <th>{t('section')}</th>
                                            <th>{t('rawScore')}</th>
                                            <th>{t('score')}</th>
                                            <th>{t('by')}</th>
                                            <th>{t('actions')}</th>

                                    <tbody>
                                        {platforms.map(function(p){
                                            return (
                                                <tr key={p.id}>

                                                    <td style={{color:'var(--gold)',fontWeight:'bold'}}>{p.score}</td>
                                                    <td>{p.uploadedBy}</td>

                    {showCeleb && <Celebration lang={lang} />}
                    {toast && <Toast message={toast} />}
                </div>
            );

        // ===================== MAIN APP =====================
        function App() {
            var [lang, setLang] = useState(function(){ return localStorage.getItem('ailobby_lang') || 'en'; });
            var [currentUser, setCurrentUser] = useState(null);
            var [platforms, setPlatforms] = useState([]);
            var [users, setUsers] = useState(initialUsers);
            var [showBackOffice, setShowBackOffice] = useState(false);
            var [firebaseReady, setFirebaseReady] = useState(false);

            function t(key) { return T[lang][key] || T.en[key] || key; }

            // Firebase listeners
            useEffect(function() {
                if (!db) { setFirebaseReady(true); return; }

                var platformsRef = db.ref('platforms');
                platformsRef.on('value', function(snapshot) {
                    var data = snapshot.val();
                    if (data) {
                        setPlatforms(calcScores(Object.values(data)));
                    } else {
                        setPlatforms([]);
                    }
                    setFirebaseReady(true);
                }, function(error) {
                    console.error("Firebase platforms error:", error);
                    setFirebaseReady(true);
                });

                var usersRef = db.ref('users');
                usersRef.on('value', function(snapshot) {
                    var data = snapshot.val();
                    if (data) {
                        var fbUsers = Object.values(data);
                        var merged = [].concat(initialUsers);
                        fbUsers.forEach(function(u) {
                            if (!merged.find(function(m){ return m.email === u.email; })) {
                                merged.push(u);
                            }
                        });
                        setUsers(merged);
                    }
                });

                return function() {
                    platformsRef.off();
                    usersRef.off();
                };
            }, []);

            useEffect(function() { localStorage.setItem('ailobby_lang', lang); }, [lang]);

            // Firebase CRUD helpers
            function savePlatform(allPlatforms) {
                if (!db) return;
                var obj = {};
                allPlatforms.forEach(function(p) { obj[p.id] = p; });
                db.ref('platforms').set(obj);
            }
            function saveUser(user) {
                if (!db) return;
                db.ref('users/' + user.id).set(user);
            }
            function deleteUserFB(uid) {
                if (!db) return;
                db.ref('users/' + uid).remove();
            }
            function deletePlatformFB(pid) {
                if (!db) return;
                db.ref('platforms/' + pid).remove();
            }

            // Loading
            if (!firebaseReady) {
                return (
                    <div className="loading-screen">
                        <div>
                            <div className="bell">🔔</div>
                            <h2>Loading AI Lobby...</h2>
                            <p>Connecting to hotel network</p>
                        </div>
                    </div>
                );
            }

            // Login
            if (!currentUser) {
                return <LoginScreen onLogin={setCurrentUser} t={t} lang={lang} setLang={setLang} users={users} />;
            }

            // Back Office
            if (showBackOffice && accessMatrix[currentUser.role] && accessMatrix[currentUser.role].config) {
                return (
                    <BackOfficeScreen
                        currentUser={currentUser}
                        onBack={function(){setShowBackOffice(false)}}
                        platforms={platforms}
                        setPlatforms={setPlatforms}
                        users={users}
                        setUsers={setUsers}
                        t={t}
                        lang={lang}
                        savePlatform={savePlatform}
                        saveUser={saveUser}
                        deleteUser={deleteUserFB}
                        deletePlatform={deletePlatformFB}
                    />
                );
            }

            // Lobby
            return (
                <LobbyScreen
                    currentUser={currentUser}
                    onLogout={function(){setCurrentUser(null)}}
                    platforms={platforms}
                    onShowBackOffice={function(){setShowBackOffice(true)}}
                    t={t}
                    lang={lang}
                    setLang={setLang}
                />
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
