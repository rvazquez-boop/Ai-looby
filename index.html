<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grand AI Lobby</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1117 50%, #1a0a0a 100%);
      color: #f5e6d3;
      min-height: 100vh;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; display: flex; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Playfair Display', serif; letter-spacing: 1px; }

    .login-screen {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1117 50%, #1a0a0a 100%);
      padding: 20px;
    }

    .login-box {
      background: rgba(139,69,19,0.2);
      border: 2px solid #d4a853;
      border-radius: 8px;
      padding: 50px 40px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .login-box h1 {
      font-size: 2.8em;
      color: #d4a853;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .login-box .subtitle {
      color: #b8956a;
      font-size: 0.95em;
      margin-bottom: 40px;
      font-style: italic;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 20px;
      background: rgba(0,0,0,0.3);
      border: 1px solid #d4a853;
      border-radius: 4px;
      color: #f5e6d3;
      font-size: 1em;
    }

    .login-input::placeholder { color: #8b6f47; }
    .login-input:focus { outline: none; border-color: #ffd700; box-shadow: 0 0 10px rgba(212,168,51,0.3); }

    .login-button {
      width: 100%;
      padding: 14px;
      background: #d4a853;
      color: #1a0a0a;
      border: none;
      border-radius: 4px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .login-button:hover:not(:disabled) { background: #ffd700; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212,168,51,0.4); }
    .login-button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-message { color: #ff6b6b; font-size: 0.9em; margin-bottom: 15px; }

    .main-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: rgba(0,0,0,0.4);
      border-right: 1px solid #d4a853;
      padding: 20px 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 20px;
      border-bottom: 1px solid #d4a853;
      margin-bottom: 10px;
    }

    .sidebar-header h2 {
      font-size: 1.3em;
      color: #d4a853;
      margin-bottom: 5px;
    }

    .user-info {
      font-size: 0.85em;
      color: #b8956a;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 0 10px;
    }

    .nav-item {
      padding: 12px 16px;
      background: transparent;
      border: none;
      border-left: 3px solid transparent;
      color: #f5e6d3;
      cursor: pointer;
      font-size: 0.95em;
      transition: all 0.2s;
      text-align: left;
    }

    .nav-item:hover { background: rgba(212,168,51,0.1); color: #d4a853; }
    .nav-item.active { border-left-color: #d4a853; background: rgba(212,168,51,0.15); color: #ffd700; font-weight: bold; }

    .sidebar-footer {
      padding: 15px 20px;
      border-top: 1px solid #d4a853;
      margin-top: auto;
      display: flex;
      gap: 8px;
    }

    .lang-toggle {
      flex: 1;
      padding: 8px;
      background: #d4a853;
      color: #1a0a0a;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9em;
      transition: all 0.2s;
    }

    .lang-toggle:hover { background: #ffd700; }

    .logout-button {
      flex: 1;
      padding: 8px;
      background: #8b4545;
      color: #f5e6d3;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9em;
      transition: all 0.2s;
    }

    .logout-button:hover { background: #a94545; }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: rgba(139,69,19,0.15);
      border-bottom: 2px solid #d4a853;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 1.8em;
      color: #d4a853;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-left: 20px;
    }

    .tab {
      padding: 8px 16px;
      background: transparent;
      border: 2px solid transparent;
      color: #f5e6d3;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95em;
      transition: all 0.2s;
      border-radius: 4px;
    }

    .tab:hover { border-color: #d4a853; color: #d4a853; }
    .tab.active { border-color: #d4a853; background: rgba(212,168,51,0.2); color: #ffd700; }

    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }

    .platform-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .platform-card {
      background: rgba(139,69,19,0.15);
      border: 2px solid #d4a853;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .platform-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(212,168,51,0.2);
      border-color: #ffd700;
    }

    .platform-card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: rgba(0,0,0,0.3);
    }

    .platform-card-content {
      padding: 20px;
    }

    .platform-card-content h3 {
      color: #d4a853;
      margin-bottom: 8px;
      font-size: 1.3em;
    }

    .platform-card-content p {
      color: #b8956a;
      font-size: 0.9em;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    .platform-card-footer {
      display: flex;
      gap: 10px;
    }

    .card-button {
      flex: 1;
      padding: 10px;
      background: #d4a853;
      color: #1a0a0a;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9em;
      transition: all 0.2s;
    }

    .card-button:hover { background: #ffd700; }

    .room-view {
      max-width: 900px;
      margin: 0 auto;
    }

    .room-header {
      background: rgba(139,69,19,0.2);
      border: 2px solid #d4a853;
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 25px;
    }

    .room-header h1 {
      color: #d4a853;
      font-size: 2.2em;
      margin-bottom: 15px;
    }

    .room-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .detail-item {
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 4px;
      border-left: 3px solid #d4a853;
    }

    .detail-item label {
      color: #b8956a;
      font-size: 0.85em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 5px;
    }

    .detail-item-value {
      color: #f5e6d3;
      font-size: 1em;
      font-weight: bold;
    }

    .url-link {
      color: #d4a853;
      text-decoration: none;
      word-break: break-all;
    }

    .url-link:hover { text-decoration: underline; }

    .room-description {
      background: rgba(139,69,19,0.15);
      border: 1px solid #d4a853;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .room-description h3 {
      color: #d4a853;
      margin-bottom: 12px;
    }

    .room-description p {
      color: #b8956a;
      line-height: 1.6;
    }

    .access-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: bold;
      margin-top: 15px;
    }

    .access-full { background: #4a7c59; color: #c8e6c9; }
    .access-view { background: #6b5b95; color: #e8d4f5; }
    .access-use { background: #b8956a; color: #1a0a0a; }
    .access-no { background: #6b4444; color: #ffb3b3; }

    .back-button {
      padding: 10px 20px;
      background: #d4a853;
      color: #1a0a0a;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 25px;
      transition: all 0.2s;
    }

    .back-button:hover { background: #ffd700; }

    .wizard {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(139,69,19,0.15);
      border: 2px solid #d4a853;
      border-radius: 8px;
      padding: 40px;
    }

    .wizard-header {
      margin-bottom: 30px;
    }

    .wizard-header h2 {
      color: #d4a853;
      font-size: 1.8em;
      margin-bottom: 8px;
    }

    .wizard-progress {
      background: rgba(0,0,0,0.3);
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 15px;
    }

    .wizard-progress-bar {
      height: 100%;
      background: #d4a853;
      transition: width 0.3s;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #d4a853;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 0.95em;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid #d4a853;
      border-radius: 4px;
      color: #f5e6d3;
      font-size: 0.95em;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder { color: #8b6f47; }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 10px rgba(212,168,51,0.3);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }

    .drop-zone {
      border: 2px dashed #d4a853;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      background: rgba(0,0,0,0.2);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
    }

    .drop-zone:hover {
      border-color: #ffd700;
      background: rgba(212,168,51,0.1);
    }

    .drop-zone.drag-over {
      border-color: #ffd700;
      background: rgba(212,168,51,0.15);
    }

    .drop-zone-text {
      color: #d4a853;
      font-size: 1.1em;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .drop-zone-hint {
      color: #b8956a;
      font-size: 0.9em;
    }

    .divider-or {
      text-align: center;
      color: #8b6f47;
      margin: 20px 0;
      font-size: 0.95em;
      letter-spacing: 3px;
    }

    .url-input-group {
      margin-bottom: 20px;
    }

    .url-input-group label {
      display: block;
      color: #d4a853;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 0.95em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .url-input-group input {
      width: 100%;
      padding: 14px 14px;
      background: rgba(0,0,0,0.3);
      border: 2px solid #d4a853;
      border-radius: 6px;
      color: #f5e6d3;
      font-size: 0.95em;
      transition: all 0.2s;
    }

    .url-input-group input::placeholder { color: #8b6f47; }
    .url-input-group input:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(212,168,51,0.4);
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #d4a853;
    }

    .checkbox-item label {
      color: #b8956a;
      margin: 0;
      cursor: pointer;
      flex: 1;
    }

    .wizard-buttons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      justify-content: space-between;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95em;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #d4a853;
      color: #1a0a0a;
      flex: 1;
    }

    .btn-primary:hover:not(:disabled) { background: #ffd700; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: #d4a853;
      border: 2px solid #d4a853;
    }

    .btn-secondary:hover { background: rgba(212,168,51,0.15); }

    .preview-section {
      background: rgba(0,0,0,0.3);
      border: 1px solid #d4a853;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .preview-section h3 {
      color: #d4a853;
      margin-bottom: 15px;
    }

    .preview-item {
      margin-bottom: 12px;
      color: #b8956a;
    }

    .preview-item strong { color: #f5e6d3; }

    .table-container {
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table thead {
      background: rgba(139,69,19,0.2);
      border-bottom: 2px solid #d4a853;
    }

    .data-table th {
      color: #d4a853;
      padding: 12px;
      text-align: left;
      font-weight: bold;
    }

    .data-table td {
      padding: 12px;
      border-bottom: 1px solid rgba(212,168,51,0.2);
      color: #b8956a;
    }

    .data-table tbody tr:hover { background: rgba(212,168,51,0.05); }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 0.85em;
      background: #d4a853;
      color: #1a0a0a;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-small:hover { background: #ffd700; }
    .btn-small.danger { background: #8b4545; color: #f5e6d3; }
    .btn-small.danger:hover { background: #a94545; }

    .guest-registry-form {
      background: rgba(139,69,19,0.15);
      border: 2px solid #d4a853;
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 30px;
      max-width: 600px;
    }

    .guest-registry-form h3 {
      color: #d4a853;
      margin-bottom: 20px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(139,69,19,0.9);
      border: 2px solid #d4a853;
      border-radius: 8px;
      padding: 16px 24px;
      color: #f5e6d3;
      font-weight: bold;
      max-width: 350px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      animation: slideIn 0.3s ease-out;
      z-index: 10000;
    }

    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast.success { border-color: #4a7c59; }
    .toast.error { border-color: #8b4545; }

    .loading-screen {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1117 50%, #1a0a0a 100%);
    }

    .loading-bell {
      font-size: 4em;
      animation: swing 1.5s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes swing {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    .loading-text {
      color: #d4a853;
      font-size: 1.3em;
      font-weight: bold;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #b8956a;
    }

    .empty-state h2 {
      color: #d4a853;
      margin-bottom: 10px;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.3);
    }

    ::-webkit-scrollbar-thumb {
      background: #d4a853;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ffd700;
    }
  </style>
</head>

    function calcScores(arr) {
      return arr.map(function(p) {
        if (p.scores) return p;
        var raw = Math.floor(Math.random() * 40) + 60;
        return Object.assign({}, p, {
          scores: {
            raw: raw,
            normalized: Math.round(raw * 0.85),
            final: Math.round(raw * 0.85 * 1.1 > 100 ? 100 : raw * 0.85 * 1.1),
            by: "AI Engine v2"
          }
        });
      });

    const { useState, useEffect, useRef } = React;

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true };
      }

      render() {
        if (this.state.hasError) {
          return <div className="error-message" style={{padding: '20px', textAlign: 'center'}}>Something went wrong. Please refresh the page.</div>;
        }
        return this.props.children;
      }
    }

    function Toast({ message, type, onClose }) {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);

      return <div className={`toast ${type}`}>{message}</div>;
    }

    function LoginScreen({ onLogin, translations }) {
      const [email, setEmail] = useState("");
      const [error, setError] = useState("");

      const handleLogin = () => {
        setError("");
        const lowerEmail = email.toLowerCase().trim();

        try {
          if (!db) {
            setError("Firebase not initialized");
            return;
          }

          const foundUser = initialUsers.find(u => u.email.toLowerCase() === lowerEmail);
          if (!foundUser) {
            setError(_t(translations, "invalidEmail"));
            return;
          }

          onLogin(foundUser);
        } catch (e) {
          setError(_t(translations, "error"));
        }
      };

      return (
        <div className="login-screen">
          <div className="login-box">
            <h1>🏨</h1>
            <h1>{_t(translations, "title")}</h1>
            <p className="subtitle">{_t(translations, "subtitle")}</p>

            {error && <div className="error-message">{error}</div>}

            <input
              type="email"
              className="login-input"
              placeholder={_t(translations, "enterEmail")}
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              onKeyPress={(e) => e.key === "Enter" && handleLogin()}
            />

            <button className="login-button" onClick={handleLogin}>
              {_t(translations, "login")}
            </button>
          </div>
        </div>
      );
    }

    function UploadWizard({ onClose, onPublish, lang }) {
      const [step, setStep] = useState(1);
      const [file, setFile] = useState(null);
      const [platformUrl, setPlatformUrl] = useState("");
      const [name, setName] = useState("");
      const [section, setSection] = useState("tools");
      const [description, setDescription] = useState("");
      const [roles, setRoles] = useState({ bellboy: true, concierge: true, guest: false });
      const [dragOver, setDragOver] = useState(false);

      const handleDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          setFile(e.dataTransfer.files[0]);
        }
      };

      const handleFileInput = (e) => {
        if (e.target.files && e.target.files[0]) {
          setFile(e.target.files[0]);
        }
      };

      const canProceedStep1 = file || platformUrl.trim();
      const canProceedStep2 = name.trim();

      const handleNext = () => {
        if (step === 1 && !canProceedStep1) return;
        if (step === 2 && !canProceedStep2) return;
        setStep(step + 1);
      };

      const handlePublish = () => {
        const newPlatform = {
          id: Date.now(),
          name: name,
          section: section,
          description: description,
          url: platformUrl || null,
          file: file ? file.name : null,
          roles: roles,
          createdAt: new Date().toISOString()
        };
        onPublish(newPlatform);
      };

      const progressPercent = (step / 3) * 100;

      return (
        <div className="wizard">
          <div className="wizard-header">
            <h2>
              {step === 1 && _t(lang, "step1")}
              {step === 2 && _t(lang, "step2")}
              {step === 3 && _t(lang, "step3")}
            </h2>
            <div className="wizard-progress">
              <div className="wizard-progress-bar" style={{ width: progressPercent + "%" }}></div>
            </div>
          </div>

          {step === 1 && (
            <>
              <div
                className={`drop-zone ${dragOver ? "drag-over" : ""}`}
                onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={handleDrop}
              >
                <input
                  type="file"
                  id="file-input"
                  onChange={handleFileInput}
                  style={{ display: "none" }}
                />
                <label htmlFor="file-input" style={{ cursor: "pointer", width: "100%" }}>
                  <div className="drop-zone-text">{_t(lang, "dragDrop")}</div>
                  {file && <div className="drop-zone-hint">✓ {_t(lang, "fileSelected")}: {file.name}</div>}
                </label>
              </div>

              <div className="divider-or">{_t(lang, "orPaste")}</div>

              <div className="url-input-group">
                <label>🔗 {_t(lang, "platformLink")}</label>
                <input
                  type="url"
                  placeholder={_t(lang, "platformLinkPlaceholder")}
                  value={platformUrl}
                  onChange={(e) => setPlatformUrl(e.target.value)}
                />
              </div>
            </>
          )}

          {step === 2 && (
            <>
              <div className="form-group">
                <label>{_t(lang, "platformName")}</label>
                <input
                  type="text"
                  placeholder={_t(lang, "platformName")}
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                />
              </div>

              <div className="form-group">
                <label>{_t(lang, "selectSection")}</label>
                <select value={section} onChange={(e) => setSection(e.target.value)}>
                  <option value="tools">🔧 {_t(lang, "tools")}</option>
                  <option value="analysis">📊 {_t(lang, "analysis")}</option>
                  <option value="strategy">🎯 {_t(lang, "strategy")}</option>
                </select>
              </div>

              <div className="form-group">
                <label>{_t(lang, "platformDescription")}</label>
                <textarea
                  placeholder={_t(lang, "descriptionPlaceholder")}
                  value={description}
                  onChange={(e) => setDescription(e.target.value)}
                ></textarea>
              </div>

              <div className="form-group">
                <label>{_t(lang, "selectRoles")}</label>
                <div className="checkbox-group">
                  {["bellboy", "concierge", "guest"].map(r => (
                    <div key={r} className="checkbox-item">
                      <input
                        type="checkbox"
                        id={`role-${r}`}
                        checked={roles[r] || false}
                        onChange={(e) => setRoles({...roles, [r]: e.target.checked})}
                      />
                      <label htmlFor={`role-${r}`}>{_t(lang, r)}</label>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}

          {step === 3 && (
            <>
              <div className="preview-section">
                <h3>{_t(lang, "previewTitle")}</h3>
                <div className="preview-item"><strong>{_t(lang, "platformName")}:</strong> {name}</div>
                <div className="preview-item"><strong>{_t(lang, "platformSection")}:</strong> {section}</div>
                {platformUrl && <div className="preview-item"><strong>{_t(lang, "platformUrl")}:</strong> <a href={platformUrl} target="_blank" rel="noopener noreferrer" className="url-link">{platformUrl}</a></div>}
                <div className="preview-item"><strong>{_t(lang, "platformDescription")}:</strong> {description}</div>
                <div className="preview-item"><strong>{_t(lang, "selectRoles")}:</strong> {Object.keys(roles).filter(r => roles[r]).map(r => _t(lang, r)).join(", ")}</div>
              </div>
            </>
          )}

          <div className="wizard-buttons">
            {step > 1 && (
              <button className="btn btn-secondary" onClick={() => setStep(step - 1)}>
                {_t(lang, "back")}
              </button>
            )}
            {step < 3 ? (
              <button
                className="btn btn-primary"
                onClick={handleNext}
                disabled={step === 1 && !canProceedStep1 || step === 2 && !canProceedStep2}
              >
                {_t(lang, "next")}
              </button>
            ) : (
              <button className="btn btn-primary" onClick={handlePublish}>
                {_t(lang, "publish")}
              </button>
            )}
            <button className="btn btn-secondary" onClick={onClose} style={{flex: step < 3 ? "0" : "1"}}>
              {_t(lang, "back")}
            </button>
          </div>
        </div>
      );
    }

    function PlatformCard({ platform, onEnter, lang }) {
      const imageIndex = Math.abs(platform.id % (HI[platform.section]?.length || 1));
      const image = HI[platform.section]?.[imageIndex] || HI.tools[0];

          </div>

      );

    function RoomView({ platform, user, onBack, lang }) {
      const userAccess = AM[user.role] || {};
      let accessLevel = "no-access";

      if (platform.roles && platform.roles[user.role]) {
        if (userAccess.tools === "full") accessLevel = "full";
        else if (userAccess.tools === "view-only") accessLevel = "view-only";
        else if (userAccess.tools === "use") accessLevel = "use";
      }

      const accessBadgeClass =
        accessLevel === "full" ? "access-full" :
        accessLevel === "view-only" ? "access-view" :
        accessLevel === "use" ? "access-use" : "access-no";

      const accessText =
        accessLevel === "full" ? _t(lang, "fullAccess") :
        accessLevel === "view-only" ? _t(lang, "viewOnly") :
        accessLevel === "use" ? _t(lang, "useOnly") : _t(lang, "noAccess");

      return (
        <div className="room-view">
          <button className="back-button" onClick={onBack}>← {_t(lang, "back")}</button>

              </p>
            </div>

            {accessText}

      const handleAdd = () => {
        if (!name.trim() || !email.trim()) return;
        onAddUser({ name, email, role });
        setName("");
        setEmail("");

      const additionalUsers = users.filter(u => !initialUsers.find(iu => iu.email === u.email));

      return (
        <div>

              <label>{_t(lang, "guestName")}</label>

                type="text"
                placeholder={_t(lang, "guestName")}

                onChange={(e) => setName(e.target.value)}

            </div>
            <div className="form-group">
              <label>{_t(lang, "guestEmail")}</label>
              <input
                type="email"
                placeholder={_t(lang, "guestEmail")}

              {_t(lang, "addGuest")}

            <div className="table-container">
              <table className="data-table">
                <thead>
                  <tr>
                    <th>{_t(lang, "guestName")}</th>
                    <th>{_t(lang, "guestEmail")}</th>

                </thead>
                <tbody>
                  {additionalUsers.map(u => (
                    <tr key={u.id || u.email}>
                      <td>{u.name}</td>
                      <td>{u.email}</td>
                      <td>{_t(lang, u.role)}</td>
                      <td>
                        <button className="btn-small danger" onClick={() => onRemoveUser(u.id)}>

    function ScoreAnalysis({ platforms, lang }) {
      const platformsWithScores = calcScores(platforms);

      if (platformsWithScores.length === 0) {
        return <div className="empty-state"><h2>{_t(lang, "scoreAnalysis")}</h2><p>{_t(lang, "noPlatforms")}</p></div>;
      }

      return (
        <div className="table-container">
          <table className="data-table">
            <thead>
              <tr>
                <th>{_t(lang, "platform")}</th>
                <th>{_t(lang, "score")} (Raw)</th>
                <th>{_t(lang, "normalized")}</th>
                <th>{_t(lang, "final")}</th>
                <th>{_t(lang, "by")}</th>
              </tr>
            </thead>
            <tbody>
              {platformsWithScores.map(p => (
                <tr key={p.id}>
                  <td>{p.name}</td>
                  <td>{p.scores?.raw || "-"}</td>
                  <td>{p.scores?.normalized || "-"}</td>
                  <td>{p.scores?.final || "-"}</td>
                  <td>{p.scores?.by || "-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [lang, setLang] = useState(() => localStorage.getItem("lang") || "en");
      const [platforms, setPlatforms] = useState([]);
      const [allUsers, setAllUsers] = useState([...initialUsers]);
      const [loading, setLoading] = useState(true);
      const [activeNav, setActiveNav] = useState("lobby");
      const [activeFloor, setActiveFloor] = useState("tools");
      const [selectedPlatform, setSelectedPlatform] = useState(null);
      const [showWizard, setShowWizard] = useState(false);
      const [toast, setToast] = useState(null);

      // Firebase sync
      useEffect(() => {
        if (!db) {
          setLoading(false);
          return;
        }

        try {
          const platformsRef = db.ref("platforms");
          const usersRef = db.ref("users");

          const unsubscribePlatforms = platformsRef.on("value", (snapshot) => {
            const data = snapshot.val();
            setPlatforms(data ? Object.values(data) : []);
          });

          const unsubscribeUsers = usersRef.on("value", (snapshot) => {
            const fbUsers = snapshot.val();
            const mergedUsers = [...initialUsers];
            if (fbUsers) {
              Object.values(fbUsers).forEach(fbUser => {
                const exists = mergedUsers.find(u => u.email === fbUser.email);
                if (!exists) {
                  mergedUsers.push(fbUser);
                }
              });
            }
            setAllUsers(mergedUsers);
          });

          setLoading(false);

          return () => {
            platformsRef.off("value", unsubscribePlatforms);
            usersRef.off("value", unsubscribeUsers);
          };
        } catch (e) {
          console.error("Firebase error:", e);
          setLoading(false);
        }
      }, []);

      const handlePublishPlatform = (platform) => {
        try {
          if (!db) {
            showToast("Firebase not initialized", "error");
            return;
          }

          const allPlatforms = [...platforms, platform];
          const platformsObj = {};
          allPlatforms.forEach(p => {
            platformsObj[p.id] = p;
          });

          db.ref("platforms").set(platformsObj);
          showToast(_t(lang, "published"), "success");
          setShowWizard(false);
        } catch (e) {
          showToast(_t(lang, "error"), "error");
        }
      };

      const handleAddUser = ({ name, email, role }) => {
        try {
          if (!db) {
            showToast("Firebase not initialized", "error");
            return;
          }

          const newUser = {
            id: Date.now(),
            name,
            email,
            role,
            avatar: name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2)
          };

          db.ref("users/" + newUser.id).set(newUser);
          showToast(_t(lang, "guestAdded"), "success");
        } catch (e) {
          showToast(_t(lang, "error"), "error");
        }
      };

      const handleRemoveUser = (id) => {
        try {
          if (!db) return;
          db.ref("users/" + id).remove();
          showToast(_t(lang, "guestRemoved"), "success");
        } catch (e) {
          showToast(_t(lang, "error"), "error");
        }
      };

      const showToast = (message, type) => {
        setToast({ message, type });
      };

      const handleLogout = () => {
        setUser(null);
        setActiveNav("lobby");
        setActiveFloor("tools");
        setSelectedPlatform(null);
      };

      const toggleLanguage = () => {
        const newLang = lang === "en" ? "es" : "en";
        setLang(newLang);
        localStorage.setItem("lang", newLang);
      };

      if (loading) {
        return (
          <div className="loading-screen">
            <div className="loading-bell">🔔</div>
            <div className="loading-text">{_t(lang, "title")}</div>
          </div>
        );
      }

      if (!user) {
        return <ErrorBoundary><LoginScreen onLogin={setUser} translations={lang} /></ErrorBoundary>;
      }

      const filteredPlatforms = platforms.filter(p => p.section === activeFloor && (p.roles?.[user.role] || false));

      return (
        <ErrorBoundary>
          <div className="main-container">
            {/* Sidebar */}
            <div className="sidebar">
              <div className="sidebar-header">
                <h2>🏨 {_t(lang, "title")}</h2>
                <div className="user-info">{user.name}</div>
                <div className="user-info">{_t(lang, user.role)}</div>
              </div>

              <nav className="sidebar-nav">
                <button
                  className={`nav-item ${activeNav === "lobby" ? "active" : ""}`}
                  onClick={() => { setActiveNav("lobby"); setSelectedPlatform(null); }}
                >
                  🏛️ {_t(lang, "lobby")}
                </button>
                {AM[user.role]?.config && (
                  <button
                    className={`nav-item ${activeNav === "backoffice" ? "active" : ""}`}
                    onClick={() => { setActiveNav("backoffice"); setSelectedPlatform(null); setShowWizard(false); }}
                  >
                    🛎️ {_t(lang, "backOffice")}
                  </button>
                )}
              </nav>

              <div className="sidebar-footer">
                <button className="lang-toggle" onClick={toggleLanguage}>
                  {_t(lang, "language")}
                </button>
                <button className="logout-button" onClick={handleLogout}>
                  {_t(lang, "logout")}
                </button>
              </div>
            </div>

            {/* Content */}
            <div className="content">
              {selectedPlatform ? (
                <div className="page-content">
                  <RoomView
                    platform={selectedPlatform}
                    user={user}
                    onBack={() => setSelectedPlatform(null)}
                    lang={lang}
                  />
                </div>
              ) : activeNav === "lobby" ? (
                <>
                  <div className="header">
                    <h1>{_t(lang, "lobby")}</h1>
                    <div className="tabs">
                      {["tools", "analysis", "strategy"].map(floor => (
                        <button
                          key={floor}
                          className={`tab ${activeFloor === floor ? "active" : ""}`}
                          onClick={() => setActiveFloor(floor)}
                        >
                          {floor === "tools" && "🔧"}
                          {floor === "analysis" && "📊"}
                          {floor === "strategy" && "🎯"}
                          {" " + _t(lang, floor)}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="page-content">
                    {filteredPlatforms.length > 0 ? (
                      <div className="platform-grid">
                        {filteredPlatforms.map(p => (
                          <PlatformCard
                            key={p.id}
                            platform={p}
                            onEnter={setSelectedPlatform}
                            lang={lang}
                          />
                        ))}
                      </div>
                    ) : (
                      <div className="empty-state">
                        <p>{_t(lang, "noPlatforms")}</p>
                      </div>
                    )}
                  </div>
                </>
              ) : (
                <>
                  <div className="header">
                    <h1>{_t(lang, "backOffice")}</h1>
                  </div>
                  <div className="page-content">
                    {!showWizard ? (
                      <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))", gap: "20px"}}>
                        <div style={{background: "rgba(139,69,19,0.15)", border: "2px solid #d4a853", borderRadius: "8px", padding: "20px", textAlign: "center", cursor: "pointer"}} onClick={() => setShowWizard(true)}>
                          <div style={{fontSize: "2.5em", marginBottom: "10px"}}>📤</div>
                          <h3 style={{color: "#d4a853"}}>{_t(lang, "uploadPlatform")}</h3>
                        </div>

                        <div style={{background: "rgba(139,69,19,0.15)", border: "2px solid #d4a853", borderRadius: "8px", padding: "20px", cursor: "pointer"}} onClick={() => setActiveNav("guestRegistry")}>
                          <div style={{fontSize: "2.5em", marginBottom: "10px", textAlign: "center"}}>👥</div>
                          <h3 style={{color: "#d4a853", textAlign: "center"}}>{_t(lang, "guestRegistry")}</h3>
                        </div>

                        <div style={{background: "rgba(139,69,19,0.15)", border: "2px solid #d4a853", borderRadius: "8px", padding: "20px", cursor: "pointer"}} onClick={() => setActiveNav("scoreAnalysis")}>
                          <div style={{fontSize: "2.5em", marginBottom: "10px", textAlign: "center"}}>📊</div>
                          <h3 style={{color: "#d4a853", textAlign: "center"}}>{_t(lang, "scoreAnalysis")}</h3>
                        </div>
                      </div>
                    ) : (
                      <UploadWizard
                        onClose={() => setShowWizard(false)}
                        onPublish={handlePublishPlatform}
                        lang={lang}
                      />
                    )}

                    {activeNav === "guestRegistry" && (
                      <GuestRegistry
                        lang={lang}
                        users={allUsers}
                        onAddUser={handleAddUser}
                        onRemoveUser={handleRemoveUser}
                      />
                    )}

                    {activeNav === "scoreAnalysis" && (
                      <ScoreAnalysis platforms={platforms} lang={lang} />
                    )}
                  </div>
                </>
              )}
            </div>
          </div>

          {toast && (
            <Toast
              message={toast.message}
              type={toast.type}
              onClose={() => setToast(null)}
            />
          )}
        </ErrorBoundary>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
