<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LOBBY - Platform Hub</title>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--wine:#9B2335;--burgundy:#5A1A2A;--gold:#D4A843;--cream:#FAF0E4;--dark:#1A0A0E;--brown:#3E1C11;--rose:#C7959B;--green:#2A5A3A}
        body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--cream);overflow-x:hidden}

        .loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--burgundy),var(--dark));text-align:center}
        .loading-screen .bell{font-size:4rem;margin-bottom:20px;animation:bounce 1s infinite}
        .loading-screen h2{font-family:'Playfair Display',serif;color:var(--gold);font-size:2rem}
        .loading-screen p{color:var(--rose);margin-top:10px;font-size:.85rem}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

        .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--burgundy),var(--dark));padding:20px}
        .login-card{background:rgba(26,10,14,.9);border:2px solid var(--gold);border-radius:16px;padding:40px;max-width:420px;width:100%;text-align:center;position:relative}
        .login-card .bell{font-size:3.5rem;margin-bottom:10px}
        .login-card h1{font-family:'Playfair Display',serif;color:var(--gold);font-size:2.2rem;margin-bottom:5px}
        .login-card h3{color:var(--rose);font-weight:400;font-size:.9rem;margin-bottom:30px;font-style:italic}
        .login-card input{width:100%;padding:14px;border:1px solid var(--gold);border-radius:8px;background:rgba(255,255,255,.05);color:var(--cream);font-size:1rem;margin-bottom:15px;outline:none}
        .login-card input:focus{border-color:var(--wine);box-shadow:0 0 10px rgba(155,35,53,.3)}
        .login-btn{width:100%;padding:14px;background:var(--wine);color:var(--cream);border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s}
        .login-btn:hover{background:var(--burgundy);transform:translateY(-2px)}
        .login-error{color:#ff6b6b;font-size:.85rem;margin-bottom:10px}
        .lang-toggle{position:absolute;top:15px;right:15px;background:none;border:1px solid var(--gold);color:var(--gold);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.8rem}

        .lobby-header{background:linear-gradient(135deg,var(--burgundy),var(--dark));padding:20px 30px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);flex-wrap:wrap;gap:10px}
        .lobby-title h1{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.8rem}
        .lobby-title p{color:var(--rose);font-size:.8rem;font-style:italic}
        .lobby-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .user-badge{display:flex;align-items:center;gap:8px}
        .avatar{width:36px;height:36px;border-radius:50%;background:var(--wine);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;border:2px solid var(--gold)}
        .role-tag{background:var(--gold);color:var(--dark);padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;text-transform:uppercase}
        .btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .3s}
        .btn-gold{background:var(--gold);color:var(--dark)}
        .btn-wine{background:var(--wine);color:var(--cream)}
        .btn-outline{background:none;border:1px solid var(--gold);color:var(--gold)}
        .btn:hover{transform:translateY(-2px);opacity:.9}

        .floor-tabs{display:flex;justify-content:center;gap:10px;padding:20px;background:rgba(90,26,42,.3);flex-wrap:wrap}
        .floor-tab{padding:12px 24px;border:2px solid transparent;border-radius:10px;background:rgba(255,255,255,.05);color:var(--rose);cursor:pointer;font-weight:600;transition:all .3s}
        .floor-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,.1)}
        .floor-tab:hover{border-color:var(--rose)}

        .room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:30px;max-width:1200px;margin:0 auto}
        .room-card{border-radius:12px;overflow:hidden;border:2px solid rgba(212,168,67,.2);background:rgba(26,10,14,.8);cursor:pointer;transition:all .3s}
        .room-card:hover{transform:translateY(-5px);border-color:var(--gold);box-shadow:0 8px 30px rgba(212,168,67,.2)}
        .room-img{height:160px;background-size:cover;background-position:center;position:relative}
        .room-badge{position:absolute;top:10px;right:10px;background:var(--wine);color:var(--cream);padding:4px 10px;border-radius:6px;font-size:.7rem;font-weight:600;text-transform:uppercase}
        .room-info{padding:15px}
        .room-number{color:var(--gold);font-size:.75rem;font-weight:700}
        .room-name{font-family:'Playfair Display',serif;font-size:1.1rem;margin-top:4px}
        .empty-floor{text-align:center;padding:60px;color:var(--rose);grid-column:1/-1}
        .empty-floor .icon{font-size:3rem;margin-bottom:15px}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
        .modal-card{background:var(--dark);border:2px solid var(--gold);border-radius:16px;max-width:550px;width:100%;max-height:90vh;overflow-y:auto}
        .modal-img{height:200px;background-size:cover;background-position:center;border-radius:14px 14px 0 0;position:relative}
        .modal-close{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:var(--cream);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.2rem}
        .modal-body{padding:25px}
        .modal-body h2{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.5rem;margin-bottom:10px}
        .modal-body .desc{color:var(--rose);margin-bottom:15px;line-height:1.5}
        .meta-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
        .meta-chip{background:rgba(212,168,67,.1);border:1px solid var(--gold);padding:4px 10px;border-radius:6px;font-size:.75rem;color:var(--gold)}
        .access-badge{display:inline-block;padding:4px 12px;border-radius:6px;font-size:.8rem;font-weight:600;margin-bottom:15px}
        .access-full{background:var(--green);color:white}
        .access-view{background:var(--gold);color:var(--dark)}
        .access-no{background:#666;color:#ccc}
        .enter-btn{display:block;width:100%;padding:14px;background:var(--wine);color:var(--cream);border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;text-align:center;text-decoration:none}
        .enter-btn:hover{background:var(--burgundy)}

        .bo-wrap{display:flex;min-height:100vh}
        .bo-sidebar{width:220px;background:linear-gradient(180deg,var(--burgundy),var(--dark));padding:20px;border-right:2px solid var(--gold)}
        .bo-sidebar h2{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.3rem;margin-bottom:20px}
        .bo-nav-item{padding:12px;border-radius:8px;color:var(--rose);cursor:pointer;margin-bottom:5px;transition:all .2s;font-size:.9rem}
        .bo-nav-item.active{background:rgba(212,168,67,.15);color:var(--gold);border-left:3px solid var(--gold)}
        .bo-nav-item:hover{background:rgba(255,255,255,.05)}
        .bo-content{flex:1;padding:30px;overflow-y:auto}
        .bo-content h3{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.4rem;margin-bottom:20px}

        .upload-steps{display:flex;gap:10px;margin-bottom:25px}
        .step-indicator{padding:8px 16px;border-radius:20px;font-size:.8rem;font-weight:600}
        .step-active{background:var(--gold);color:var(--dark)}
        .step-inactive{background:rgba(255,255,255,.1);color:var(--rose)}
        .dropzone{border:3px dashed var(--gold);border-radius:12px;padding:60px;text-align:center;cursor:pointer;transition:all .3s}
        .dropzone:hover,.dropzone.dragging{background:rgba(212,168,67,.1);border-color:var(--wine)}
        .dropzone .icon{font-size:3rem;margin-bottom:10px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;color:var(--gold);font-weight:600;margin-bottom:5px;font-size:.85rem}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border:1px solid rgba(212,168,67,.3);border-radius:8px;background:rgba(255,255,255,.05);color:var(--cream);font-size:.9rem;outline:none;font-family:'Inter',sans-serif}
        .form-group textarea{height:100px;resize:vertical}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold)}
        .checkbox-group{display:flex;gap:15px;flex-wrap:wrap}
        .checkbox-group label{display:flex;align-items:center;gap:5px;color:var(--cream);font-size:.85rem;cursor:pointer}

        .bo-table{width:100%;border-collapse:collapse}
        .bo-table th{text-align:left;padding:12px;color:var(--gold);border-bottom:2px solid var(--gold);font-size:.85rem}
        .bo-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem}
        .bo-table tr:hover{background:rgba(212,168,67,.05)}
        .del-btn{background:none;border:1px solid #ff6b6b;color:#ff6b6b;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}
        .del-btn:hover{background:#ff6b6b;color:white}
        .add-form{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap;align-items:flex-end}
        .add-form input,.add-form select{padding:8px;border:1px solid rgba(212,168,67,.3);border-radius:6px;background:rgba(255,255,255,.05);color:var(--cream);font-size:.85rem;outline:none}

        .celebration{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:2000}
        .celebration-card{text-align:center;animation:popIn .5s ease}
        .celebration-card .emoji{font-size:5rem;animation:bounce .8s infinite}
        .celebration-card .phrase{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.5rem;margin-top:15px;max-width:350px}
        @keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

        .toast{position:fixed;bottom:20px;right:20px;background:var(--gold);color:var(--dark);padding:12px 20px;border-radius:8px;font-weight:600;z-index:3000;animation:slideIn .3s ease}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

        .confirm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:2500}
        .confirm-card{background:var(--dark);border:2px solid var(--wine);border-radius:12px;padding:30px;text-align:center;max-width:350px}
        .confirm-card .emoji{font-size:2.5rem;margin-bottom:10px}
        .confirm-card h4{color:var(--cream);margin-bottom:10px}
        .confirm-card p{color:var(--rose);font-size:.85rem;margin-bottom:20px}
        .confirm-btns{display:flex;gap:10px;justify-content:center}
        .disc-card{background:rgba(155,35,53,.1);border:1px solid var(--wine);border-radius:8px;padding:15px;margin-bottom:10px}
        .disc-card h4{color:var(--gold);margin-bottom:5px}
        .disc-card p{color:var(--rose);font-size:.85rem}

        .error-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--burgundy),var(--dark));text-align:center;padding:20px}
        .error-screen pre{background:rgba(0,0,0,.5);padding:15px;border-radius:8px;color:#ff6b6b;font-size:.8rem;max-width:500px;overflow-x:auto;text-align:left;margin-top:15px}

        @media(max-width:768px){
            .bo-wrap{flex-direction:column}
            .bo-sidebar{width:100%;border-right:none;border-bottom:2px solid var(--gold)}
            .lobby-header{flex-direction:column;text-align:center}
            .room-grid{grid-template-columns:1fr;padding:15px}
        }
    </style>
</head>

                        } catch(e){ console.error("Platform parse error:",e) }

                                for(var i=0;i<fbUsers.length;i++){
                                    var exists = false;
                                    for(var j=0;j<merged.length;j++){
                                        if(merged[j].email===fbUsers[i].email){exists=true;break}
                                    }
                                    if(!exists) merged.push(fbUsers[i]);
                                }
                                setUsers(merged);
                            }
                        } catch(e){ console.error("Users parse error:",e) }
                    }, function(err){ console.error("Firebase users error:",err) });

                    return function(){ pRef.off(); uRef.off() };
                } catch(e){
                    console.error("Firebase listener setup error:",e);
                    setFirebaseReady(true);
                }
            }, []);

            useEffect(function(){try{localStorage.setItem("ailobby_lang",lang)}catch(e){}}, [lang]);

            if(firebaseError){
                return (

                return <LoginScreen onLogin={setCurrentUser} lang={lang} setLang={setLang} users={users} />
            }

            if(showBO && accessMatrix[currentUser.role] && accessMatrix[currentUser.role].config){
                return <BackOffice currentUser={currentUser} onBack={function(){setShowBO(false)}} platforms={platforms} setPlatforms={setPlatforms} users={users} setUsers={setUsers} lang={lang} />
            }

            return <LobbyScreen currentUser={currentUser} onLogout={function(){setCurrentUser(null)}} platforms={platforms} onShowBO={function(){setShowBO(true)}} lang={lang} setLang={setLang} />
        }

        // ===== RENDER =====
        try {
            var root = ReactDOM.createRoot(document.getElementById("root"));
            root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
            console.log("App rendered OK");
        } catch(e) {
            console.error("Render error:", e);
            document.getElementById("root").innerHTML = '<div class="error-screen"><div><div style="font-size:3rem;margin-bottom:15px">⚠️</div><h2 style="font-family:Playfair Display,serif;color:#D4A843">Render Error</h2><pre>' + e.message + '</pre></div></div>';
        }
    </script>
</body>
</html>
