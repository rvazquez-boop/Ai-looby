            db.ref("users").on("value",function(snap){try{var d=snap.val();if(d){var fb=Object.values(d),m=initialUsers.slice();for(var i=0;i<fb.length;i++){var ex=false;for(var j=0;j<m.length;j++){if(m[j].email===fb[i].email){ex=true;break}}if(!ex)m.push(fb[i])}setUsers(m)}}catch(e){console.error(e)}},function(e){console.error(e)});
        }catch(e){console.error(e);setReady(true)}
    },[]);

    useEffect(function(){try{localStorage.setItem("ailobby_lang",L)}catch(e){}},[L]);

    if(!ready)return(<div className="loading-screen"><div><div style={{fontSize:"4rem",marginBottom:"20px",animation:"bounce 1s infinite"}}>🔔</div><h2>Loading AI Lobby...</h2><p>Connecting...</p></div></div>);

    if(!user)return(<div className="login-wrap"><div className="login-card">
        <button className="lang-toggle" onClick={function(){setLang(L==="en"?"es":"en")}}>{_t(L,"langBtn")}</button>
        <div style={{fontSize:"3.5rem",marginBottom:"10px"}}>🔔</div>
        <h1>{_t(L,"title")}</h1><h3>{_t(L,"subtitle")}</h3>

    if(showBO&&AM[user.role]&&AM[user.role].config)return(<BackOffice L={L} user={user} platforms={platforms} setPlatforms={setPlatforms} users={users} setUsers={setUsers} onBack={function(){setShowBO(false)}}/>);

        <div className="lobby-header"><div className="lobby-title"><h1>{_t(L,"title")}</h1><p>{_t(L,"subtitle")}</p></div>
        <div className="lobby-actions"><div className="user-badge"><div className="avatar">{user.avatar}</div><span>{user.name}</span><span className="role-tag">{user.role}</span></div>
        <button className="btn btn-outline" onClick={function(){setLang(L==="en"?"es":"en")}}>{_t(L,"langBtn")}</button>
        {AM[user.role]&&AM[user.role].config&&<button className="btn btn-gold" onClick={function(){setShowBO(true)}}>{_t(L,"backOffice")}</button>}
        <button className="btn btn-wine" onClick={function(){setUser(null)}}>{_t(L,"logout")}</button></div></div>
        <FloorView L={L} user={user} platforms={platforms}/>
    </div>);
}

function LoginForm(props){

        <div className="room-grid">{fp.length===0&&<div className="empty-floor"><div className="icon">🚪</div><p>{_t(L,"emptyFloor")}</p></div>}{fp.map(function(p){return <div key={p.id} className="room-card" onClick={function(){setSel(p)}}><div className="room-img" style={{backgroundImage:"url("+getImg(p,floor)+")"}}><span className="room-badge">{floor}</span></div><div className="room-info"><div className="room-number">#{p.roomNumber}</div><div className="room-name">{p.name}</div></div></div>})}</div>

    </div>);

function BackOffice(props){
    var _t2=useState("upload"),tab=_t2[0],setTab=_t2[1];
    var _s=useState(1),step=_s[0],setStep=_s[1];
    var _fc=useState(""),fc=_fc[0],setFC=_fc[1];
    var _fn=useState(""),fn=_fn[0],setFN=_fn[1];
    var _fz=useState(""),fz=_fz[0],setFZ=_fz[1];
    var _fd=useState({name:"",section:"tools",desc:"",url:"",roles:["bellboy"]}),form=_fd[0],setForm=_fd[1];
    var _ce=useState(false),celeb=_ce[0],setCeleb=_ce[1];

    var _dr=useState(false),drag=_dr[0],setDrag=_dr[1];
    var _nu=useState({name:"",email:"",role:"guest"}),nu=_nu[0],setNU=_nu[1];
    var L=props.L;

    function hPub(){var raw=analyzeCode(fc);var np={id:Date.now(),roomNumber:props.platforms.length+1,name:form.name,section:form.section,uploadedBy:props.user.name,uploadedDate:new Date().toLocaleDateString(),description:form.desc,url:form.url,fileSize:fz,rawScore:raw,accessRoles:form.roles};var all=calcScores(props.platforms.concat([np]));props.setPlatforms(all);if(db){var o={};all.forEach(function(p){o[p.id]=p});db.ref("platforms").set(o)}setStep(1);setFC("");setFN("");setFZ("");setForm({name:"",section:"tools",desc:"",url:"",roles:["bellboy"]});setCeleb(true);setTimeout(function(){setCeleb(false)},6000);showT(_t(L,"platformAdded"))}
    function hAddU(){if(!nu.name||!nu.email)return;var u={id:Date.now(),name:nu.name,email:nu.email,role:nu.role,avatar:nu.name.split(" ").map(function(n){return n[0]}).join("").toUpperCase().slice(0,2)};props.setUsers(props.users.concat([u]));if(db)db.ref("users/"+u.id).set(u);setNU({name:"",email:"",role:"guest"});showT(_t(L,"userAdded"))}
    function hDelU(id){if(id===props.user.id)return;props.setUsers(props.users.filter(function(u){return u.id!==id}));if(db)db.ref("users/"+id).remove();setCDel(null);showT(_t(L,"userRemoved"))}

    var discs=[];["tools","analysis","strategy"].forEach(function(s){var sp=props.platforms.filter(function(p){return p.section===s});for(var i=0;i<sp.length;i++)for(var j=i+1;j<sp.length;j++)if(Math.abs((sp[i].score||0)-(sp[j].score||0))>30)discs.push({a:sp[i].name,b:sp[j].name,s:s,g:Math.abs((sp[i].score||0)-(sp[j].score||0))})});
    var tabs=[{k:"upload",l:_t(L,"tabUpload")},{k:"registry",l:_t(L,"tabRegistry")},{k:"scores",l:_t(L,"tabScores")},{k:"disc",l:_t(L,"tabDisc")}];
    return(<div className="bo-wrap">
        <div className="bo-sidebar"><h2>{_t(L,"backOffice")}</h2>{tabs.map(function(x){return <div key={x.k} className={"bo-nav-item"+(tab===x.k?" active":"")} onClick={function(){setTab(x.k)}}>{x.l}</div>})}<div style={{marginTop:"30px"}}><button className="btn btn-outline" style={{width:"100%",marginBottom:"8px"}} onClick={props.onBack}>{_t(L,"backToLobby")}</button><button className="btn btn-wine" style={{width:"100%"}} onClick={function(){window.location.reload()}}>{_t(L,"logout")}</button></div></div>
        <div className="bo-content">
            {tab==="upload"&&<div><h3>{_t(L,"tabUpload")}</h3><div className="upload-steps"><span className={"step-indicator "+(step>=1?"step-active":"step-inactive")}>{_t(L,"step1")}</span><span className={"step-indicator "+(step>=2?"step-active":"step-inactive")}>{_t(L,"step2")}</span><span className={"step-indicator "+(step>=3?"step-active":"step-inactive")}>{_t(L,"step3")}</span></div>
                {step===1&&<div><div className={"dropzone"+(drag?" dragging":"")} onDrop={function(e){e.preventDefault();setDrag(false);if(e.dataTransfer.files[0])hFile(e.dataTransfer.files[0])}} onDragOver={function(e){e.preventDefault();setDrag(true)}} onDragLeave={function(){setDrag(false)}} onClick={function(){document.getElementById("fi").click()}}><div className="icon">📁</div><p style={{color:"var(--gold)",fontWeight:600}}>{_t(L,"dropText")}</p><p style={{color:"var(--rose)",fontSize:".85rem",marginTop:"5px"}}>{_t(L,"dropSub")}</p></div><input id="fi" type="file" style={{display:"none"}} onChange={function(e){if(e.target.files[0])hFile(e.target.files[0])}}/>{fn&&<div style={{marginTop:"15px",padding:"10px",background:"rgba(212,168,67,.1)",borderRadius:"8px"}}><span style={{color:"var(--gold)"}}>{_t(L,"fileLabel")}: </span>{fn}<span style={{marginLeft:"15px",color:"var(--gold)"}}>{_t(L,"sizeLabel")}: </span>{fz}</div>}{fn&&<button className="btn btn-gold" style={{marginTop:"15px"}} onClick={function(){setStep(2)}}>{_t(L,"next")}</button>}</div>}
                {step===2&&<div><div className="form-group"><label>{_t(L,"nameLabel")}</label><input value={form.name} onChange={function(e){setForm(Object.assign({},form,{name:e.target.value}))}}/></div><div className="form-group"><label>{_t(L,"sectionLabel")}</label><select value={form.section} onChange={function(e){setForm(Object.assign({},form,{section:e.target.value}))}}><option value="tools">{_t(L,"secTools")}</option><option value="analysis">{_t(L,"secAnalysis")}</option><option value="strategy">{_t(L,"secStrategy")}</option></select></div><div className="form-group"><label>{_t(L,"descLabel")}</label><textarea value={form.desc} onChange={function(e){setForm(Object.assign({},form,{desc:e.target.value}))}}/></div><div className="form-group"><label>{_t(L,"urlLabel")}</label><input value={form.url} onChange={function(e){setForm(Object.assign({},form,{url:e.target.value}))}}/></div><div className="form-group"><label>{_t(L,"rolesLabel")}</label><div className="checkbox-group">{["bellboy","concierge","guest"].map(function(r){return <label key={r}><input type="checkbox" checked={form.roles.indexOf(r)>-1} onChange={function(){togR(r)}}/>{r}</label>})}</div></div><div style={{display:"flex",gap:"10px"}}><button className="btn btn-outline" onClick={function(){setStep(1)}}>{_t(L,"back")}</button><button className="btn btn-gold" onClick={function(){if(form.name)setStep(3)}}>{_t(L,"next")}</button></div></div>}

            </div>}
            {tab==="registry"&&<div><h3>{_t(L,"tabRegistry")}</h3><table className="bo-table"><thead><tr><th></th><th>{_t(L,"nameCol")}</th><th>{_t(L,"emailCol")}</th><th>{_t(L,"roleCol")}</th>{props.user.role==="bellboy"&&<th>{_t(L,"actionsCol")}</th>}</tr></thead><tbody>{props.users.map(function(u){return <tr key={u.id}><td><div className="avatar" style={{width:"30px",height:"30px",fontSize:".7rem"}}>{u.avatar}</div></td><td>{u.name}</td><td>{u.email}</td><td><span className="role-tag">{u.role}</span></td>{props.user.role==="bellboy"&&<td>{u.id!==props.user.id&&<button className="del-btn" onClick={function(){setCDel(u.id)}}>🗑️</button>}</td>}</tr>})}</tbody></table><div className="add-form"><input placeholder={_t(L,"nameCol")} value={nu.name} onChange={function(e){setNU(Object.assign({},nu,{name:e.target.value}))}}/><input placeholder={_t(L,"emailCol")} value={nu.email} onChange={function(e){setNU(Object.assign({},nu,{email:e.target.value}))}}/><select value={nu.role} onChange={function(e){setNU(Object.assign({},nu,{role:e.target.value}))}}><option value="bellboy">Bellboy</option><option value="concierge">Concierge</option><option value="guest">Guest</option></select><button className="btn btn-gold" onClick={hAddU}>{_t(L,"addUser")}</button></div></div>}
