<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LOBBY - The Grand Platform Hotel</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebaseapps/8.10.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebaseapps/8.10.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --wine: #9B2335;
            --burgundy: #5A1A2A;
            --gold: #D4A843;
            --cream: #FAF0E4;
            --dark: #1A0A0E;
            --brown: #3E1C11;
            --rose: #C7959B;
            --green: #2A5A3A;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--dark) 100%);
            color: var(--cream);
            min-height: 100vh;
        }

        #root {
            min-height: 100vh;
        }

        /* ===== LOGIN SCREEN ===== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--dark) 100%);
            padding: 20px;
        }

        .login-card {
            background: rgba(250, 240, 228, 0.95);
            border-radius: 12px;
            padding: 60px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 2px solid var(--gold);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-bell {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--wine);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .login-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: var(--rose);
            margin-bottom: 20px;
        }

        .lang-toggle-top {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--wine);
            color: var(--cream);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .lang-toggle-top:hover {
            background: var(--burgundy);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-form input {
            padding: 14px;
            border: 2px solid var(--gold);
            border-radius: 6px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.95);
            color: var(--dark);
            transition: all 0.3s ease;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--wine);
            box-shadow: 0 0 0 3px rgba(155, 35, 53, 0.1);
        }

        .login-form button {
            padding: 14px;
            background: var(--wine);
            color: var(--cream);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .login-form button:hover {
            background: var(--burgundy);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .login-error {
            color: #C41E3A;
            font-size: 0.9rem;
            margin-top: -10px;
            text-align: center;
        }

        /* ===== LOBBY SCREEN ===== */
        .lobby-container {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--dark) 100%);
            padding-bottom: 40px;
        }

        .lobby-header {
            background: linear-gradient(135deg, var(--wine) 0%, var(--burgundy) 100%);
            padding: 30px 20px;
            border-bottom: 3px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .lobby-title-block {
            flex: 1;
            min-width: 250px;
        }

        .lobby-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin: 0;
            font-weight: 900;
        }

        .lobby-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            color: var(--cream);
            margin-top: 5px;
        }

        .lobby-user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--dark);
            font-size: 1rem;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 600;
            color: var(--cream);
            font-size: 0.95rem;
        }

        .user-role {
            font-size: 0.8rem;
            color: var(--rose);
            text-transform: capitalize;
        }

        .lobby-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-secondary {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 168, 67, 0.3);
        }

        .btn-logout {
            background: var(--burgundy);
            color: var(--cream);
            border: 2px solid var(--rose);
        }

        .btn-logout:hover {
            background: var(--dark);
        }

        .lobby-nav {
            display: flex;
            gap: 0;
            padding: 0 20px;
            border-bottom: 2px solid rgba(212, 168, 67, 0.2);
            margin-top: 20px;
        }

        .nav-tab {
            padding: 15px 25px;
            background: transparent;
            border: none;
            color: var(--cream);
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-tab:hover {
            color: var(--gold);
        }

        .nav-tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .lobby-content {
            padding: 30px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .room-door {
            background: rgba(250, 240, 228, 0.05);
            border: 2px solid var(--gold);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .room-door:hover {
            transform: translateY(-8px);
            border-color: var(--cream);
            box-shadow: 0 20px 40px rgba(212, 168, 67, 0.2);
        }

        .room-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--wine) 100%);
        }

        .room-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .room-badge {
            display: inline-block;
            background: var(--gold);
            color: var(--dark);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
            width: fit-content;
        }

        .room-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
            color: var(--rose);
            margin-bottom: 8px;
        }

        .room-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .room-description {
            font-size: 0.9rem;
            color: var(--cream);
            line-height: 1.5;
            flex: 1;
        }

        /* ===== EXPANDED ROOM MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--dark) 100%);
            border-radius: 12px;
            border: 2px solid var(--gold);
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }

        .modal-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-badge {
            display: inline-block;
            background: var(--gold);
            color: var(--dark);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .modal-description {
            color: var(--cream);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .modal-meta {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--gold);
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 4px;
        }

        .meta-item {
            font-size: 0.9rem;
            color: var(--rose);
            margin-bottom: 8px;
        }

        .meta-label {
            font-weight: 600;
            color: var(--gold);
        }

        .access-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .access-full {
            background: rgba(42, 90, 58, 0.3);
            color: #90EE90;
            border: 1px solid #90EE90;
        }

        .access-view {
            background: rgba(212, 168, 67, 0.2);
            color: var(--gold);
            border: 1px solid var(--gold);
        }

        .access-none {
            background: rgba(155, 35, 53, 0.2);
            color: #FF6B6B;
            border: 1px solid #FF6B6B;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-enter {
            flex: 1;
            padding: 12px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-enter:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 168, 67, 0.3);
        }

        .btn-close {
            padding: 12px 20px;
            background: var(--burgundy);
            color: var(--cream);
            border: 2px solid var(--rose);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .btn-close:hover {
            background: var(--dark);
        }

        /* ===== BACK OFFICE ===== */
        .backoffice-container {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--dark) 100%);
            padding: 20px;
        }

        .backoffice-header {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .backoffice-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            font-weight: 900;
        }

        .backoffice-tabs {
            display: flex;
            gap: 10px;
            max-width: 1400px;
            margin: 0 auto 30px;
            border-bottom: 2px solid rgba(212, 168, 67, 0.2);
        }

        .bo-tab-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--cream);
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .bo-tab-btn:hover {
            color: var(--gold);
        }

        .bo-tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .backoffice-content {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(90, 26, 42, 0.3);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 30px;
        }

        /* ===== UPLOAD SECTION ===== */
        .upload-wizard {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .wizard-step {
            display: none;
        }

        .wizard-step.active {
            display: block;
        }

        .step-indicator {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .step-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(212, 168, 67, 0.2);
            color: var(--cream);
            font-weight: 700;
            border: 2px solid var(--gold);
        }

        .step-dot.active {
            background: var(--gold);
            color: var(--dark);
        }

        .drag-drop-zone {
            border: 2px dashed var(--gold);
            border-radius: 8px;
            padding: 60px 20px;
            text-align: center;
            background: rgba(212, 168, 67, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .drag-drop-zone:hover {
            background: rgba(212, 168, 67, 0.15);
            border-color: var(--cream);
        }

        .drag-drop-zone.dragover {
            background: rgba(212, 168, 67, 0.25);
            border-color: var(--cream);
        }

        .drag-drop-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .drag-drop-text {
            font-size: 1.1rem;
            color: var(--cream);
            margin-bottom: 10px;
        }

        .drag-drop-hint {
            font-size: 0.85rem;
            color: var(--rose);
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            color: var(--gold);
            font-size: 0.95rem;
        }

        .form-input, .form-select, .form-textarea {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--gold);
            border-radius: 6px;
            color: var(--cream);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--cream);
            box-shadow: 0 0 0 3px rgba(212, 168, 67, 0.2);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-select {
            cursor: pointer;
        }

        .form-select option {
            background: var(--dark);
            color: var(--cream);
        }

        .checkboxes-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--gold);
        }

        .checkbox-item label {
            cursor: pointer;
            color: var(--cream);
        }

        .preview-box {
            background: rgba(212, 168, 67, 0.1);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .preview-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(212, 168, 67, 0.2);
            color: var(--cream);
        }

        .preview-item:last-child {
            border-bottom: none;
        }

        .preview-label {
            font-weight: 600;
            color: var(--gold);
        }

        /* ===== TABLES ===== */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(212, 168, 67, 0.1);
            border-bottom: 2px solid var(--gold);
            padding: 12px;
            text-align: left;
            color: var(--gold);
            font-weight: 600;
        }

        td {
            border-bottom: 1px solid rgba(212, 168, 67, 0.1);
            padding: 12px;
            color: var(--cream);
        }

        tr:hover {
            background: rgba(212, 168, 67, 0.05);
        }

        .table-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .btn-delete {
            background: #C41E3A;
            color: var(--cream);
        }

        .btn-delete:hover {
            background: #A01A2D;
        }

        /* ===== SCORE ANALYSIS ===== */
        .score-table-container {
            margin-top: 20px;
        }

        .score-value {
            font-weight: 700;
            color: var(--gold);
            font-size: 1.1rem;
        }

        .score-bar {
            width: 100%;
            height: 6px;
            background: rgba(212, 168, 67, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold) 0%, var(--rose) 100%);
        }

        .discrepancy-alert {
            background: rgba(196, 30, 58, 0.2);
            border-left: 4px solid #C41E3A;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            color: #FF9999;
        }

        /* ===== CELEBRATION POPUP ===== */
        .celebration-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, var(--wine) 0%, var(--burgundy) 100%);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            z-index: 2000;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            animation: popupSlideIn 0.5s ease;
        }

        @keyframes popupSlideIn {
            from {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .celebration-emoji {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 0.6s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .celebration-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
            font-weight: 700;
        }

        /* ===== TOAST NOTIFICATION ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--gold);
            color: var(--dark);
            padding: 16px 24px;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            font-weight: 600;
            z-index: 1500;
            animation: toastSlideIn 0.4s ease;
        }

        @keyframes toastSlideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ===== CONFIRM DIALOG ===== */
        .confirm-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--dark) 100%);
            border: 2px solid var(--wine);
            border-radius: 12px;
            padding: 40px;
            z-index: 1500;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            max-width: 400px;
            width: 90%;
        }

        .confirm-emoji {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .confirm-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 15px;
            text-align: center;
        }

        .confirm-message {
            color: var(--cream);
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .confirm-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-confirm {
            flex: 1;
            padding: 12px;
            background: #C41E3A;
            color: var(--cream);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .btn-confirm:hover {
            background: #A01A2D;
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: var(--gold);

        const analyzeCodeComplexity = (fileContent) => {
            let score = 0;
            const patterns = {
                functions: /function\s+\w+|\w+\s*:\s*function|const\s+\w+\s*=\s*\(|const\s+\w+\s*=\s*async/gi,
                htmlTags: /<[^>]+>/g,
                cssRules: /[{};]/g,
                imports: /import\s+|require\s*\(/gi,
                conditionals: /if\s*\(|else|switch\s*\(|ternary/gi,
                loops: /for\s*\(|while\s*\(|forEach|map\s*\(|reduce\s*\(/gi,
                hooks: /useState|useEffect|useContext|useCallback|useRef/gi,
                apiCalls: /fetch\s*\(|axios\s*\(|\.get\s*\(|\.post\s*\(/gi,
                eventHandlers: /onClick|onChange|onSubmit|addEventListener/gi,
                comments: /\/\/|\/\*|\*\//g,
                errorHandling: /try|catch|throw|error|Error/gi,
            };
            score += (fileContent.match(patterns.functions) || []).length * 5;
            score += (fileContent.match(patterns.htmlTags) || []).length * 2;
            score += (fileContent.match(patterns.cssRules) || []).length * 1;
            score += (fileContent.match(patterns.imports) || []).length * 3;
            score += (fileContent.match(patterns.conditionals) || []).length * 4;
            score += (fileContent.match(patterns.loops) || []).length * 4;
            score += (fileContent.match(patterns.hooks) || []).length * 6;
            score += (fileContent.match(patterns.apiCalls) || []).length * 7;
            score += (fileContent.match(patterns.eventHandlers) || []).length * 3;
            score += (fileContent.match(patterns.comments) || []).length * 1;
            score += (fileContent.match(patterns.errorHandling) || []).length * 2;
            score += Math.ceil(fileContent.length / 1000) * 2;
            return Math.ceil(score);
        };

            const rawScores = platforms.map(p => ({

                rawScore: analyzeCodeComplexity(p.fileContent || '')
            }));
            const maxRaw = Math.max(...rawScores.map(p => p.rawScore));
            return rawScores.map(p => ({

                score: maxRaw > 0 ? Math.ceil((p.rawScore / maxRaw) * 100) : 50

                    url: formData.url,
                    uploadedBy: currentUser.name,
                    uploadedDate: new Date().toISOString(),
                    fileSize: fileContent.length + ' bytes',
                    fileContent: fileContent,
                    allowedRoles: Object.keys(formData.roles).filter(r => formData.roles[r])
                };
                const platformsObj = {};
                platformsObj[newPlatform.id] = newPlatform;
                db.ref('platforms/' + newPlatform.id).set(newPlatform);
                onPlatformAdded();
                setStep(1);
                setFileContent('');
                setFileName('');
                setFormData({ name: '', section: 'tools', description: '', url: '', roles: { guest: false, concierge: true, bellboy: true } });
            };

            return (
                <div className="upload-wizard">
                    <div className="step-indicator">
                        {[1, 2, 3].map(s => (
                            <div key={s} className={`step-dot ${step === s ? 'active' : ''}`}>{s}</div>
                        ))}
                    </div>

                    {step === 1 && (
                        <div className="wizard-step active">
                            <h3 style={{color: '#D4A843', marginBottom: '20px'}}>{t('step1')}</h3>
                            <div
                                className={`drag-drop-zone ${dragOver ? 'dragover' : ''}`}
                                onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                                onDragLeave={() => setDragOver(false)}
                                onDrop={handleFileDrop}
                            >
                                <div className="drag-drop-icon">📁</div>
                                <div className="drag-drop-text">{t('dragDropFile')}</div>
                                <div className="drag-drop-hint">{t('orClickToSelect')}</div>
                            </div>
                            {fileName && <div style={{marginTop: '15px', color: '#C7959B'}}>Selected: {fileName}</div>}
                            <div style={{marginTop: '25px', display: 'flex', gap: '10px'}}>
                                <button className="btn-secondary" onClick={() => setStep(2)} disabled={!fileContent} style={{flex: 1}}>
                                    {t('next')}
                                </button>
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="wizard-step active">
                            <h3 style={{color: '#D4A843', marginBottom: '20px'}}>{t('step2')}</h3>
                            <div className="upload-form">
                                <div className="form-group">
                                    <label className="form-label">{t('platformName')}</label>
                                    <input className="form-input" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">{t('platformSection')}</label>
                                    <select className="form-select" value={formData.section} onChange={(e) => setFormData({...formData, section: e.target.value})}>
                                        <option value="tools">{t('toolsFloor')}</option>
                                        <option value="analysis">{t('analysisFloor')}</option>
                                        <option value="strategy">{t('strategyFloor')}</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">{t('platformDescription')}</label>
                                    <textarea className="form-textarea" value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">{t('platformURL')}</label>
                                    <input className="form-input" type="url" value={formData.url} onChange={(e) => setFormData({...formData, url: e.target.value})} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">{t('allowedRoles')}</label>
                                    <div className="checkboxes-group">
                                        {['guest', 'concierge', 'bellboy'].map(role => (
                                            <div key={role} className="checkbox-item">
                                                <input
                                                    type="checkbox"
                                                    id={role}
                                                    checked={formData.roles[role]}
                                                    onChange={(e) => setFormData({...formData, roles: {...formData.roles, [role]: e.target.checked}})}
                                                />
                                                <label htmlFor={role}>{t('role' + role.charAt(0).toUpperCase() + role.slice(1))}</label>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div style={{marginTop: '25px', display: 'flex', gap: '10px'}}>
                                <button className="btn-secondary" onClick={() => setStep(1)} style={{flex: 1}}>{t('back')}</button>
                                <button className="btn-secondary" onClick={() => setStep(3)} style={{flex: 1}}>{t('next')}</button>
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="wizard-step active">
                            <h3 style={{color: '#D4A843', marginBottom: '20px'}}>{t('step3')}</h3>
                            <div className="preview-box">
                                <div className="preview-item">
                                    <span className="preview-label">{t('platformName')}:</span>
                                    <span>{formData.name}</span>
                                </div>
                                <div className="preview-item">
                                    <span className="preview-label">{t('platformSection')}:</span>
                                    <span>{formData.section}</span>
                                </div>
                                <div className="preview-item">
                                    <span className="preview-label">{t('platformDescription')}:</span>
                                    <span>{formData.description}</span>
                                </div>
                                <div className="preview-item">
                                    <span className="preview-label">{t('platformURL')}:</span>
                                    <span>{formData.url}</span>
                                </div>
                            </div>
                            <div style={{marginTop: '25px', display: 'flex', gap: '10px'}}>
                                <button className="btn-secondary" onClick={() => setStep(2)} style={{flex: 1}}>{t('back')}</button>
                                <button className="btn-secondary" onClick={handlePublish} style={{flex: 1}}>{t('publish')}</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const GuestRegistryTab = ({ users, currentUser, onUserAdded, onUserDeleted }) => {
            const t = useT();
            const [newUser, setNewUser] = useState({ name: '', email: '', role: 'guest' });
            const [confirmDelete, setConfirmDelete] = useState(null);

            const handleAddUser = () => {
                if (newUser.name && newUser.email) {
                    const user = {
                        id: Date.now(),
                        name: newUser.name,
                        email: newUser.email,
                        role: newUser.role,
                        avatar: newUser.name.split(' ').map(n => n[0]).join('').toUpperCase()
                    };
                    db.ref('users/' + user.id).set(user);
                    onUserAdded();
                    setNewUser({ name: '', email: '', role: 'guest' });
                }
            };

            const handleDeleteUser = (userId) => {
                db.ref('users/' + userId).remove();
                onUserDeleted();
                setConfirmDelete(null);
            };

            return (
                <div>
                    <h3 style={{color: '#D4A843', marginBottom: '20px'}}>{t('addUser')}</h3>
                    <div className="upload-form" style={{marginBottom: '40px'}}>
                        <div className="form-group">
                            <label className="form-label">{t('userName')}</label>
                            <input className="form-input" value={newUser.name} onChange={(e) => setNewUser({...newUser, name: e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label className="form-label">{t('userEmail')}</label>
                            <input className="form-input" type="email" value={newUser.email} onChange={(e) => setNewUser({...newUser, email: e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label className="form-label">{t('userRole')}</label>
                            <select className="form-select" value={newUser.role} onChange={(e) => setNewUser({...newUser, role: e.target.value})}>
                                <option value="guest">{t('roleGuest')}</option>
                                <option value="concierge">{t('roleConcierge')}</option>
                                <option value="bellboy">{t('roleBellboy')}</option>
                            </select>
                        </div>
                        <button className="btn-secondary" onClick={handleAddUser}>{t('addUser')}</button>
                    </div>

                    <h3 style={{color: '#D4A843', marginBottom: '20px'}}>{t('guestRegistry')}</h3>
                    <div className="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>{t('userName')}</th>
                                    <th>{t('userEmail')}</th>
                                    <th>{t('userRole')}</th>
                                    <th>{t('delete')}</th>
                                </tr>
                            </thead>
                            <tbody>
                                {users.map(user => (
                                    <tr key={user.id}>
                                        <td>{user.name}</td>
                                        <td>{user.email}</td>
                                        <td style={{textTransform: 'capitalize'}}>{user.role}</td>
                                        <td>
                                            {currentUser.role === 'bellboy' && (
                                                <button className="btn-small btn-delete" onClick={() => setConfirmDelete(user)}>
                                                    {t('delete')}
                                                </button>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {confirmDelete && (
                        <ConfirmDialog
                            title={t('deleteConfirm')}
                            message={t('deleteMessage')}
                            emoji="⚠️"
                            onConfirm={() => handleDeleteUser(confirmDelete.id)}
                            onCancel={() => setConfirmDelete(null)}
                        />
                    )}
                </div>
            );
        };

        const ScoreAnalysisTab = ({ platforms }) => {
            const t = useT();
            const scoredPlatforms = calcScores(platforms);
            const grouped = {};
            scoredPlatforms.forEach(p => {
                if (!grouped[p.section]) grouped[p.section] = [];
                grouped[p.section].push(p);
            });

            const detectDiscrepancies = (section) => {
                const sectionPlatforms = grouped[section] || [];
                const scores = sectionPlatforms.map(p => p.score);
                if (scores.length < 2) return [];
                const discrepancies = [];
                for (let i = 0; i < scores.length; i++) {
                    for (let j = i + 1; j < scores.length; j++) {
                        if (Math.abs(scores[i] - scores[j]) > 30) {
                            discrepancies.push({
                                platform1: sectionPlatforms[i].name,
                                platform2: sectionPlatforms[j].name,
                                diff: Math.abs(scores[i] - scores[j])
                            });
                        }
                    }
                }
                return discrepancies;
            };

            return (
                <div>
                    {Object.entries(grouped).map(([section, sectionPlats]) => (
                        <div key={section} style={{marginBottom: '40px'}}>
                            <h3 style={{color: '#D4A843', marginBottom: '20px', textTransform: 'capitalize'}}>{section}</h3>

                            {(() => {
                                const disc = detectDiscrepancies(section);
                                return disc.length > 0 ? (
                                    <div className="discrepancy-alert">
                                        <strong>{t('discrepancyTitle')}:</strong> {t('discrepancyMsg')} - {disc[0].platform1} vs {disc[0].platform2} ({disc[0].diff} pts)
                                    </div>
                                ) : null;
                            })()}

                            <div className="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>{t('platformName')}</th>
                                            <th>{t('platformScore')}</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {sectionPlats.map(platform => (
                                            <tr key={platform.id}>
                                                <td>{platform.name}</td>
                                                <td>
                                                    <div className="score-value">{platform.score}</div>
                                                    <div className="score-bar">
                                                        <div className="score-fill" style={{width: platform.score + '%'}}></div>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const BackOfficeScreen = ({ currentUser, platforms, users, onLogout, onTabChange }) => {
            const t = useT();
            const [activeTab, setActiveTab] = useState('upload');
            const [toast, setToast] = useState(null);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const handleLogout = () => {
                localStorage.removeItem('ailobby_lang');
                onLogout();
            };

            return (
                <div className="backoffice-container">
                    <div className="backoffice-header">
                        <h1 className="backoffice-title">{t('backOffice')}</h1>
                        <button className="btn-secondary btn-logout" onClick={handleLogout}>{t('logout')}</button>
                    </div>

                    <div className="backoffice-tabs">
                        {['upload', 'guests', 'scores', 'discrepancy'].map(tab => (
                            <button
                                key={tab}
                                className={`bo-tab-btn ${activeTab === tab ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab)}
                            >
                                {tab === 'upload' && t('uploadPlatform')}
                                {tab === 'guests' && t('guestRegistry')}
                                {tab === 'scores' && t('scoreAnalysis')}
                                {tab === 'discrepancy' && t('discrepancyDetector')}
                            </button>
                        ))}
                    </div>

                    <div className="backoffice-content">
                        {activeTab === 'upload' && <UploadPlatformTab currentUser={currentUser} onPlatformAdded={() => showToast(t('platformAdded'))} />}
                        {activeTab === 'guests' && <GuestRegistryTab users={users} currentUser={currentUser} onUserAdded={() => showToast(t('userAdded'))} onUserDeleted={() => showToast(t('userDeleted'))} />}
                        {activeTab === 'scores' && <ScoreAnalysisTab platforms={platforms} />}
                    </div>

                    {toast && <Toast message={toast} />}
                </div>
            );
        };

        const LoadingScreen = () => {
            const t = useT();
            return (
                <div className="loading-screen">
                    <div className="loading-content">
                        <div className="loading-icon">🔔</div>
                        <div className="loading-text">{t('loadingMessage')}</div>
                        <div className="loading-subtitle">{t('connectingNetwork')}</div>
                    </div>
                </div>
            );
        };

        // ===== MAIN APP =====
        const App = () => {
            const [lang, setLang] = useState(() => localStorage.getItem('ailobby_lang') || 'en');
            const [currentUser, setCurrentUser] = useState(null);
            const [platforms, setPlatforms] = useState([]);
            const [users, setUsers] = useState(initialUsers);
            const [showBackOffice, setShowBackOffice] = useState(false);
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [celebration, setCelebration] = useState(null);

            useEffect(() => {
                localStorage.setItem('ailobby_lang', lang);
            }, [lang]);

            useEffect(() => {
                const platformsRef = db.ref('platforms');
                platformsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setPlatforms(Object.values(data));
                    } else {
                        setPlatforms([]);
                    }
                    setFirebaseReady(true);
                });

                const usersRef = db.ref('users');
                usersRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const userList = Object.values(data);
                        const mergedUsers = [...initialUsers];
                        userList.forEach(fbUser => {
                            if (!mergedUsers.find(u => u.email === fbUser.email)) {
                                mergedUsers.push(fbUser);
                            }
                        });
                        setUsers(mergedUsers);
                    }
                });

                return () => {
                    platformsRef.off();
                    usersRef.off();
                };
            }, []);

            if (!firebaseReady) {
                return (
                    <LangContext.Provider value={{ lang, setLang }}>
                        <LoadingScreen />
                    </LangContext.Provider>
                );
            }

            return (
                <LangContext.Provider value={{ lang, setLang }}>
                    {!currentUser ? (
                        <>
                            <LoginScreen onLogin={setCurrentUser} users={users} />
                            {celebration && <CelebrationPopup phrase={celebration.phrase} onDismiss={() => setCelebration(null)} />}
                        </>
                    ) : showBackOffice ? (
                        <>
                            <BackOfficeScreen
                                currentUser={currentUser}
                                platforms={platforms}
                                users={users}
                                onLogout={() => setCurrentUser(null)}
                                onTabChange={() => {}}
                            />
                            {celebration && <CelebrationPopup phrase={celebration.phrase} onDismiss={() => setCelebration(null)} />}
                        </>
                    ) : (
                        <>
                            <LobbyScreen
                                currentUser={currentUser}
                                onLogout={() => setCurrentUser(null)}
                                platforms={platforms}
                                onShowBackOffice={() => {
                                    const celebPhrases = [
                                        translations[lang]['celebration1'],
                                        translations[lang]['celebration2'],
                                        translations[lang]['celebration3'],
                                        translations[lang]['celebration4'],
                                        translations[lang]['celebration5'],
                                    ];
                                    setCelebration({ phrase: celebPhrases[Math.floor(Math.random() * celebPhrases.length)] });
                                    setShowBackOffice(true);
                                }}
                            />
                            {celebration && <CelebrationPopup phrase={celebration.phrase} onDismiss={() => setCelebration(null)} />}
                        </>
                    )}
                </LangContext.Provider>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
