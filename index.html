<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI LOBBY — The Grand Intelligence Hotel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --wine:#9B2335;--burgundy:#5A1A2A;--gold:#D4A843;--cream:#FAF0E4;
  --dark:#1A0A0E;--brown:#3E1C11;--rose:#C7959B;--ivory:#FFF8F0;
  --green:#2A5A3A;--shadow:rgba(26,10,14,0.3);
}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Playfair Display',serif}
.subtitle{font-family:'Cormorant Garamond',serif;font-style:italic}

/* Ornamental borders */
.ornament{position:relative;text-align:center;margin:16px 0}
.ornament::before,.ornament::after{content:'';display:inline-block;width:60px;height:1px;background:var(--gold);vertical-align:middle}
.ornament span{padding:0 16px;color:var(--gold);font-size:14px;letter-spacing:4px;text-transform:uppercase;font-family:'Cormorant Garamond',serif}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--burgundy);border-radius:4px}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes doorOpen{from{transform:perspective(800px) rotateY(0)}to{transform:perspective(800px) rotateY(-25deg)}}

.fade-in{animation:fadeIn 0.5s ease}

/* Login */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dark) 0%,var(--burgundy) 50%,var(--dark) 100%);position:relative;overflow:hidden}
.login-bg::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L55 30L30 55L5 30Z' fill='none' stroke='%23D4A84320' stroke-width='0.5'/%3E%3C/svg%3E");opacity:0.3}
.login-card{background:linear-gradient(145deg,rgba(90,26,42,0.9),rgba(26,10,14,0.95));border:2px solid var(--gold);border-radius:16px;padding:48px;width:420px;max-width:90vw;text-align:center;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:fadeIn 0.8s ease}
.login-card h1{font-size:32px;color:var(--gold);margin-bottom:4px}
.login-card .subtitle{font-size:18px;color:var(--rose);margin-bottom:32px;display:block}
.login-input{width:100%;padding:14px 18px;border:1px solid var(--gold);background:rgba(255,248,240,0.08);color:var(--cream);border-radius:8px;font-size:16px;font-family:'Inter',sans-serif;transition:all 0.3s}
.login-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 20px rgba(212,168,67,0.2);background:rgba(255,248,240,0.12)}
.login-input::placeholder{color:var(--rose);opacity:0.6}
.login-btn{width:100%;padding:14px;border:none;background:linear-gradient(135deg,var(--gold),#B8922F);color:var(--dark);font-family:'Playfair Display',serif;font-size:18px;font-weight:700;border-radius:8px;cursor:pointer;margin-top:16px;transition:all 0.3s;letter-spacing:1px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,168,67,0.3)}
.login-error{color:#FF6B6B;font-size:14px;margin-top:12px;animation:fadeIn 0.3s}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:linear-gradient(90deg,var(--dark),var(--burgundy),var(--dark));border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:50}
.topbar h1{font-size:22px;color:var(--gold);letter-spacing:2px}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-user{display:flex;align-items:center;gap:8px;color:var(--rose);font-size:14px}
.topbar-avatar{width:36px;height:36px;border-radius:50%;background:var(--wine);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--gold);border:1px solid var(--gold)}
.tab-btn{padding:8px 20px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:15px;cursor:pointer;transition:all 0.3s;border-radius:6px;letter-spacing:1px}
.tab-btn.active,.tab-btn:hover{background:var(--gold);color:var(--dark);font-weight:600}
.logout-btn{padding:8px 16px;border:1px solid var(--rose);background:transparent;color:var(--rose);border-radius:6px;cursor:pointer;font-size:13px;transition:all 0.3s}
.logout-btn:hover{background:var(--rose);color:var(--dark)}

/* Lobby */
.lobby{padding:32px;max-width:1400px;margin:0 auto}
.lobby-title{text-align:center;font-size:28px;color:var(--gold);margin-bottom:8px}
.columns{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:24px}
.column{background:linear-gradient(180deg,rgba(90,26,42,0.3),rgba(26,10,14,0.5));border:1px solid rgba(212,168,67,0.2);border-radius:12px;padding:24px;min-height:400px}
.column-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);text-align:center;padding-bottom:12px;border-bottom:1px solid rgba(212,168,67,0.2);margin-bottom:16px;letter-spacing:2px}
.empty-col{text-align:center;padding:40px 20px;color:var(--rose);opacity:0.5;font-style:italic;font-family:'Cormorant Garamond',serif}

/* Room Door Card — Videogame Level Style */
.room-door{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.4s;margin-bottom:16px;border:2px solid rgba(212,168,67,0.3);min-height:180px}
.room-door:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.4);border-color:var(--gold)}
.room-preview{width:100%;height:140px;position:relative;overflow:hidden}
.room-preview canvas{width:100%;height:100%;display:block}
.room-info{padding:12px 16px;background:linear-gradient(180deg,rgba(26,10,14,0.9),rgba(90,26,42,0.7))}
.room-number{font-family:'Playfair Display',serif;font-size:11px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;opacity:0.8}
.room-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--cream);margin-top:2px}
.room-score-badge{position:absolute;top:10px;right:10px;background:rgba(26,10,14,0.85);border:1px solid var(--gold);border-radius:20px;padding:4px 12px;font-family:'Playfair Display',serif;font-size:13px;color:var(--gold);font-weight:700;z-index:2}
.room-category-badge{position:absolute;top:10px;left:10px;background:rgba(212,168,67,0.9);color:var(--dark);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600;z-index:2;letter-spacing:1px;text-transform:uppercase}

/* Expanded Room Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn 0.3s}
.modal-content{background:linear-gradient(145deg,var(--burgundy),var(--dark));border:2px solid var(--gold);border-radius:16px;padding:0;width:560px;max-width:92vw;max-height:85vh;overflow-y:auto;position:relative;animation:slideDown 0.4s ease}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--gold);font-size:24px;cursor:pointer;z-index:5;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background 0.3s}
.modal-close:hover{background:rgba(212,168,67,0.2)}
.modal-preview{width:100%;height:200px;position:relative;overflow:hidden;border-radius:14px 14px 0 0}
.modal-preview canvas{width:100%;height:100%;display:block}
.modal-body{padding:24px 32px 32px}
.modal-body h2{font-size:24px;color:var(--gold);margin-bottom:4px}
.modal-body .subtitle{color:var(--rose);font-size:16px;display:block;margin-bottom:16px}
.modal-meta{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.meta-chip{background:rgba(212,168,67,0.12);border:1px solid rgba(212,168,67,0.3);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--gold)}
.modal-desc{color:var(--cream);line-height:1.7;font-size:15px;margin-bottom:20px;opacity:0.9}
.modal-score{display:flex;align-items:center;gap:16px;padding:16px;background:rgba(0,0,0,0.2);border-radius:10px;margin-bottom:20px}
.score-circle{width:60px;height:60px;border-radius:50%;border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);flex-shrink:0}
.score-bar{flex:1}
.score-bar-track{height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;background:linear-gradient(90deg,var(--wine),var(--gold));border-radius:4px;transition:width 0.8s ease}
.score-label{font-size:13px;color:var(--rose);margin-top:4px}
.access-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;margin-bottom:20px}
.access-full{background:rgba(42,90,58,0.3);border:1px solid var(--green);color:#6FCF97}
.access-view{background:rgba(212,168,67,0.15);border:1px solid var(--gold);color:var(--gold)}
.access-use{background:rgba(42,90,128,0.3);border:1px solid #5B8DEF;color:#5B8DEF}
.access-no{background:rgba(155,35,53,0.2);border:1px solid var(--wine);color:#FF6B6B}
.enter-btn{width:100%;padding:14px;border:none;background:linear-gradient(135deg,var(--gold),#B8922F);color:var(--dark);font-family:'Playfair Display',serif;font-size:16px;font-weight:700;border-radius:8px;cursor:pointer;transition:all 0.3s;letter-spacing:1px}
.enter-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,168,67,0.3)}
.enter-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}

/* Access Denied */
.denied-modal{text-align:center;padding:40px 32px}
.denied-bell{font-size:64px;display:block;margin-bottom:16px;animation:float 2s ease infinite}
.denied-title{font-size:24px;color:var(--gold);margin-bottom:8px}
.denied-text{color:var(--rose);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:18px}
.denied-close{margin-top:24px;padding:10px 32px;border:1px solid var(--gold);background:transparent;color:var(--gold);border-radius:8px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px;transition:all 0.3s}
.denied-close:hover{background:var(--gold);color:var(--dark)}

/* Config / Back Office */
.config{padding:32px;max-width:1200px;margin:0 auto}
.config-section{background:linear-gradient(145deg,rgba(90,26,42,0.2),rgba(26,10,14,0.4));border:1px solid rgba(212,168,67,0.2);border-radius:12px;padding:28px;margin-bottom:28px}
.config-section h3{font-size:20px;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.config-table{width:100%;border-collapse:collapse}
.config-table th{text-align:left;padding:12px 16px;border-bottom:2px solid rgba(212,168,67,0.3);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:1px}
.config-table td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;color:var(--cream)}
.role-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;text-transform:capitalize}
.role-bellboy{background:rgba(212,168,67,0.2);color:var(--gold);border:1px solid var(--gold)}
.role-concierge{background:rgba(42,90,58,0.2);color:#6FCF97;border:1px solid #6FCF97}
.role-guest{background:rgba(199,149,155,0.2);color:var(--rose);border:1px solid var(--rose)}

/* Upload Section */
.upload-steps{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px}
.upload-step{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--rose);opacity:0.5;transition:all 0.3s}
.upload-step.active{opacity:1;color:var(--gold)}
.upload-step.done{opacity:0.7;color:#6FCF97}
.step-num{width:28px;height:28px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
.step-line{width:40px;height:1px;background:rgba(212,168,67,0.3)}
.dropzone{border:2px dashed rgba(212,168,67,0.4);border-radius:12px;padding:48px;text-align:center;cursor:pointer;transition:all 0.3s;background:rgba(255,248,240,0.02)}
.dropzone:hover,.dropzone.active{border-color:var(--gold);background:rgba(212,168,67,0.06)}
.dropzone-icon{font-size:48px;margin-bottom:12px}
.dropzone-text{color:var(--rose);font-size:15px;margin-bottom:8px}
.dropzone-sub{color:var(--rose);font-size:13px;opacity:0.6}
.url-input{width:100%;padding:12px 16px;border:1px solid rgba(212,168,67,0.3);background:rgba(255,248,240,0.06);color:var(--cream);border-radius:8px;font-size:14px;margin-top:16px;font-family:'Inter',sans-serif}
.url-input:focus{outline:none;border-color:var(--gold)}
.url-input::placeholder{color:var(--rose);opacity:0.5}
.upload-form{display:grid;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;color:var(--gold);font-family:'Cormorant Garamond',serif;letter-spacing:1px}
.form-input,.form-select,.form-textarea{padding:10px 14px;border:1px solid rgba(212,168,67,0.3);background:rgba(255,248,240,0.06);color:var(--cream);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--gold)}
.form-select{cursor:pointer}
.form-select option{background:var(--dark);color:var(--cream)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.checkbox-label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--cream);cursor:pointer;padding:6px 12px;border:1px solid rgba(212,168,67,0.2);border-radius:6px;transition:all 0.3s}
.checkbox-label:hover{border-color:var(--gold)}
.checkbox-label input{accent-color:var(--gold)}
.checkbox-label.locked{opacity:0.7;cursor:default}
.upload-nav{display:flex;justify-content:space-between;margin-top:24px}
.nav-btn{padding:10px 24px;border-radius:8px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:15px;transition:all 0.3s;letter-spacing:1px}
.nav-btn.primary{background:linear-gradient(135deg,var(--gold),#B8922F);color:var(--dark);border:none;font-weight:600}
.nav-btn.primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,168,67,0.3)}
.nav-btn.secondary{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.nav-btn.secondary:hover{background:rgba(212,168,67,0.1)}
.nav-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* Review card */
.review-card{background:rgba(0,0,0,0.2);border:1px solid rgba(212,168,67,0.2);border-radius:10px;padding:20px}
.review-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px}
.review-row:last-child{border-bottom:none}
.review-label{color:var(--rose);font-family:'Cormorant Garamond',serif}
.review-value{color:var(--cream);font-weight:500}

/* AI Concierge */
.ai-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.ai-tab{padding:8px 18px;border:1px solid rgba(212,168,67,0.3);background:transparent;color:var(--rose);border-radius:20px;cursor:pointer;font-size:13px;transition:all 0.3s}
.ai-tab.active{background:var(--gold);color:var(--dark);font-weight:600;border-color:var(--gold)}
.ai-card{background:rgba(0,0,0,0.2);border:1px solid rgba(212,168,67,0.15);border-radius:10px;padding:16px;margin-bottom:12px}
.ai-card h4{color:var(--gold);font-size:15px;margin-bottom:8px}
.ai-card p{color:var(--cream);font-size:14px;line-height:1.6;opacity:0.85}
.ai-status{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.ai-status.warn{background:rgba(255,193,7,0.2);color:#FFD54F}
.ai-status.ok{background:rgba(76,175,80,0.2);color:#81C784}
.ai-status.info{background:rgba(33,150,243,0.2);color:#64B5F6}

/* Welcome popup */
.welcome-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn 0.3s}
.welcome-card{background:linear-gradient(145deg,var(--burgundy),var(--dark));border:2px solid var(--gold);border-radius:16px;padding:40px 32px;width:480px;max-width:90vw;text-align:center;animation:slideDown 0.5s ease}
.welcome-bell{font-size:56px;display:block;margin-bottom:12px;animation:float 2s ease infinite}
.welcome-phrase{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:8px}
.welcome-sub{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--rose);font-size:16px;margin-bottom:24px;line-height:1.5}
.welcome-instructions{text-align:left;background:rgba(0,0,0,0.2);border-radius:10px;padding:16px 20px;margin-bottom:24px}
.welcome-instructions li{color:var(--cream);font-size:14px;margin-bottom:8px;opacity:0.9;list-style:none;padding-left:20px;position:relative}
.welcome-instructions li::before{content:'🔑';position:absolute;left:0;font-size:12px}
.welcome-ok{padding:12px 40px;border:none;background:linear-gradient(135deg,var(--gold),#B8922F);color:var(--dark);font-family:'Playfair Display',serif;font-size:16px;font-weight:700;border-radius:8px;cursor:pointer;transition:all 0.3s}
.welcome-ok:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,168,67,0.3)}

/* Add User Modal */
.add-user-form{display:grid;gap:16px}
.add-btn{padding:8px 18px;border:1px solid var(--gold);background:transparent;color:var(--gold);border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.3s;display:flex;align-items:center;gap:6px}
.add-btn:hover{background:rgba(212,168,67,0.1)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,var(--burgundy),var(--dark));border:1px solid var(--gold);border-radius:10px;padding:14px 24px;color:var(--cream);font-size:14px;z-index:300;animation:slideDown 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:flex;align-items:center;gap:10px}
.toast-icon{font-size:20px}

/* Platform file info */
.file-info{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(42,90,58,0.15);border:1px solid rgba(42,90,58,0.3);border-radius:8px;margin-top:12px}
.file-info-icon{font-size:24px}
.file-info-name{color:#6FCF97;font-size:14px;font-weight:500}
.file-info-size{color:var(--rose);font-size:12px}
.file-info-remove{margin-left:auto;background:none;border:none;color:#FF6B6B;cursor:pointer;font-size:18px}

/* Responsive */
@media(max-width:900px){
  .columns{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Storage ───
const STORAGE_KEYS = { users: 'ailobby_users', platforms: 'ailobby_platforms' };
function loadFromStorage(key, fallback) {
  try { const raw = localStorage.getItem(key); if (raw) return JSON.parse(raw); } catch(e) {}
  return fallback;
}
function saveToStorage(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}

// ─── Initial Data ───
const initialUsers = [
  { id: 1, name: "Rafa Vázquez", email: "r.vazquez@sesametime.com", role: "bellboy", avatar: "RV" },
  { id: 2, name: "Carlos Méndez", email: "c.mendez@sesametime.com", role: "concierge", avatar: "CM" },
  { id: 3, name: "Laura García", email: "l.garcia@sesametime.com", role: "concierge", avatar: "LG" },
  { id: 4, name: "Ana López", email: "a.lopez@sesametime.com", role: "guest", avatar: "AL" },

// ─── Code Complexity Analysis ───
function analyzeCodeComplexity(content, fileName) {
  if (!content) return 10;
  const text = typeof content === 'string' ? content : '';
  const len = text.length;

  // Count various code indicators
  const functionCount = (text.match(/function\s+\w+|=>\s*[{(]|\.prototype\.|class\s+\w+|def\s+\w+|const\s+\w+\s*=\s*\(/g) || []).length;
  const htmlTags = (text.match(/<[a-zA-Z][^>]*>/g) || []).length;
  const cssRules = (text.match(/[{][^}]*[}]/g) || []).length;
  const imports = (text.match(/import\s+|require\s*\(|from\s+['"]/g) || []).length;
  const conditionals = (text.match(/\bif\b|\belse\b|\bswitch\b|\bcase\b|\?\s*.*:/g) || []).length;
  const loops = (text.match(/\bfor\b|\bwhile\b|\b\.map\b|\b\.forEach\b|\b\.reduce\b|\b\.filter\b/g) || []).length;
  const stateHooks = (text.match(/useState|useEffect|useRef|useCallback|useMemo|useReducer|useContext/g) || []).length;
  const apiCalls = (text.match(/fetch\s*\(|axios\.|XMLHttpRequest|\.ajax\(/g) || []).length;
  const eventHandlers = (text.match(/onClick|onChange|onSubmit|addEventListener|on[A-Z]\w+=/g) || []).length;
  const comments = (text.match(/\/\/|\/\*|\*\/|#\s+\w/g) || []).length;
  const errorHandling = (text.match(/try\s*{|catch\s*\(|\.catch\(|throw\s+/g) || []).length;

  // Weighted score
  let score = 0;
  score += Math.min(len / 500, 30); // Size: up to 30 pts
  score += Math.min(functionCount * 3, 20); // Functions: up to 20 pts
  score += Math.min(htmlTags * 0.3, 10); // HTML: up to 10 pts
  score += Math.min(cssRules * 0.5, 8); // CSS: up to 8 pts
  score += Math.min(imports * 2, 8); // Imports: up to 8 pts
  score += Math.min(conditionals * 1.5, 8); // Conditionals: up to 8 pts
  score += Math.min(loops * 2, 6); // Loops: up to 6 pts
  score += Math.min(stateHooks * 3, 6); // Hooks: up to 6 pts
  score += Math.min(apiCalls * 3, 4); // API: up to 4 pts
  score += Math.min(eventHandlers * 1.5, 5); // Events: up to 5 pts
  score += Math.min(comments * 0.5, 3); // Comments: up to 3 pts
  score += Math.min(errorHandling * 2, 4); // Error handling: up to 4 pts

  return Math.max(1, Math.round(score));
}

function calcScores(platforms) {
  if (!platforms.length) return {};
  const maxRaw = Math.max(...platforms.map(p => p.complexity || 1));
  const s = {};
  platforms.forEach(p => {
    const raw = p.complexity || 1;
    s[p.id] = maxRaw > 0 ? Math.round((raw / maxRaw) * 100) : 50;
  });
  return s;
}

// ─── Visual Preview Generator ───
const CATEGORY_PALETTES = {
  tools: { bg: '#1a2744', accent: '#4A90D9', secondary: '#2E5C8A', highlight: '#7BB8F5', ground: '#0D1B30' },
  analysis: { bg: '#1E2A1A', accent: '#5CB85C', secondary: '#2E7D32', highlight: '#A5D6A7', ground: '#0D1A0D' },
  strategy: { bg: '#2A1A2E', accent: '#9B59B6', secondary: '#6C3483', highlight: '#CE93D8', ground: '#1A0D1E' }
};

function generatePlatformVisual(canvas, platform, score) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2 || 600;
  const H = canvas.height = canvas.offsetHeight * 2 || 280;
  ctx.imageSmoothingEnabled = true;

  const palette = CATEGORY_PALETTES[platform.section] || CATEGORY_PALETTES.tools;
  const seed = hashString(platform.name + platform.id);
  const rng = seededRandom(seed);

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  skyGrad.addColorStop(0, darken(palette.bg, 20));
  skyGrad.addColorStop(1, palette.bg);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 30; i++) {
    const x = rng() * W, y = rng() * H * 0.5;
    const s = rng() * 2 + 0.5;
    ctx.beginPath();
    ctx.arc(x, y, s, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${rng() * 0.5 + 0.2})`;
    ctx.fill();
  }

  // Ground
  const groundY = H * 0.68;
  const groundGrad = ctx.createLinearGradient(0, groundY, 0, H);
  groundGrad.addColorStop(0, palette.ground);
  groundGrad.addColorStop(1, darken(palette.ground, 30));
  ctx.fillStyle = groundGrad;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  for (let x = 0; x <= W; x += 20) {
    ctx.lineTo(x, groundY + Math.sin(x * 0.02 + seed) * 8);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.fill();

  // Grid lines on ground (perspective)
  ctx.strokeStyle = `${palette.accent}22`;
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const y = groundY + i * 12 + 10;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  for (let i = 0; i < 12; i++) {
    const x = (W / 12) * i + (seed % 30);
    ctx.beginPath();
    ctx.moveTo(x, groundY);
    ctx.lineTo(W / 2 + (x - W / 2) * 2, H);
    ctx.stroke();
  }

  // Platform-specific buildings/structures
  const numBuildings = 3 + Math.floor(rng() * 3);
  for (let i = 0; i < numBuildings; i++) {
    const bx = (W / (numBuildings + 1)) * (i + 1) + (rng() - 0.5) * 40;
    const bw = 30 + rng() * 50;
    const bh = 40 + rng() * (H * 0.3);
    const by = groundY - bh;

    // Building body
    const bGrad = ctx.createLinearGradient(bx - bw/2, by, bx + bw/2, by);
    bGrad.addColorStop(0, palette.secondary);
    bGrad.addColorStop(1, darken(palette.secondary, 20));
    ctx.fillStyle = bGrad;
    roundRect(ctx, bx - bw/2, by, bw, bh, 4);

    // Windows
    const rows = Math.floor(bh / 20);
    const cols = Math.floor(bw / 18);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const wx = bx - bw/2 + 8 + c * 18;
        const wy = by + 8 + r * 20;
        const lit = rng() > 0.4;
        ctx.fillStyle = lit ? `${palette.highlight}BB` : `${palette.ground}88`;
        ctx.fillRect(wx, wy, 10, 12);
      }
    }

    // Roof accent
    ctx.fillStyle = palette.accent;
    ctx.fillRect(bx - bw/2 - 2, by - 3, bw + 4, 6);
  }

  // Central icon/monument
  const cx = W / 2, cy = groundY - 20;
  ctx.beginPath();
  ctx.arc(cx, cy - 40, 25, 0, Math.PI * 2);
  ctx.fillStyle = `${palette.accent}44`;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy - 40, 18, 0, Math.PI * 2);
  ctx.fillStyle = `${palette.accent}88`;
  ctx.fill();

  // Category icon in center
  ctx.font = `bold ${28}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  const icons = { tools: '⚙', analysis: '📊', strategy: '♟' };
  ctx.fillText(icons[platform.section] || '🏨', cx, cy - 40);

  // Floating particles
  for (let i = 0; i < 15; i++) {
    const px = rng() * W;
    const py = rng() * groundY;
    const ps = 1 + rng() * 3;
    ctx.beginPath();
    ctx.arc(px, py, ps, 0, Math.PI * 2);
    ctx.fillStyle = `${palette.accent}${Math.floor(rng() * 60 + 20).toString(16).padStart(2,'0')}`;
    ctx.fill();
  }

  // Score indicator bar at bottom
  if (score !== undefined) {
    const barH = 4;
    const barY = H - barH;
    ctx.fillStyle = `${palette.ground}CC`;
    ctx.fillRect(0, barY, W, barH);
    const fillW = (score / 100) * W;
    const barGrad = ctx.createLinearGradient(0, barY, fillW, barY);
    barGrad.addColorStop(0, palette.accent);
    barGrad.addColorStop(1, palette.highlight);
    ctx.fillStyle = barGrad;
    ctx.fillRect(0, barY, fillW, barH);
  }

  // Platform name overlay
  ctx.font = `bold ${Math.round(W * 0.04)}px 'Playfair Display', serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffffDD';
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 10;
  ctx.fillText(platform.name.toUpperCase(), W / 2, H * 0.88);
  ctx.shadowBlur = 0;
}

function hashString(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
  return Math.abs(h);
}
function seededRandom(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}
function darken(hex, pct) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, (num >> 16) - pct);
  const g = Math.max(0, ((num >> 8) & 0xFF) - pct);
  const b = Math.max(0, (num & 0xFF) - pct);
  return `rgb(${r},${g},${b})`;
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();
}

function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

        <div>
          <div className="review-card">
            <div className="review-row"><span className="review-label">Name</span><span className="review-value">{formData.name}</span></div>
            <div className="review-row"><span className="review-label">Section</span><span className="review-value">{formData.section}</span></div>
            <div className="review-row"><span className="review-label">Uploaded By</span><span className="review-value">{formData.uploadedBy}</span></div>
            <div className="review-row"><span className="review-label">Source</span><span className="review-value">{file ? file.name : url || 'N/A'}</span></div>
            {file && <div className="review-row"><span className="review-label">File Size</span><span className="review-value">{formatFileSize(file.size)}</span></div>}
            {fileContent && <div className="review-row"><span className="review-label">Complexity (auto)</span><span className="review-value">{analyzeCodeComplexity(fileContent, file?.name || '')} pts</span></div>}
            <div className="review-row"><span className="review-label">Description</span><span className="review-value">{formData.description || '—'}</span></div>
          </div>
          <div className="upload-nav">
            <button className="nav-btn secondary" onClick={()=>setStep(2)}>← Back</button>
            <button className="nav-btn primary" onClick={handlePublish}>🔔 Publish to Lobby</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── AI Concierge ───
function AIConcierge({ platforms, scores }) {
  const [tab, setTab] = useState('discrepancies');
  const sorted = useMemo(() => [...platforms].sort((a,b) => (scores[b.id]||0) - (scores[a.id]||0)), [platforms, scores]);

  const discrepancies = useMemo(() => {
    if (platforms.length < 2) return [{ title: 'Not enough data', text: 'Upload at least 2 platforms to detect discrepancies.', status: 'info' }];
    const items = [];
    const sections = {};
    platforms.forEach(p => { if (!sections[p.section]) sections[p.section] = []; sections[p.section].push(p); });
    Object.entries(sections).forEach(([sec, ps]) => {
      if (ps.length > 1) {
        const hi = Math.max(...ps.map(p => scores[p.id]||0));
        const lo = Math.min(...ps.map(p => scores[p.id]||0));
        if (hi - lo > 30) {
          items.push({ title: `Score gap in ${sec}`, text: `There's a ${hi-lo} point gap between the highest and lowest scored platforms in ${sec}. Consider improving the lower-scored entries.`, status: 'warn' });
        }
      }
    });
    if (!items.length) items.push({ title: 'All clear', text: 'No significant discrepancies found between platforms.', status: 'ok' });
    return items;
  }, [platforms, scores]);

  const overlaps = useMemo(() => {
    if (platforms.length < 2) return [{ title: 'Not enough data', text: 'Upload more platforms to detect overlaps.', status: 'info' }];
    const items = [];
    const sections = {};
    platforms.forEach(p => { if (!sections[p.section]) sections[p.section] = []; sections[p.section].push(p); });
    Object.entries(sections).forEach(([sec, ps]) => {
      if (ps.length >= 2) {
        items.push({ title: `${ps.length} platforms in ${sec}`, text: `Platforms: ${ps.map(p=>p.name).join(', ')}. Consider whether any can be unified.`, status: 'info' });
      }
    });
    if (!items.length) items.push({ title: 'No overlaps', text: 'Each section has unique platforms.', status: 'ok' });
    return items;
  }, [platforms]);

  return (
    <div className="config-section">
      <h3>🤖 AI Concierge — Intelligence Analysis</h3>
      <div className="ai-tabs">
        {['discrepancies','overlap','leaderboard'].map(t => (
          <button key={t} className={`ai-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            {t === 'discrepancies' ? '⚠ Discrepancies' : t === 'overlap' ? '🔄 Overlap & Unify' : '🏆 Leaderboard'}
          </button>
        ))}
      </div>
      {tab === 'discrepancies' && discrepancies.map((d,i) => (
        <div className="ai-card" key={i}>
          <h4>{d.title} <span className={`ai-status ${d.status}`}>{d.status.toUpperCase()}</span></h4>
          <p>{d.text}</p>
        </div>
      ))}
      {tab === 'overlap' && overlaps.map((o,i) => (
        <div className="ai-card" key={i}>
          <h4>{o.title} <span className={`ai-status ${o.status}`}>{o.status.toUpperCase()}</span></h4>
          <p>{o.text}</p>
        </div>
      ))}
      {tab === 'leaderboard' && (
        sorted.length === 0 ? <div className="ai-card"><p style={{color:'var(--rose)',fontStyle:'italic'}}>No platforms uploaded yet.</p></div> :
        sorted.map((p,i) => (
          <div className="ai-card" key={p.id} style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{fontSize:24,fontFamily:'Playfair Display,serif',color: i===0?'var(--gold)':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--rose)',minWidth:36,textAlign:'center'}}>
              {i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}
            </div>
            <div style={{flex:1}}>
              <h4 style={{margin:0}}>{p.name}</h4>
              <p style={{margin:'4px 0 0',fontSize:13,opacity:0.7}}>{p.section} · {p.uploadedBy || 'Unknown'}</p>
            </div>
            <div style={{fontFamily:'Playfair Display,serif',fontSize:22,fontWeight:700,color:'var(--gold)'}}>{scores[p.id] || 0}</div>
          </div>
        ))
      )}
    </div>
  );
}

// ─── Add User Modal ───
function AddUserModal({ onClose, onAdd }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [role, setRole] = useState('guest');
  const handleAdd = () => {
    if (!name.trim() || !email.trim()) return;
    const avatar = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    onAdd({ id: Date.now(), name: name.trim(), email: email.trim().toLowerCase(), role, avatar });
    onClose();
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e=>e.stopPropagation()} style={{width:440}}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-body">
          <h2>Register New Guest</h2>
          <span className="subtitle" style={{marginBottom:20,display:'block'}}>Add a new member to the hotel registry</span>
          <div className="add-user-form">
            <div className="form-group">
              <label>Full Name</label>
              <input className="form-input" placeholder="John Doe" value={name} onChange={e=>setName(e.target.value)} autoFocus />
            </div>
            <div className="form-group">
              <label>Email</label>
              <input className="form-input" type="email" placeholder="john@company.com" value={email} onChange={e=>setEmail(e.target.value)} />
            </div>
            <div className="form-group">
              <label>Role</label>
              <select className="form-select" value={role} onChange={e=>setRole(e.target.value)}>
                <option value="guest">Guest (AE / SDR / KAM)</option>
                <option value="concierge">Concierge (Manager)</option>
                <option value="bellboy">Bellboy (Admin)</option>
              </select>
            </div>
            <button className="nav-btn primary" style={{marginTop:8}} onClick={handleAdd}>🔑 Register Guest</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [users, setUsers] = useState(() => loadFromStorage(STORAGE_KEYS.users, initialUsers));
  const [platforms, setPlatforms] = useState(() => loadFromStorage(STORAGE_KEYS.platforms, initialPlatforms));
  const [currentUser, setCurrentUser] = useState(null);
  const [screen, setScreen] = useState('lobby');
  const [selectedPlatform, setSelectedPlatform] = useState(null);
  const [showDenied, setShowDenied] = useState(false);
  const [showWelcome, setShowWelcome] = useState(false);
  const [showAddUser, setShowAddUser] = useState(false);
  const [toast, setToast] = useState(null);
  const welcomeShown = useRef(false);

  useEffect(() => { saveToStorage(STORAGE_KEYS.users, users); }, [users]);
  useEffect(() => { saveToStorage(STORAGE_KEYS.platforms, platforms); }, [platforms]);

  const scores = useMemo(() => calcScores(platforms), [platforms]);

  const handleLogin = (user) => { setCurrentUser(user); setScreen('lobby'); };
  const handleLogout = () => { setCurrentUser(null); setScreen('lobby'); welcomeShown.current = false; };

  const goConfig = () => {
    if (!canAccessConfig(currentUser)) { setShowDenied(true); return; }
    setScreen('config');
    if (!welcomeShown.current) { setShowWelcome(true); welcomeShown.current = true; }
  };

  const handlePlatformClick = (p) => {
    const access = getAccessLevel(currentUser, p.section);
    if (access === 'no-access') { setShowDenied(true); return; }
    setSelectedPlatform(p);
  };

  const handleEnter = (p) => {
    if (p.url) { window.open(p.url, '_blank'); }
    else { showToast(`Entering ${p.name}...`); }
    setSelectedPlatform(null);
  };

  const handlePublish = (platform) => {
    setPlatforms(prev => [...prev, platform]);
    showToast(`${platform.name} has been checked in to the lobby!`);
  };

  const handleAddUser = (user) => {
    setUsers(prev => [...prev, user]);
    showToast(`${user.name} has been registered!`);
  };

  const handleDeletePlatform = (id) => {
    setPlatforms(prev => prev.filter(p => p.id !== id));
    showToast('Platform checked out.');
  };

  const showToast = (msg) => { setToast(msg); };

  const toolsPlatforms = platforms.filter(p => p.section === 'tools');
  const analysisPlatforms = platforms.filter(p => p.section === 'analysis');
  const strategyPlatforms = platforms.filter(p => p.section === 'strategy');

  if (!currentUser) return <LoginScreen users={users} onLogin={handleLogin} />;

  return (
    <div>
      <div className="topbar">
        <h1>🔔 AI LOBBY</h1>
        <div className="topbar-right">
          <button className={`tab-btn ${screen==='lobby'?'active':''}`} onClick={()=>setScreen('lobby')}>Lobby</button>
          <button className={`tab-btn ${screen==='config'?'active':''}`} onClick={goConfig}>Back Office</button>
          <div className="topbar-user">
            <div className="topbar-avatar">{currentUser.avatar}</div>
            <div>
              <div style={{fontSize:13,fontWeight:500}}>{currentUser.name}</div>
              <div style={{fontSize:11,opacity:0.6,textTransform:'capitalize'}}>{currentUser.role}</div>
            </div>
          </div>
          <button className="logout-btn" onClick={handleLogout}>Check Out</button>
        </div>
      </div>

      {screen === 'lobby' && (
        <div className="lobby fade-in">
          <h2 className="lobby-title">The Grand Lobby</h2>
          <div className="ornament"><span>EXPLORE OUR ROOMS</span></div>
          <div className="columns">
            <div className="column">
              <div className="column-title">🔧 Tools</div>
              {toolsPlatforms.length === 0 ? <div className="empty-col">No tools checked in yet</div> :
                toolsPlatforms.map((p,i) => <RoomDoor key={p.id} platform={p} index={i} score={scores[p.id]} onClick={()=>handlePlatformClick(p)} />)}
            </div>
            <div className="column">
              <div className="column-title">📊 Analysis</div>
              {analysisPlatforms.length === 0 ? <div className="empty-col">No analysis platforms yet</div> :
                analysisPlatforms.map((p,i) => <RoomDoor key={p.id} platform={p} index={i} score={scores[p.id]} onClick={()=>handlePlatformClick(p)} />)}
            </div>
            <div className="column">
              <div className="column-title">♟ Strategy</div>
              {strategyPlatforms.length === 0 ? <div className="empty-col">No strategy platforms yet</div> :
                strategyPlatforms.map((p,i) => <RoomDoor key={p.id} platform={p} index={i} score={scores[p.id]} onClick={()=>handlePlatformClick(p)} />)}
            </div>
          </div>
        </div>
      )}

      {screen === 'config' && (
        <div className="config fade-in">
          <h2 style={{textAlign:'center',color:'var(--gold)',fontSize:28,marginBottom:8}}>Back Office</h2>
          <div className="ornament"><span>MANAGEMENT</span></div>

          <UploadPlatform users={users} currentUser={currentUser} onPublish={handlePublish} />

          {/* Guest Registry */}
          <div className="config-section">
            <h3>
              📋 Guest Registry
              <button className="add-btn" onClick={()=>setShowAddUser(true)}>+ Register</button>
            </h3>
            <table className="config-table">
              <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Tools</th><th>Analysis</th><th>Strategy</th></tr></thead>
              <tbody>
                {users.map(u => (
                  <tr key={u.id}>
                    <td>{u.name}</td>
                    <td style={{opacity:0.7,fontSize:13}}>{u.email}</td>
                    <td><span className={`role-badge role-${u.role}`}>{u.role}</span></td>
                    <td style={{fontSize:12}}>{getAccessLevel(u,'tools')}</td>
                    <td style={{fontSize:12}}>{getAccessLevel(u,'analysis')}</td>
                    <td style={{fontSize:12}}>{getAccessLevel(u,'strategy')}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Room Directory */}
          <div className="config-section">
            <h3>🚪 Room Directory</h3>
            {platforms.length === 0 ? <p style={{color:'var(--rose)',fontStyle:'italic',fontSize:14}}>No platforms checked in yet. Use the upload section above!</p> :
            <table className="config-table">
              <thead><tr><th>Room</th><th>Name</th><th>Section</th><th>Score</th><th>Uploaded By</th><th></th></tr></thead>
              <tbody>
                {platforms.map(p => (
                  <tr key={p.id}>
                    <td>{p.roomNumber || '—'}</td>
                    <td>{p.name}</td>
                    <td style={{textTransform:'capitalize'}}>{p.section}</td>
                    <td style={{fontWeight:600,color:'var(--gold)'}}>{scores[p.id] || '—'}</td>
                    <td style={{fontSize:13,opacity:0.7}}>{p.uploadedBy || '—'}</td>
                    <td>
                      {(currentUser.role === 'bellboy') && (
                        <button onClick={()=>handleDeletePlatform(p.id)} style={{background:'none',border:'1px solid #FF6B6B',color:'#FF6B6B',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:12}}>Remove</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>}
          </div>

          <AIConcierge platforms={platforms} scores={scores} />
        </div>
      )}

      {selectedPlatform && <ExpandedRoom platform={selectedPlatform} score={scores[selectedPlatform.id]} user={currentUser} onClose={()=>setSelectedPlatform(null)} onEnter={handleEnter} />}
      {showDenied && <AccessDenied onClose={()=>setShowDenied(false)} />}
      {showWelcome && <WelcomePopup onClose={()=>setShowWelcome(false)} />}
      {showAddUser && <AddUserModal onClose={()=>setShowAddUser(false)} onAdd={handleAddUser} />}
      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
