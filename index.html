<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LOBBY - Platform Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --wine: #9B2335;
            --burgundy: #5A1A2A;
            --gold: #D4A843;
            --cream: #FAF0E4;
            --dark: #1A0A0E;
            --brown: #3E1C11;
            --rose: #C7959B;
            --green: #2A5A3A;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--cream);
            overflow-x: hidden;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* LOGIN SCREEN */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--dark) 100%);
            padding: 20px;
        }

        .login-card {
            background: rgba(250, 240, 228, 0.95);
            padding: 60px 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-bell {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            color: var(--wine);
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            color: var(--burgundy);
            font-style: italic;
        }

        .ornament-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold) 20%, var(--gold) 80%, transparent);
            margin: 24px 0;
            position: relative;
        }

        .ornament-divider::before {
            content: '◆';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: var(--gold);
            font-size: 12px;
            background: rgba(250, 240, 228, 0.95);
            padding: 0 8px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-family: 'Cormorant Garamond', serif;
            color: var(--burgundy);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            padding: 12px 16px;
            border: 2px solid var(--gold);
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: white;
            color: var(--dark);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--wine);
            box-shadow: 0 0 8px rgba(155, 35, 53, 0.2);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .login-error {
            color: var(--wine);
            font-size: 13px;
            margin-top: -16px;
            font-weight: 500;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--wine) 0%, var(--burgundy) 100%);
            color: var(--cream);
            border: none;
            padding: 14px 24px;
            border-radius: 4px;
            font-size: 16px;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(155, 35, 53, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .lang-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .lang-btn:hover {
            background: var(--wine);
            color: var(--cream);
        }

        /* TOPBAR */
        .topbar {
            background: linear-gradient(90deg, var(--burgundy) 0%, var(--dark) 100%);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--gold);
            font-weight: 900;
        }

        .topbar-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--wine), var(--rose));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            color: var(--cream);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
        }

        .user-role {
            font-size: 11px;
            color: var(--gold);
            opacity: 0.8;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn {
            background: var(--wine);
            color: var(--cream);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .logout-btn:hover {
            background: var(--rose);
            transform: translateY(-2px);
        }

        /* LOBBY SCREEN */
        .lobby-container {
            flex: 1;
            padding: 40px 24px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .lobby-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .lobby-welcome {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .lobby-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            color: var(--rose);
            font-style: italic;
        }

        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-header {
            border-bottom: 2px solid var(--gold);
            padding-bottom: 12px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .section-description {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            color: var(--rose);
            font-style: italic;
        }

        .platforms-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .room-door {
            background: linear-gradient(135deg, rgba(90, 26, 42, 0.5), rgba(58, 28, 17, 0.5));
            border: 2px solid var(--gold);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            min-height: 220px;
            display: flex;
            flex-direction: column;
        }

        .room-door:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(212, 168, 67, 0.2);
            border-color: var(--rose);
        }

        .room-preview {
            flex: 1;
            width: 100%;
            min-height: 180px;
            background: linear-gradient(135deg, #2a1a2e, #3e1c11);
            position: relative;
            overflow: hidden;
        }

        .room-preview img, .room-preview canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .room-category-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--wine);
            color: var(--cream);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        .room-footer {
            padding: 16px;
            background: rgba(26, 10, 14, 0.8);
            border-top: 1px solid var(--gold);
        }

        .room-number {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .room-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            color: var(--cream);
            font-weight: 600;
        }

        /* EXPANDED ROOM MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
            cursor: pointer;
        }

        .modal-overlay.scrollable {
            align-items: flex-start;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .modal-card {
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--dark) 100%);
            border: 2px solid var(--gold);
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            cursor: default;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--wine);
            border: none;
            color: var(--cream);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--rose);
            transform: rotate(90deg);
        }

        .expanded-preview {
            width: 100%;
            height: 320px;
            background: linear-gradient(135deg, #2a1a2e, #3e1c11);
            position: relative;
        }

        .expanded-preview img, .expanded-preview canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .modal-body {
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal-header-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .modal-room-number {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            color: var(--gold);
            font-weight: 700;
        }

        .modal-platform-name {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--cream);
            font-weight: 700;
        }

        .modal-section {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: var(--rose);
            font-style: italic;
        }

        .access-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: fit-content;
        }

        .access-badge.full {
            background: var(--wine);
            color: var(--cream);
        }

        .access-badge.view {
            background: var(--gold);
            color: var(--dark);
        }

        .access-badge.use {
            background: var(--green);
            color: var(--cream);
        }

        .access-badge.denied {
            background: var(--rose);
            color: var(--dark);
        }

        .modal-description {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: var(--cream);
            line-height: 1.6;
        }

        .meta-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .meta-chip {
            background: rgba(212, 168, 67, 0.2);
            border: 1px solid var(--gold);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--cream);
        }

        .meta-label {
            color: var(--gold);
            font-weight: 600;
        }

        .modal-action-btn {
            background: linear-gradient(135deg, var(--wine), var(--burgundy));
            color: var(--cream);
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(155, 35, 53, 0.3);
        }

        .modal-action-btn.disabled {
            background: var(--rose);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .modal-action-btn.disabled:hover {
            transform: none;
            box-shadow: none;
        }

        /* ACCESS DENIED POPUP */
        .access-denied-popup {
            animation: float 0.6s ease-out;
        }

        @keyframes float {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .denied-emoji {
            font-size: 48px;
            margin-bottom: 16px;
            animation: bellFloat 2s ease-in-out infinite;
        }

        @keyframes bellFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .denied-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--wine);
            margin-bottom: 12px;
        }

        .denied-message {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: var(--cream);
            margin-bottom: 20px;
        }

        /* BACK OFFICE */
        .backoffice-container {
            flex: 1;
            padding: 40px 24px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .backoffice-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .backoffice-nav {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 16px;
            overflow-x: auto;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--cream);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .nav-btn:hover {
            color: var(--rose);
        }

        /* WELCOME POPUP */
        .welcome-popup {
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .popup-emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .popup-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--wine);
            margin-bottom: 12px;
        }

        .popup-phrase {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            color: var(--burgundy);
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .popup-instructions {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            color: var(--dark);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .popup-close-btn {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .popup-close-btn:hover {
            background: var(--wine);
            color: var(--cream);
        }

        /* UPLOAD PLATFORM */
        .upload-section {
            background: rgba(90, 26, 42, 0.3);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .upload-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--gold);
            margin-bottom: 24px;
        }

        .steps-indicator {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--burgundy);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: var(--gold);
            width: 40px;
            border-radius: 6px;
        }

        .upload-step {
            display: none;
        }

        .upload-step.active {
            display: block;
        }

        .step-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        /* DRAG AND DROP */
        .upload-area {
            border: 2px dashed var(--gold);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(212, 168, 67, 0.05);
        }

        .upload-area:hover,
        .upload-area.active {
            background: rgba(212, 168, 67, 0.1);
            border-color: var(--wine);
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .upload-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            color: var(--cream);
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--rose);
        }

        .upload-input {
            display: none;
        }

        .url-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .url-input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--gold);
            border-radius: 4px;
            background: rgba(26, 10, 14, 0.5);
            color: var(--cream);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        .url-input-group input:focus {
            outline: none;
            border-color: var(--rose);
            box-shadow: 0 0 8px rgba(155, 35, 53, 0.2);
        }

        .url-input-group button {
            padding: 12px 20px;
            background: var(--wine);
            color: var(--cream);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .url-input-group button:hover {
            background: var(--rose);
            transform: translateY(-2px);
        }

        /* FORM ROWS */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-col {
            display: flex;
            flex-direction: column;
        }

        .form-col label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-col input,
        .form-col select,
        .form-col textarea {
            padding: 10px 12px;
            border: 2px solid var(--gold);
            border-radius: 4px;
            background: rgba(26, 10, 14, 0.5);
            color: var(--cream);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        .form-col textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Cormorant Garamond', serif;
        }

        .form-col input:focus,
        .form-col select:focus,
        .form-col textarea:focus {
            outline: none;
            border-color: var(--rose);
            box-shadow: 0 0 8px rgba(155, 35, 53, 0.2);
        }

        .form-col select {
            cursor: pointer;
        }

        /* CHECKBOXES */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--gold);
        }

        .checkbox-item label {
            font-size: 13px;
            color: var(--cream);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        /* REVIEW CARD */
        .review-card {
            background: rgba(212, 168, 67, 0.1);
            border: 2px solid var(--gold);
            border-radius: 8px;

        // Hotel-themed images per category (Unsplash free photos)

        // Get a consistent image for a platform based on its name + id

        // Code complexity analyzer
        const analyzeCodeComplexity = (fileContent) => {
            const countMatches = (pattern) => {
                const matches = fileContent.match(new RegExp(pattern, 'g'));
                return matches ? matches.length : 0;
            };

            const metrics = {
                functions: countMatches(/function\s+\w+|const\s+\w+\s*=\s*\(|const\s+\w+\s*=\s*function/),
                htmlTags: countMatches(/<[a-z][a-z0-9]*\s*[^>]*>/i),
                cssRules: countMatches(/\{[^}]+\}/),
                imports: countMatches(/import\s+|require\s*\(/),
                conditionals: countMatches(/if\s*\(|else|switch\s*\(|case\s+/),
                loops: countMatches(/for\s*\(|while\s*\(|forEach|map\s*\(/),
                hooks: countMatches(/useState|useEffect|useContext|useRef|useReducer/),
                apiCalls: countMatches(/fetch|axios|fetch\s*\(|\.get\s*\(|\.post\s*\(/),
                eventHandlers: countMatches(/onClick|onChange|onSubmit|addEventListener/),
                comments: countMatches(/\/\/|\/\*|\*\//),
                errorHandling: countMatches(/try\s*\{|catch\s*\(|throw\s+/),
                fileSize: Math.ceil(fileContent.length / 100),
            };

            let score = 0;
            score += metrics.functions * 3;
            score += metrics.htmlTags * 0.5;
            score += metrics.cssRules * 2;
            score += metrics.imports * 1;
            score += metrics.conditionals * 2;
            score += metrics.loops * 2;
            score += metrics.hooks * 4;
            score += metrics.apiCalls * 5;
            score += metrics.eventHandlers * 2;
            score += metrics.comments * 0.5;
            score += metrics.errorHandling * 3;
            score += metrics.fileSize * 0.1;

            return Math.ceil(score);
        };

        // Calculate normalized scores
        const calcScores = (platforms) => {
            const scores = platforms.map(p => ({ ...p, rawScore: p.rawScore || 0 }));

            return scores.map(p => ({
                ...p,
                score: maxScore > 0 ? Math.round((p.rawScore / maxScore) * 100) : 0
            }));

            const handlePublish = () => {

                const updatedPlatforms = [...platforms, newPlatform];

                setPlatforms(normalizedPlatforms);
                // Save to Firebase

                db.ref('platforms').set(platformsObj);
                setUploadStep(1);
                setUploadData({ fileContent: '', fileName: '', name: '', section: 'tools', uploadedBy: currentUser.name, description: '', accessRoles: ['bellboy'], url: '', fileSize: '' });

            const detectDiscrepancies = () => {

                            <div className="modal-card celebration-popup" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-body" style={{textAlign: 'center'}}>
                                    <div className="celebration-emoji">🥂</div>
                                    <div className="celebration-title">{t('celebrationTitle')}</div>
                                    <div className="celebration-phrase">{t('celebrationPhrases')[Math.floor(Math.random() * t('celebrationPhrases').length)]}</div>
                                    <button className="celebration-btn" onClick={() => setShowCelebration(false)}>Cheers! 🍷</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAddUser && <AddUserModal onAdd={handleAddUser} onClose={() => setShowAddUser(false)} users={users} t={t} />}

                    {confirmDelete && (
                        <ConfirmDialog
                            title={t('confirmDeleteUser')}
                            message={t('confirmDeleteMsg')}
                            onConfirm={() => handleDeleteUser(confirmDelete)}
                            onCancel={() => setConfirmDelete(null)}
                            emoji="🗑️"
                        />
                    )}

                    <div className="backoffice-container">
                        <div className="backoffice-title">{t('backOfficeTitle')}</div>

                        <div className="backoffice-nav">
                            <button className={`nav-btn ${activeNav === 'upload' ? 'active' : ''}`} onClick={() => setActiveNav('upload')}>{t('uploadPlatform')}</button>
                            <button className={`nav-btn ${activeNav === 'guests' ? 'active' : ''}`} onClick={() => setActiveNav('guests')}>{t('guestRegistry')}</button>
                            <button className={`nav-btn ${activeNav === 'rooms' ? 'active' : ''}`} onClick={() => setActiveNav('rooms')}>{t('roomDirectory')}</button>
                            <button className={`nav-btn ${activeNav === 'concierge' ? 'active' : ''}`} onClick={() => setActiveNav('concierge')}>{t('aiConcierge')}</button>
                        </div>

                        {activeNav === 'upload' && (
                            <div className="upload-section">
                                <div className="upload-title">{t('uploadPlatform')}</div>
                                <div className="steps-indicator">
                                    {[1, 2, 3].map(step => (
                                        <div
                                            key={step}
                                            className={`step-dot ${uploadStep === step ? 'active' : ''}`}
                                            onClick={() => setUploadStep(step)}
                                        ></div>
                                    ))}
                                </div>

                                {uploadStep === 1 && (
                                    <div className="upload-step active">
                                        <div className="step-title">{t('step1Source')}</div>
                                        <div className="upload-area" onClick={() => document.getElementById('file-input').click()}>
                                            <div className="upload-icon">📁</div>
                                            <div className="upload-text">{t('dragDrop')}</div>
                                            <div className="upload-hint">{t('orClick')}</div>
                                        </div>
                                        <input
                                            id="file-input"
                                            type="file"
                                            className="upload-input"
                                            onChange={(e) => handleFileUpload(e.target.files[0])}
                                        />
                                        <div style={{margin: '20px 0', textAlign: 'center', color: 'var(--gold)'}}>— {t('orPasteUrl')} —</div>
                                        <div className="url-input-group">
                                            <input
                                                type="text"
                                                placeholder="https://example.com/api.json"
                                                id="url-input"
                                            />
                                            <button type="button" onClick={() => {
                                                const url = document.getElementById('url-input').value;
                                                if (url) handleUrlPaste(url);
                                            }}>
                                                {t('pasteBtn')}
                                            </button>
                                        </div>
                                        {uploadData.fileContent && <div style={{marginTop: '12px', color: 'var(--gold)', fontSize: '12px'}}>✓ File loaded: {uploadData.fileName || 'Content pasted'}</div>}
                                        <div className="btn-group">
                                            <button className="btn-secondary" onClick={() => setUploadStep(1)} disabled>{t('back')}</button>
                                            <button className="btn-primary" onClick={handleNextStep}>{t('next')}</button>
                                        </div>
                                    </div>
                                )}

                                {uploadStep === 2 && (
                                    <div className="upload-step active">
                                        <div className="step-title">{t('step2Details')}</div>
                                        <div className="form-row">
                                            <div className="form-col">
                                                <label>{t('platformName')}</label>
                                                <input
                                                    type="text"
                                                    value={uploadData.name}
                                                    onChange={(e) => setUploadData({...uploadData, name: e.target.value})}
                                                    placeholder="My Awesome Platform"
                                                />
                                            </div>
                                            <div className="form-col">
                                                <label>{t('selectSection')}</label>
                                                <select
                                                    value={uploadData.section}
                                                    onChange={(e) => setUploadData({...uploadData, section: e.target.value})}
                                                >
                                                    <option value="tools">Tools</option>
                                                    <option value="analysis">Analysis</option>
                                                    <option value="strategy">Strategy</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="form-row">
                                            <div className="form-col">
                                                <label>{t('uploadedByLabel')}</label>
                                                <input type="text" value={uploadData.uploadedBy} disabled />
                                            </div>
                                        </div>
                                        <div className="form-row full">
                                            <div className="form-col">
                                                <label>{t('descriptionLabel')}</label>
                                                <textarea
                                                    value={uploadData.description}
                                                    onChange={(e) => setUploadData({...uploadData, description: e.target.value})}
                                                    placeholder="Describe your platform..."
                                                ></textarea>
                                            </div>
                                        </div>
                                        <div className="form-row full">
                                            <label style={{color: 'var(--gold)', fontWeight: '600'}}>{t('accessFor')}</label>
                                            <div className="checkbox-group">
                                                {['bellboy', 'concierge', 'guest'].map(role => (
                                                    <div key={role} className="checkbox-item">
                                                        <input
                                                            type="checkbox"
                                                            id={`role-${role}`}
                                                            checked={uploadData.accessRoles.includes(role) || role === 'bellboy'}
                                                            onChange={(e) => {
                                                                if (role === 'bellboy') return;
                                                                const roles = e.target.checked
                                                                    ? [...uploadData.accessRoles, role]
                                                                    : uploadData.accessRoles.filter(r => r !== role);
                                                                setUploadData({...uploadData, accessRoles: roles});
                                                            }}
                                                            disabled={role === 'bellboy'}
                                                        />
                                                        <label htmlFor={`role-${role}`}>
                                                            {role === 'bellboy' && t('bellboyRole')}
                                                            {role === 'concierge' && t('conciergeRole')}
                                                            {role === 'guest' && t('guestRole')}
                                                        </label>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="btn-group">
                                            <button className="btn-secondary" onClick={() => setUploadStep(1)}>{t('back')}</button>
                                            <button className="btn-primary" onClick={handleNextStep}>{t('next')}</button>
                                        </div>
                                    </div>
                                )}

                                {uploadStep === 3 && (
                                    <div className="upload-step active">
                                        <div className="step-title">{t('step3Review')}</div>
                                        <div className="review-card">
                                            <div className="review-row">
                                                <span className="review-label">{t('platformName')}</span>
                                                <span className="review-value">{uploadData.name}</span>
                                            </div>
                                            <div className="review-row">
                                                <span className="review-label">{t('selectSection')}</span>
                                                <span className="review-value">{uploadData.section}</span>
                                            </div>
                                            <div className="review-row">
                                                <span className="review-label">{t('uploadedByLabel')}</span>
                                                <span className="review-value">{uploadData.uploadedBy}</span>
                                            </div>
                                            <div className="review-row">
                                                <span className="review-label">{t('descriptionLabel')}</span>
                                                <span className="review-value">{uploadData.description.substring(0, 50)}...</span>
                                            </div>
                                            <div className="review-row">
                                                <span className="review-label">{t('scoreLabel')}</span>
                                                <span className="review-value">{analyzeCodeComplexity(uploadData.fileContent)} (auto-calculated)</span>
                                            </div>
                                        </div>
                                        <div className="btn-group">
                                            <button className="btn-secondary" onClick={() => setUploadStep(2)}>{t('back')}</button>
                                            <button className="btn-primary" onClick={handlePublish}>{t('publish')}</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeNav === 'guests' && (
                            <div className="table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th>{t('name')}</th>
                                            <th>{t('email')}</th>
                                            <th>{t('role')}</th>
                                            <th>{t('access')}</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {users.map(user => (
                                            <tr key={user.id}>
                                                <td>{user.name}</td>
                                                <td>{user.email}</td>
                                                <td>
                                                    <span className={`role-badge ${user.role}`}>
                                                        {user.role === 'bellboy' && t('bellboyRole')}
                                                        {user.role === 'concierge' && t('conciergeRole')}
                                                        {user.role === 'guest' && t('guestRole')}
                                                    </span>
                                                </td>
                                                <td>
                                                    <span style={{fontSize: '11px'}} title={`Tools: ${accessMatrix[user.role].tools}, Analysis: ${accessMatrix[user.role].analysis}, Strategy: ${accessMatrix[user.role].strategy}`}>
                                                        ⚙️ Configured
                                                    </span>
                                                </td>
                                                <td>
                                                    {user.id !== currentUser.id && (
                                                        <button className="del-btn" onClick={() => setConfirmDelete(user.id)}>Remove</button>
                                                    )}
                                                    {user.id === currentUser.id && <span style={{fontSize: '11px', color: 'var(--rose)'}}>Current</span>}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                <div style={{marginTop: '20px'}}>
                                    <button className="btn-primary" onClick={() => setShowAddUser(true)}>{t('registerUser')}</button>
                                </div>
                            </div>
                        )}

                        {activeNav === 'rooms' && (
                            <div className="table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th>{t('roomNumber')}</th>
                                            <th>{t('platformName')}</th>
                                            <th>{t('section')}</th>
                                            <th>{t('score')}</th>
                                            <th>{t('uploadedByCol')}</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {platforms.map(platform => (
                                            <tr key={platform.id}>
                                                <td>#{platform.roomNumber}</td>
                                                <td>{platform.name}</td>
                                                <td>{platform.section}</td>
                                                <td style={{color: 'var(--gold)', fontWeight: 'bold'}}>{platform.score}</td>
                                                <td>{platform.uploadedBy}</td>
                                                <td>
                                                    <button
                                                        className="del-btn"
                                                        onClick={() => {
                                                            const updated = platforms.filter(p => p.id !== platform.id);
                                                            setPlatforms(updated);
                                                            // Remove platform from Firebase
                                                            db.ref('platforms/' + platform.id).remove();
                                                        }}
                                                    >
                                                        Remove
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeNav === 'concierge' && (
                            <div>
                                <div className="tabs-container">
                                    <button className={`tab-btn ${activeNav === 'concierge' ? 'active' : ''}`}>{t('discrepancies')}</button>
                                    <button className={`tab-btn ${activeNav === 'concierge' ? 'active' : ''}`}>{t('overlapUnify')}</button>
                                    <button className={`tab-btn ${activeNav === 'concierge' ? 'active' : ''}`}>{t('leaderboard')}</button>
                                </div>

                                <div style={{display: 'flex', gap: '24px'}}>
                                    <div style={{flex: 1}}>
                                        <h3 style={{color: 'var(--gold)', marginBottom: '16px'}}>{t('discrepancies')}</h3>
                                        {discrepancies.length === 0 ? (
                                            <div style={{color: 'var(--rose)', fontSize: '13px'}}>{t('noDiscrepancies')}</div>
                                        ) : (
                                            discrepancies.map((d, idx) => (
                                                <div key={idx} style={{background: 'rgba(90, 26, 42, 0.3)', border: '1px solid var(--gold)', padding: '12px', marginBottom: '8px', borderRadius: '4px', fontSize: '12px'}}>
                                                    <div style={{color: 'var(--gold)', fontWeight: 'bold'}}>{d.section}</div>
                                                    <div style={{color: 'var(--cream)'}}>{d.platform1} ({d.score1}) vs {d.platform2} ({d.score2})</div>
                                                    <div style={{color: 'var(--rose)'}}>Diff: {d.diff}</div>
                                                </div>
                                            ))
                                        )}
                                    </div>

                                    <div style={{flex: 1}}>
                                        <h3 style={{color: 'var(--gold)', marginBottom: '16px'}}>{t('overlapUnify')}</h3>
                                        {overlaps.length === 0 ? (
                                            <div style={{color: 'var(--rose)', fontSize: '13px'}}>{t('noOverlaps')}</div>
                                        ) : (
                                            overlaps.map((o, idx) => (
                                                <div key={idx} style={{background: 'rgba(90, 26, 42, 0.3)', border: '1px solid var(--gold)', padding: '12px', marginBottom: '8px', borderRadius: '4px', fontSize: '12px'}}>
                                                    <div style={{color: 'var(--gold)', fontWeight: 'bold'}}>{o.section}</div>
                                                    <div style={{color: 'var(--cream)'}}>{o.count} platforms in this section</div>
                                                </div>
                                            ))
                                        )}
                                    </div>

                                    <div style={{flex: 1}}>
                                        <h3 style={{color: 'var(--gold)', marginBottom: '16px'}}>{t('leaderboard')}</h3>
                                        {sortedByScore.map((platform, idx) => {
                                            const medals = ['🥇', '🥈', '🥉'];
                                            return (
                                                <div key={platform.id} className="leaderboard-entry">
                                                    <div className="leaderboard-rank">{medals[idx] || `${idx + 1}.`}</div>
                                                    <div className="leaderboard-info">
                                                        <div className="leaderboard-name">{platform.name}</div>
                                                        <div className="leaderboard-platform">{platform.section}</div>
                                                    </div>
                                                    <div className="leaderboard-score">{platform.score}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {toastMsg && <Toast message={toastMsg} />}
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [lang, setLang] = useState(() => localStorage.getItem('ailobby_lang') || 'en');
            const [currentUser, setCurrentUser] = useState(null);
            const [platforms, setPlatforms] = useState([]);
            const [users, setUsers] = useState(initialUsers);
            const [showBackOffice, setShowBackOffice] = useState(false);
            const [firebaseReady, setFirebaseReady] = useState(false);

            // Firebase real-time listeners
            useEffect(() => {
                // Listen for platforms changes
                const platformsRef = db.ref('platforms');
                platformsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const platformList = Object.values(data);
                        setPlatforms(platformList);
                    } else {
                        setPlatforms([]);
                    }
                    setFirebaseReady(true);
                });

                // Listen for users changes
                const usersRef = db.ref('users');
                usersRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const userList = Object.values(data);
                        // Merge: keep initialUsers that aren't in Firebase, add all Firebase users
                        const mergedUsers = [...initialUsers];
                        userList.forEach(fbUser => {
                            if (!mergedUsers.find(u => u.email === fbUser.email)) {
                                mergedUsers.push(fbUser);
                            }
                        });
                        setUsers(mergedUsers);
                    }
                });

                // Cleanup listeners on unmount
                return () => {
                    platformsRef.off();
                    usersRef.off();
                };
            }, []);

            useEffect(() => {
                localStorage.setItem('ailobby_lang', lang);
            }, [lang]);

            const setLangFunc = (newLang) => {
                setLang(newLang);
            };

            const t = (key) => {
                const keys = key.split('.');
                let value = translations[lang];
                for (let k of keys) {
                    value = value[k];
                }
                return value;
            };

            if (!firebaseReady) {
                return (
                    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg, #5A1A2A 0%, #1A0A0E 100%)',color:'#D4A843',fontFamily:'Playfair Display',fontSize:'2rem'}}>
                        <div style={{textAlign:'center'}}>
                            <div style={{fontSize:'4rem',marginBottom:'20px'}}>🔔</div>
                            <div>Loading AI Lobby...</div>
                            <div style={{fontSize:'0.8rem',marginTop:'10px',color:'#C7959B'}}>Connecting to hotel network</div>
                        </div>
                    </div>
                );
            }

            if (!currentUser) {
                return <LoginScreen onLogin={setCurrentUser} t={t} lang={lang} setLang={setLangFunc} users={users} />;
            }

            if (showBackOffice && (currentUser.role === 'bellboy' || currentUser.role === 'concierge')) {
                return (
                    <BackOfficeScreen
                        currentUser={currentUser}
                        onBack={() => setShowBackOffice(false)}
                        platforms={platforms}
                        setPlatforms={setPlatforms}
                        users={users}
                        setUsers={setUsers}
                        t={t}
                    />
                );
            }

            return (
                <LobbyScreen
                    currentUser={currentUser}
                    onLogout={() => {
                        setCurrentUser(null);
                    }}
                    platforms={platforms}
                    onShowBackOffice={() => setShowBackOffice(true)}
                    t={t}
                    lang={lang}
                    setLang={setLangFunc}
                />
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
