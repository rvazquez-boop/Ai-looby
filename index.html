<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LOBBY - Platform Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase FIRST -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <!-- Then React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --wine: #9B2335;
            --burgundy: #5A1A2A;
            --gold: #D4A843;
            --cream: #FAF0E4;
            --dark: #1A0A0E;
            --brown: #3E1C11;
            --rose: #C7959B;
            --green: #2A5A3A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, var(--burgundy) 100%);
            color: var(--cream);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #root {
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(212, 168, 67, 0.3); }
            50% { box-shadow: 0 0 20px rgba(212, 168, 67, 0.6); }
        }

        /* LOGIN SCREEN */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.6s ease-out;
        }

        .login-card {
            background: linear-gradient(135deg, rgba(26, 10, 14, 0.95) 0%, rgba(90, 26, 42, 0.95) 100%);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 60px 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: slideInUp 0.6s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-bell {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .login-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            color: var(--rose);
            font-style: italic;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .form-input {
            padding: 12px 16px;
            border: 1px solid var(--gold);
            background: rgba(250, 240, 228, 0.08);
            color: var(--cream);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--cream);
            background: rgba(250, 240, 228, 0.12);
            box-shadow: 0 0 10px rgba(212, 168, 67, 0.3);
        }

        .form-input::placeholder {
            color: rgba(212, 168, 67, 0.5);
        }

        .login-button {
            padding: 12px 24px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-button:hover {
            background: var(--cream);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 168, 67, 0.4);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            padding: 12px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 4px;
        }

        .login-lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        /* LOBBY SCREEN */
        .lobby-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.6s ease-out;
        }

        .lobby-header {
            background: linear-gradient(90deg, rgba(26, 10, 14, 0.98) 0%, rgba(90, 26, 42, 0.98) 100%);
            border-bottom: 2px solid var(--gold);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .lobby-title-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .lobby-bell {
            font-size: 28px;
        }

        .lobby-titles {
            display: flex;
            flex-direction: column;
        }

        .lobby-main-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .lobby-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: var(--rose);
            font-style: italic;
        }

        .lobby-header-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: rgba(212, 168, 67, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(212, 168, 67, 0.3);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold);
            color: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            font-size: 13px;
        }

        .user-role {
            font-size: 11px;
            color: var(--rose);
            text-transform: uppercase;
        }

        .header-button {
            padding: 10px 16px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .header-button:hover {
            background: var(--gold);
            color: var(--dark);
        }

        .lang-toggle-btn {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .lang-toggle-btn:hover {
            transform: scale(1.1);
        }

        /* LOBBY CONTENT */
        .lobby-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .floor-tabs {
            display: flex;
            gap: 16px;
            border-bottom: 2px solid rgba(212, 168, 67, 0.2);
            padding-bottom: 16px;
        }

        .floor-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: var(--cream);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .floor-tab:hover {
            color: var(--gold);
        }

        .floor-tab.active {
            color: var(--gold);
        }

        .floor-tab.active::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gold);
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            animation: fadeIn 0.5s ease-out;
        }

        .room-card {
            background: rgba(26, 10, 14, 0.6);
            border: 1px solid rgba(212, 168, 67, 0.2);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .room-card:hover {
            transform: scale(1.03);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 168, 67, 0.4);
        }

        .room-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            position: relative;
        }

        .room-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(155, 35, 53, 0.9);
            color: var(--gold);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .room-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .room-number {
            font-size: 12px;
            color: var(--rose);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .room-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--gold);
        }

        /* EXPANDED ROOM MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        .expanded-room {
            background: linear-gradient(135deg, rgba(26, 10, 14, 0.98) 0%, rgba(90, 26, 42, 0.98) 100%);
            border: 2px solid var(--gold);
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            animation: slideInUp 0.4s ease-out;
        }

        .expanded-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .expanded-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .expanded-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--gold);
        }

        .expanded-description {
            color: var(--cream);
            line-height: 1.6;
            font-size: 14px;
        }

        .expanded-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 168, 67, 0.2);
        }

        .meta-chip {
            padding: 6px 12px;
            background: rgba(212, 168, 67, 0.1);
            border: 1px solid rgba(212, 168, 67, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--gold);
        }

        .access-badge {
            padding: 8px 16px;
            background: var(--gold);
            color: var(--dark);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            width: fit-content;
        }

        .expanded-buttons {
            display: flex;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 168, 67, 0.2);
        }

        .enter-button {
            flex: 1;
            padding: 12px 24px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .enter-button:hover {
            background: var(--cream);
            transform: translateY(-2px);
        }

        .close-button {
            padding: 12px 24px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-button:hover {
            background: var(--gold);
            color: var(--dark);
        }

        /* BACK OFFICE */
        .backoffice-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.6s ease-out;
        }

        .backoffice-header {
            background: linear-gradient(90deg, rgba(26, 10, 14, 0.98) 0%, rgba(90, 26, 42, 0.98) 100%);
            border-bottom: 2px solid var(--gold);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .backoffice-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .backoffice-controls {
            display: flex;
            gap: 12px;
        }

        .backoffice-content {
            flex: 1;
            display: flex;
            background: linear-gradient(135deg, var(--dark) 0%, var(--burgundy) 100%);
        }

        .backoffice-tabs {
            width: 200px;
            background: rgba(26, 10, 14, 0.9);
            border-right: 2px solid rgba(212, 168, 67, 0.2);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .backoffice-tab {
            padding: 16px 20px;
            background: none;
            border: none;
            color: var(--cream);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            border-left: 3px solid transparent;
        }

        .backoffice-tab:hover {
            color: var(--gold);
            background: rgba(212, 168, 67, 0.1);
        }

        .backoffice-tab.active {
            color: var(--gold);
            border-left-color: var(--gold);
            background: rgba(212, 168, 67, 0.1);
        }

        .backoffice-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            animation: slideInUp 0.4s ease-out;
        }

        /* UPLOAD WIZARD */
        .wizard-steps {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(212, 168, 67, 0.2);
        }

        .wizard-step {
            flex: 1;
            text-align: center;
            cursor: pointer;
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(212, 168, 67, 0.1);
            border: 2px solid rgba(212, 168, 67, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-weight: 600;
            color: var(--gold);
            transition: all 0.3s;
        }

        .wizard-step.active .step-number {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
        }

        .wizard-step.completed .step-number {
            background: var(--green);
            border-color: var(--green);
            color: var(--cream);
        }

        .step-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--cream);
        }

        /* FILE DROP ZONE */
        .drop-zone {
            border: 2px dashed rgba(212, 168, 67, 0.4);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(212, 168, 67, 0.05);
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--gold);
            background: rgba(212, 168, 67, 0.1);
            box-shadow: 0 0 20px rgba(212, 168, 67, 0.2);
        }

        .drop-zone-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .drop-zone-text {
            font-size: 14px;
            color: var(--cream);
            margin-bottom: 8px;
        }

        .drop-zone-hint {
            font-size: 12px;
            color: var(--rose);
        }

        .file-input {
            display: none;
        }

        .file-preview {
            padding: 16px;
            background: rgba(212, 168, 67, 0.1);
            border: 1px solid rgba(212, 168, 67, 0.3);
            border-radius: 6px;
            margin-top: 16px;
        }

        .file-preview-name {
            font-weight: 600;
            color: var(--gold);
            font-size: 14px;
        }

        .file-preview-size {
            font-size: 12px;
            color: var(--rose);
            margin-top: 4px;
        }

        /* FORM ELEMENTS */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .textarea {
            padding: 12px 16px;
            border: 1px solid rgba(212, 168, 67, 0.3);
            background: rgba(250, 240, 228, 0.08);
            color: var(--cream);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            transition: all 0.3s;
        }

        .textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(250, 240, 228, 0.12);
            box-shadow: 0 0 10px rgba(212, 168, 67, 0.3);
        }

        .select {
            padding: 12px 16px;
            border: 1px solid rgba(212, 168, 67, 0.3);
            background: rgba(250, 240, 228, 0.08);
            color: var(--cream);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .select:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(250, 240, 228, 0.12);
        }

        .select option {
            background: var(--burgundy);
            color: var(--cream);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--gold);
        }

        .checkbox-item label {
            cursor: pointer;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* PREVIEW CARD */
        .preview-card {
            background: rgba(212, 168, 67, 0.1);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .preview-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(212, 168, 67, 0.2);
        }

        .preview-row:last-child {
            border-bottom: none;
        }

        .preview-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--rose);
            letter-spacing: 0.5px;
        }

        .preview-value {
            font-size: 14px;
            color: var(--gold);
            font-weight: 500;
        }

        /* TABLES */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        .data-table thead {
            background: rgba(212, 168, 67, 0.1);
            border-bottom: 2px solid var(--gold);
        }

        .data-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gold);
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(212, 168, 67, 0.1);
            font-size: 13px;
        }

        .data-table tbody tr:nth-child(even) {
            background: rgba(26, 10, 14, 0.5);
        }

        .data-table tbody tr:hover {
            background: rgba(212, 168, 67, 0.08);
        }

        /* SCORE COLUMN */
        .score-cell {
            color: var(--gold);
            font-weight: 700;
            font-size: 14px;
        }

        /* ACTION BUTTONS */
        .action-button {
            padding: 8px 12px;
            background: transparent;
            border: 1px solid var(--rose);
            color: var(--rose);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .action-button:hover {
            background: var(--rose);
            color: var(--dark);
        }

        .delete-button {
            background: none;
            border: none;
            color: var(--rose);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .delete-button:hover {
            color: #ff6b6b;
            transform: scale(1.2);
        }

        /* ADD USER FORM */
        .add-user-section {
            background: rgba(212, 168, 67, 0.1);
            border: 1px solid rgba(212, 168, 67, 0.2);
            border-radius: 8px;
            padding: 20px;
            margin-top: 24px;
        }

        .add-user-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .add-user-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;

        function getPlatformImage(platform, section) {

        function analyzeCodeComplexity(fileContent) {
            if (!fileContent) return 1;
            let score = 0;
            const lines = fileContent.split('\n').length;
            score += Math.min(lines / 10, 30);
            const functions = (fileContent.match(/function\s|=>\s*\{|\.prototype\./g) || []).length;
            score += functions * 2;
            const htmlTags = (fileContent.match(/<[a-zA-Z][^>]*>/g) || []).length;
            score += Math.min(htmlTags / 5, 15);
            const cssRules = (fileContent.match(/[{][^}]*[:][^}]*[}]/g) || []).length;
            score += Math.min(cssRules, 10);
            const imports = (fileContent.match(/import\s|require\(/g) || []).length;
            score += imports * 1.5;
            const conditionals = (fileContent.match(/if\s*\(|switch\s*\(|\?\s*.*:/g) || []).length;
            score += conditionals * 1.5;
            const loops = (fileContent.match(/for\s*\(|while\s*\(|\.map\(|\.forEach\(|\.filter\(|\.reduce\(/g) || []).length;
            score += loops * 2;
            const hooks = (fileContent.match(/use[A-Z]\w*\(/g) || []).length;
            score += hooks * 2;
            const apiCalls = (fileContent.match(/fetch\(|axios\.|\.ajax\(|XMLHttpRequest/g) || []).length;
            score += apiCalls * 3;
            const events = (fileContent.match(/addEventListener|on[A-Z]\w+\s*=/g) || []).length;
            score += events * 1.5;
            const comments = (fileContent.match(/\/\/.*|\/\*[\s\S]*?\*\//g) || []).length;
            score += Math.min(comments / 5, 5);
            const errorHandling = (fileContent.match(/try\s*{|catch\s*\(|\.catch\(/g) || []).length;
            score += errorHandling * 2;
            score += Math.min(fileContent.length / 1000, 20);
            return Math.max(1, Math.ceil(score));
        }

            return platforms.map(p => ({

                score: Math.max(1, Math.round(((p.rawScore || 1) / maxRaw) * 100))
            }));

        function BackOffice({ currentUser, platforms, users, lang, setLang, onBack, onLogout, t: tFunc }) {
            const [activeTab, setActiveTab] = useState('upload');
            const [uploadStep, setUploadStep] = useState(1);
            const [uploadFile, setUploadFile] = useState(null);
            const [uploadData, setUploadData] = useState({
                name: '',
                section: 'tools',
                description: '',
                url: '',
                accessRoles: ['bellboy', 'concierge', 'guest']
            });
            const [toast, setToast] = useState(null);
            const [celebration, setCelebration] = useState(false);
            const [newUser, setNewUser] = useState({ name: '', email: '', role: 'guest' });
            const [confirmDialog, setConfirmDialog] = useState(null);
            const fileInputRef = useRef(null);

            const handleFileUpload = (file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    setUploadFile({
                        name: file.name,
                        size: file.size,
                        content: e.target.result
                    });
                };
                reader.readAsText(file);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const files = e.dataTransfer.files;
                if (files.length > 0) handleFileUpload(files[0]);
            };

            const handlePublish = () => {
                if (!uploadFile || !uploadData.name || !uploadData.url) {
                    alert('Please fill in all fields');
                    return;
                }

                const rawScore = analyzeCodeComplexity(uploadFile.content);
                const newPlatform = {
                    id: Date.now(),
                    ...uploadData,
                    rawScore,
                    uploadedBy: currentUser.name,
                    createdAt: new Date().getTime(),
                    fileSize: (uploadFile.size / 1024).toFixed(2) + ' KB'
                };

                const updatedPlatforms = [...platforms, newPlatform];
                const scoredPlatforms = calcScores(updatedPlatforms);
                const platformsObj = {};
                scoredPlatforms.forEach(p => {
                    platformsObj[p.id] = p;
                });

                window.db.ref('platforms').set(platformsObj).then(() => {
                    setCelebration(true);
                });
            };

            const handleAddUser = () => {
                if (!newUser.name || !newUser.email) {
                    alert('Please fill in all fields');
                    return;
                }

                const userId = Date.now();
                const userToAdd = {
                    id: userId,
                    ...newUser,
                    avatar: newUser.name.split(' ').map(n => n[0]).join('').toUpperCase()
                };

                window.db.ref('users/' + userId).set(userToAdd).then(() => {
                    setNewUser({ name: '', email: '', role: 'guest' });
                    setToast('toast_user_added');
                    setTimeout(() => setToast(null), 3000);
                });
            };

            const handleDeleteUser = (userId, userName) => {
                if (userId === currentUser.id) {
                    alert(tFunc('cannot_delete_yourself', lang));
                    return;
                }
                setConfirmDialog({
                    title: 'confirm_delete_user',
                    message: 'confirm_delete_user_msg',
                    onConfirm: () => {
                        window.db.ref('users/' + userId).remove().then(() => {
                            setConfirmDialog(null);
                            setToast('toast_user_deleted');
                            setTimeout(() => setToast(null), 3000);
                        });
                    }
                });
            };

            const handleDeletePlatform = (platformId) => {
                setConfirmDialog({
                    title: 'confirm_delete_platform',
                    message: 'confirm_delete_platform_msg',
                    onConfirm: () => {
                        window.db.ref('platforms/' + platformId).remove().then(() => {
                            setConfirmDialog(null);
                            setToast('toast_platform_deleted');
                            setTimeout(() => setToast(null), 3000);
                        });
                    }
                });
            };

            const detectDiscrepancies = () => {
                const discrepancies = [];
                const sections = ['tools', 'analysis', 'strategy'];
                sections.forEach(section => {
                    const sectionPlats = platforms.filter(p => p.section === section);
                    for (let i = 0; i < sectionPlats.length; i++) {
                        for (let j = i + 1; j < sectionPlats.length; j++) {
                            const gap = Math.abs((sectionPlats[i].score || 0) - (sectionPlats[j].score || 0));
                            if (gap > 30) {
                                discrepancies.push({
                                    section,
                                    plat1: sectionPlats[i],
                                    plat2: sectionPlats[j],
                                    gap
                                });
                            }
                        }
                    }
                });
                return discrepancies;
            };

            if (celebration) {
                return <Celebration lang={lang} />;
            }

            return (
                <div className="backoffice-container">
                    <div className="backoffice-header">
                        <div className="backoffice-title">{tFunc('back_office', lang)}</div>
                        <div className="backoffice-controls">
                            <button className="lang-toggle-btn" onClick={() => setLang(lang === 'en' ? 'es' : 'en')}>
                                {lang === 'en' ? '🇪🇸' : '🇬🇧'}
                            </button>
                            <button className="header-button" onClick={onBack}>

                            </button>
                            <button className="header-button" onClick={onLogout}>
                                {tFunc('logout', lang)}

                    </div>

                    <div className="backoffice-content">

                                className={`backoffice-tab ${activeTab === 'upload' ? 'active' : ''}`}

                            >

                            </button>
                            <button
                                className={`backoffice-tab ${activeTab === 'users' ? 'active' : ''}`}
                                onClick={() => setActiveTab('users')}
                            >
                                {tFunc('guest_registry', lang)}
                            </button>
                            <button
                                className={`backoffice-tab ${activeTab === 'scores' ? 'active' : ''}`}
                                onClick={() => setActiveTab('scores')}
                            >
                                {tFunc('score_analysis', lang)}
                            </button>
                            <button
                                className={`backoffice-tab ${activeTab === 'discrepancies' ? 'active' : ''}`}
                                onClick={() => setActiveTab('discrepancies')}

                                {tFunc('ai_discrepancies', lang)}
                            </button>
                        </div>

                        <div className="backoffice-panel">
                            {activeTab === 'upload' && (
                                <div>
                                    <div className="wizard-steps">
                                        <div className={`wizard-step ${uploadStep >= 1 ? 'active' : ''} ${uploadStep > 1 ? 'completed' : ''}`}>
                                            <div className="step-number">1</div>
                                            <div className="step-label">{tFunc('step1_upload', lang)}</div>
                                        </div>
                                        <div className={`wizard-step ${uploadStep >= 2 ? 'active' : ''} ${uploadStep > 2 ? 'completed' : ''}`}>
                                            <div className="step-number">2</div>
                                            <div className="step-label">{tFunc('step2_details', lang)}</div>
                                        </div>
                                        <div className={`wizard-step ${uploadStep >= 3 ? 'active' : ''} ${uploadStep > 3 ? 'completed' : ''}`}>
                                            <div className="step-number">3</div>
                                            <div className="step-label">{tFunc('step3_preview', lang)}</div>
                                        </div>
                                    </div>

                                    {uploadStep === 1 && (
                                        <div>
                                            <div
                                                className="drop-zone"
                                                onDragOver={(e) => e.preventDefault()}
                                                onDragLeave={(e) => e.preventDefault()}
                                                onDrop={handleDrop}
                                                onClick={() => fileInputRef.current?.click()}
                                            >
                                                <div className="drop-zone-icon">📁</div>
                                                <div className="drop-zone-text">{tFunc('drop_files', lang)}</div>
                                                <div className="drop-zone-hint">{tFunc('drop_hint', lang)}</div>
                                            </div>
                                            <input
                                                ref={fileInputRef}
                                                type="file"
                                                className="file-input"
                                                onChange={(e) => handleFileUpload(e.target.files?.[0])}
                                            />
                                            {uploadFile && (
                                                <div className="file-preview">
                                                    <div className="file-preview-name">📄 {uploadFile.name}</div>
                                                    <div className="file-preview-size">
                                                        {tFunc('file_size', lang)}: {(uploadFile.size / 1024).toFixed(2)} KB
                                                    </div>
                                                </div>
                                            )}
                                            <button
                                                className="login-button"
                                                onClick={() => setUploadStep(2)}
                                                style={{ marginTop: '24px', width: '100%' }}
                                                disabled={!uploadFile}
                                            >
                                                Next
                                            </button>
                                        </div>
                                    )}

                                    {uploadStep === 2 && (
                                        <div>
                                            <div className="form-row">
                                                <div className="form-group">
                                                    <label className="form-label">{tFunc('platform_name', lang)}</label>
                                                    <input
                                                        type="text"
                                                        className="form-input"
                                                        value={uploadData.name}
                                                        onChange={(e) => setUploadData({ ...uploadData, name: e.target.value })}
                                                    />
                                                </div>
                                                <div className="form-group">
                                                    <label className="form-label">{tFunc('section', lang)}</label>
                                                    <select
                                                        className="select"
                                                        value={uploadData.section}
                                                        onChange={(e) => setUploadData({ ...uploadData, section: e.target.value })}
                                                    >
                                                        <option value="tools">{tFunc('tools', lang)}</option>
                                                        <option value="analysis">{tFunc('analysis', lang)}</option>
                                                        <option value="strategy">{tFunc('strategy', lang)}</option>
                                                    </select>
                                                </div>
                                            </div>

                                            <div className="form-row full">
                                                <div className="form-group">
                                                    <label className="form-label">{tFunc('description', lang)}</label>
                                                    <textarea
                                                        className="textarea"
                                                        value={uploadData.description}
                                                        onChange={(e) => setUploadData({ ...uploadData, description: e.target.value })}
                                                    />
                                                </div>
                                            </div>

                                            <div className="form-row full">
                                                <div className="form-group">
                                                    <label className="form-label">{tFunc('url', lang)}</label>
                                                    <input
                                                        type="url"
                                                        className="form-input"
                                                        value={uploadData.url}
                                                        onChange={(e) => setUploadData({ ...uploadData, url: e.target.value })}
                                                    />
                                                </div>
                                            </div>

                                            <div className="form-row full">
                                                <div className="form-group">
                                                    <label className="form-label">{tFunc('access_roles', lang)}</label>
                                                    <div className="checkbox-group">
                                                        {['bellboy', 'concierge', 'guest'].map(role => (
                                                            <div key={role} className="checkbox-item">
                                                                <input
                                                                    type="checkbox"
                                                                    id={`role-${role}`}
                                                                    checked={uploadData.accessRoles.includes(role)}
                                                                    onChange={(e) => {
                                                                        if (e.target.checked) {
                                                                            setUploadData({
                                                                                ...uploadData,
                                                                                accessRoles: [...uploadData.accessRoles, role]
                                                                            });
                                                                        } else {
                                                                            setUploadData({
                                                                                ...uploadData,
                                                                                accessRoles: uploadData.accessRoles.filter(r => r !== role)
                                                                            });
                                                                        }
                                                                    }}
                                                                />
                                                                <label htmlFor={`role-${role}`}>
                                                                    {tFunc(`user_role_${role}`, lang)}
                                                                </label>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>

                                            <div style={{ display: 'flex', gap: '12px', marginTop: '24px' }}>
                                                <button
                                                    className="login-button"
                                                    onClick={() => setUploadStep(1)}
                                                    style={{ flex: 1, background: 'transparent', color: 'var(--gold)', border: '1px solid var(--gold)' }}
                                                >
                                                    Back
                                                </button>
                                                <button
                                                    className="login-button"
                                                    onClick={() => setUploadStep(3)}
                                                    style={{ flex: 1 }}
                                                >
                                                    Preview
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {uploadStep === 3 && (
                                        <div>
                                            <div className="preview-card">
                                                <div className="preview-row">
                                                    <div className="preview-label">{tFunc('platform_name', lang)}</div>
                                                    <div className="preview-value">{uploadData.name}</div>
                                                </div>
                                                <div className="preview-row">
                                                    <div className="preview-label">{tFunc('section', lang)}</div>
                                                    <div className="preview-value">{uploadData.section}</div>
                                                </div>
                                                <div className="preview-row">
                                                    <div className="preview-label">{tFunc('description', lang)}</div>
                                                    <div className="preview-value">{uploadData.description}</div>
                                                </div>
                                                <div className="preview-row">
                                                    <div className="preview-label">{tFunc('url', lang)}</div>
                                                    <div className="preview-value">{uploadData.url}</div>
                                                </div>
                                                <div className="preview-row">
                                                    <div className="preview-label">{tFunc('access_roles', lang)}</div>
                                                    <div className="preview-value">
                                                        {uploadData.accessRoles.map(r => tFunc(`user_role_${r}`, lang)).join(', ')}
                                                    </div>
                                                </div>
                                                <div className="preview-row">
                                                    <div className="preview-label">{tFunc('file_name', lang)}</div>
                                                    <div className="preview-value">{uploadFile?.name}</div>
                                                </div>
                                                <div className="preview-row">
                                                    <div className="preview-label">{tFunc('file_size', lang)}</div>
                                                    <div className="preview-value">{(uploadFile?.size || 0) / 1024} KB</div>
                                                </div>
                                            </div>

                                            <div style={{ display: 'flex', gap: '12px' }}>
                                                <button
                                                    className="login-button"
                                                    onClick={() => setUploadStep(2)}
                                                    style={{ flex: 1, background: 'transparent', color: 'var(--gold)', border: '1px solid var(--gold)' }}
                                                >
                                                    Back
                                                </button>
                                                <button
                                                    className="login-button"
                                                    onClick={handlePublish}
                                                    style={{ flex: 1 }}
                                                >
                                                    {tFunc('publish', lang)}
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'users' && (
                                <div>
                                    <table className="data-table">
                                        <thead>
                                            <tr>
                                                <th>Avatar</th>
                                                <th>{tFunc('user_name', lang)}</th>
                                                <th>{tFunc('user_email', lang)}</th>
                                                <th>{tFunc('user_role', lang)}</th>
                                                {currentUser.role === 'bellboy' && <th>Action</th>}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {users.map(user => (
                                                <tr key={user.id}>
                                                    <td><div className="user-avatar">{user.avatar}</div></td>
                                                    <td>{user.name}</td>
                                                    <td>{user.email}</td>
                                                    <td>{tFunc(`user_role_${user.role}`, lang)}</td>
                                                    {currentUser.role === 'bellboy' && (
                                                        <td>
                                                            <button
                                                                className="delete-button"
                                                                onClick={() => handleDeleteUser(user.id, user.name)}
                                                                title="Delete"
                                                            >
                                                                🗑️
                                                            </button>
                                                        </td>
                                                    )}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>

                                    <div className="add-user-section">

                                                type="text"
                                                className="form-input"
                                                placeholder={tFunc('user_name', lang)}
                                                value={newUser.name}
                                                onChange={(e) => setNewUser({ ...newUser, name: e.target.value })}
                                            />
                                            <input
                                                type="email"
                                                className="form-input"
                                                placeholder={tFunc('user_email', lang)}
                                                value={newUser.email}
                                                onChange={(e) => setNewUser({ ...newUser, email: e.target.value })}
                                            />
                                            <select
                                                className="select"
                                                value={newUser.role}
                                                onChange={(e) => setNewUser({ ...newUser, role: e.target.value })}
                                            >
                                                <option value="bellboy">{tFunc('user_role_bellboy', lang)}</option>
                                                <option value="concierge">{tFunc('user_role_concierge', lang)}</option>
                                                <option value="guest">{tFunc('user_role_guest', lang)}</option>
                                            </select>
                                            <button className="action-button" onClick={handleAddUser}>
                                                {tFunc('add', lang)}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'scores' && (
                                <div>
                                    <table className="data-table">
                                        <thead>
                                            <tr>
                                                <th>{tFunc('platform', lang)}</th>
                                                <th>{tFunc('section', lang)}</th>
                                                <th>{tFunc('raw_score', lang)}</th>
                                                <th>{tFunc('normalized_score', lang)}</th>
                                                <th>{tFunc('uploaded_by', lang)}</th>
                                                {currentUser.role === 'bellboy' && <th>Action</th>}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {platforms.map(platform => (
                                                <tr key={platform.id}>
                                                    <td>{platform.name}</td>
                                                    <td>{platform.section}</td>
                                                    <td className="score-cell">{platform.rawScore || 0}</td>
                                                    <td className="score-cell">{platform.score || 0}</td>
                                                    <td>{platform.uploadedBy}</td>
                                                    {currentUser.role === 'bellboy' && (
                                                        <td>
                                                            <button
                                                                className="delete-button"
                                                                onClick={() => handleDeletePlatform(platform.id)}
                                                                title="Delete"

                                                                🗑️
                                                            </button>
                                                        </td>

                                    </table>
                                </div>

                            {activeTab === 'discrepancies' && (
                                <div>

                                        <div style={{ textAlign: 'center', padding: '40px 20px', color: 'var(--rose)' }}>
                                            <div style={{ fontSize: '48px', marginBottom: '20px' }}>✅</div>
                                            <div>All scores are consistent. No discrepancies detected.</div>
                                        </div>
                                    ) : (
                                        detectDiscrepancies().map((disc, idx) => (
                                            <div key={idx} style={{
                                                background: 'rgba(212, 168, 67, 0.1)',
                                                border: '1px solid rgba(212, 168, 67, 0.3)',
                                                borderRadius: '8px',
                                                padding: '16px',
                                                marginBottom: '16px'
                                            }}>
                                                <div style={{ color: 'var(--gold)', fontWeight: 600, marginBottom: '8px' }}>
                                                    ⚠️ {tFunc('discrepancy_title', lang)}

                                                </div>
                                                <div style={{ color: 'var(--rose)', fontSize: '12px' }}>
                                                    {tFunc('discrepancy_msg', lang)}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    {toast && <Toast message={toast} lang={lang} />}
                    {confirmDialog && (
                        <ConfirmDialog
                            title={confirmDialog.title}
                            message={confirmDialog.message}
                            onConfirm={confirmDialog.onConfirm}
                            onCancel={() => setConfirmDialog(null)}
                            lang={lang}
                        />
                    )}
                </div>
            );
        }

        function App() {
            const [lang, setLang] = useState(() => localStorage.getItem('ailobby_lang') || 'en');
            const [currentUser, setCurrentUser] = useState(null);
            const [platforms, setPlatforms] = useState([]);
            const [users, setUsers] = useState(initialUsers);
            const [showBackOffice, setShowBackOffice] = useState(false);
            const [firebaseReady, setFirebaseReady] = useState(window.firebaseReady || false);

            useEffect(() => {
                localStorage.setItem('ailobby_lang', lang);
            }, [lang]);

            useEffect(() => {
                if (!window.db) {
                    setTimeout(() => setFirebaseReady(true), 1000);
                    return;
                }

                try {
                    const platformsRef = window.db.ref('platforms');
                    platformsRef.on('value', (snapshot) => {
                        const data = snapshot.val();
                        setPlatforms(data ? calcScores(Object.values(data)) : []);
                        setFirebaseReady(true);
                    });

                    const usersRef = window.db.ref('users');
                    usersRef.on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            const fbUsers = Object.values(data);
                            const merged = [...initialUsers];
                            fbUsers.forEach(u => {
                                if (!merged.find(m => m.email === u.email)) merged.push(u);
                            });
                            setUsers(merged);
                        }
                    });

                    return () => {
                        platformsRef.off();
                        usersRef.off();
                    };
                } catch (error) {
                    console.error('Firebase error:', error);
                    setFirebaseReady(true);
                }
            }, []);

            const handleLogout = () => {
                setCurrentUser(null);
                setShowBackOffice(false);
                localStorage.removeItem('ailobby_lang');
                window.location.reload();
            };

            if (!firebaseReady) {
                return (
                    <div className="loading-container">
                        <div className="loading-bell">🔔</div>
                        <div className="loading-text">Loading AI Lobby...</div>
                    </div>
                );
            }

            if (!currentUser) {
                return (
                    <LoginScreen
                        onLogin={setCurrentUser}
                        t={t}
                        lang={lang}
                        setLang={setLang}
                        users={users}
                    />
                );
            }

            if (showBackOffice && accessMatrix[currentUser.role].config) {
                return (
                    <BackOffice
                        currentUser={currentUser}
                        platforms={platforms}
                        users={users}
                        lang={lang}
                        setLang={setLang}
                        onBack={() => setShowBackOffice(false)}
                        onLogout={handleLogout}
                        t={t}
                    />
                );
            }

            return (
                <Lobby
                    currentUser={currentUser}
                    platforms={platforms}
                    lang={lang}
                    setLang={setLang}
                    onLogout={handleLogout}
                    onBackOffice={() => setShowBackOffice(true)}
                    t={t}
                    users={users}
                />
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
