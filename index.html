<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI LOBBY - The Grand Platform Hotel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a0a0a 0%,#2d1117 50%,#1a0a0a 100%);color:#f5e6c8;min-height:100vh}
h1,h2,h3,h4{font-family:'Playfair Display',serif;color:#d4a853}
.gold{color:#d4a853}
button{cursor:pointer;border:none;font-family:inherit;transition:all .2s}
input,select,textarea{font-family:inherit;background:rgba(139,69,19,0.2);border:1px solid rgba(212,168,83,0.3);color:#f5e6c8;padding:10px 14px;border-radius:8px;width:100%;font-size:.95rem;transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#d4a853}
input::placeholder,textarea::placeholder{color:#8b6f47}
select option{background:#2d1117;color:#f5e6c8}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px}
.loading-screen h1{font-size:2.5rem}
.bell{font-size:3rem;animation:swing 1s ease-in-out infinite}
@keyframes swing{0%,100%{transform:rotate(0)}25%{transform:rotate(15deg)}75%{transform:rotate(-15deg)}}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh}
.login-card{background:rgba(0,0,0,0.5);border:2px solid rgba(212,168,83,0.4);border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;width:90%}
.login-card h1{font-size:2.2rem;margin-bottom:6px}
.login-card p{color:#c4a265;margin-bottom:28px;font-style:italic}
.login-card input{margin-bottom:16px;text-align:center;font-size:1rem}
.login-card .error{color:#ff6b6b;font-size:.85rem;margin-bottom:12px}
.btn-gold{background:linear-gradient(135deg,#d4a853,#b8860b);color:#1a0a0a;padding:12px 28px;border-radius:8px;font-weight:700;font-size:1rem;width:100%}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(212,168,83,0.4)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(212,168,83,0.2)}
.topbar h2{font-size:1.3rem}
.topbar-right{display:flex;align-items:center;gap:12px}
.avatar-circle{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#d4a853,#b8860b);display:flex;align-items:center;justify-content:center;font-weight:700;color:#1a0a0a;font-size:.8rem}
.btn-sm{padding:6px 14px;border-radius:6px;font-size:.8rem;font-weight:600}
.btn-outline{background:transparent;border:1px solid rgba(212,168,83,0.5);color:#d4a853}
.btn-outline:hover{background:rgba(212,168,83,0.15)}
.btn-danger-sm{background:rgba(220,53,69,0.8);color:#fff;padding:6px 14px;border-radius:6px;font-size:.8rem}
.btn-danger-sm:hover{background:rgba(220,53,69,1)}

/* PIPELINE LOBBY */
.lobby{display:flex;flex-direction:column;height:calc(100vh - 60px)}
.pipeline{display:flex;flex:1;gap:0;overflow:hidden}
.pipeline-col{flex:1;display:flex;flex-direction:column;border-right:1px solid rgba(212,168,83,0.15)}
.pipeline-col:last-child{border-right:none}
.col-header{padding:16px 20px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(212,168,83,0.2);text-align:center;position:sticky;top:0}
.col-header h3{font-size:1.1rem;margin-bottom:2px}
.col-count{font-size:.75rem;color:#c4a265}
.col-scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.col-scroll::-webkit-scrollbar{width:6px}
.col-scroll::-webkit-scrollbar-thumb{background:rgba(212,168,83,0.3);border-radius:3px}
.col-scroll::-webkit-scrollbar-track{background:transparent}

/* Platform card in pipeline */
.plat-card{background:rgba(139,69,19,0.15);border:1px solid rgba(212,168,83,0.2);border-radius:10px;overflow:hidden;transition:all .2s;cursor:pointer}
.plat-card:hover{border-color:#d4a853;transform:translateY(-2px);box-shadow:0 4px 20px rgba(212,168,83,0.15)}
.plat-card-img{width:100%;height:100px;object-fit:cover;opacity:.8}
.plat-card-body{padding:10px 12px}
.plat-card-body h4{font-size:.95rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plat-card-meta{font-size:.75rem;color:#c4a265;display:flex;justify-content:space-between;align-items:center}
.plat-card-url{display:block;font-size:.7rem;color:#d4a853;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none}
.plat-card-url:hover{text-decoration:underline}
.plat-card-desc{font-size:.78rem;color:#ddd;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.access-badge{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600}
.access-full{background:rgba(40,167,69,0.25);color:#5cb85c}
.access-view{background:rgba(255,193,7,0.25);color:#ffc107}
.access-use{background:rgba(23,162,184,0.25);color:#17a2b8}
.access-no{background:rgba(220,53,69,0.25);color:#dc3545}

/* Empty column */
.empty-col{text-align:center;color:#8b6f47;padding:40px 16px;font-style:italic}

/* Room detail overlay */
.room-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.room-detail{background:linear-gradient(135deg,#1a0a0a,#2d1117);border:2px solid rgba(212,168,83,0.4);border-radius:16px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:28px}
.room-detail h2{margin-bottom:12px}
.room-detail img{width:100%;height:180px;object-fit:cover;border-radius:10px;margin-bottom:16px}
.room-detail p{margin-bottom:10px;line-height:1.5}
.room-link{display:inline-block;color:#d4a853;text-decoration:none;font-size:.9rem;word-break:break-all}
.room-link:hover{text-decoration:underline}
.room-close{position:absolute;top:16px;right:20px;font-size:1.5rem;color:#d4a853;cursor:pointer;background:none;border:none}

/* BACK OFFICE */
.backoffice{display:flex;height:calc(100vh - 60px)}
.bo-sidebar{width:220px;background:rgba(0,0,0,0.4);border-right:1px solid rgba(212,168,83,0.15);display:flex;flex-direction:column;padding:20px 12px;gap:6px}
.bo-sidebar h3{font-size:1.1rem;margin-bottom:12px;padding-left:8px}
.bo-nav-btn{background:transparent;color:#c4a265;padding:10px 14px;border-radius:8px;text-align:left;font-size:.9rem;width:100%;transition:all .2s}
.bo-nav-btn:hover{background:rgba(212,168,83,0.1)}
.bo-nav-btn.active{background:linear-gradient(135deg,rgba(212,168,83,0.2),rgba(184,134,11,0.15));color:#d4a853;font-weight:600}
.bo-sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:8px}
.btn-back{background:transparent;border:1px solid rgba(212,168,83,0.4);color:#d4a853;padding:10px;border-radius:8px;font-size:.85rem;width:100%}
.btn-back:hover{background:rgba(212,168,83,0.1)}
.btn-logout{background:rgba(220,53,69,0.7);color:#fff;padding:10px;border-radius:8px;font-size:.85rem;width:100%}
.btn-logout:hover{background:rgba(220,53,69,0.9)}
.bo-main{flex:1;overflow-y:auto;padding:24px 28px}

/* Upload section */
.upload-section{display:flex;gap:20px;margin-bottom:24px}
.upload-box{flex:1;background:rgba(0,0,0,0.3);border:2px dashed rgba(212,168,83,0.4);border-radius:12px;padding:24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;transition:all .2s}
.upload-box:hover{border-color:#d4a853}
.upload-box.drag-over{border-color:#ffd700;background:rgba(212,168,83,0.1)}
.upload-box h4{margin-bottom:8px}
.upload-box .icon{font-size:2.2rem;margin-bottom:8px}
.upload-box .hint{font-size:.8rem;color:#8b6f47}
.file-info{font-size:.8rem;color:#5cb85c;margin-top:8px}
.link-box{flex:1;background:rgba(0,0,0,0.3);border:2px solid rgba(212,168,83,0.4);border-radius:12px;padding:24px;display:flex;flex-direction:column;justify-content:center;min-height:180px}
.link-box h4{margin-bottom:12px;text-align:center}
.link-box .icon{font-size:2.2rem;margin-bottom:8px;text-align:center;display:block}
.link-box input{margin-top:8px;font-size:1rem;border-color:rgba(212,168,83,0.5)}
.link-box input:focus{border-color:#ffd700;box-shadow:0 0 8px rgba(212,168,83,0.3)}

/* Upload details form */
.upload-form{background:rgba(0,0,0,0.2);border:1px solid rgba(212,168,83,0.15);border-radius:12px;padding:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:#d4a853;font-size:.9rem;font-weight:600}
.form-row{display:flex;gap:16px}
.form-row .form-group{flex:1}
textarea{resize:vertical;min-height:80px}
.roles-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.role-chip{padding:6px 14px;border-radius:20px;font-size:.8rem;border:1px solid rgba(212,168,83,0.3);background:transparent;color:#c4a265;cursor:pointer;transition:all .2s}
.role-chip.sel{background:rgba(212,168,83,0.25);border-color:#d4a853;color:#d4a853}
.publish-preview{background:rgba(0,0,0,0.2);border:1px solid rgba(212,168,83,0.2);border-radius:12px;padding:20px;margin-bottom:16px}
.publish-preview h4{margin-bottom:10px}
.publish-preview p{font-size:.9rem;margin-bottom:6px}

/* Guest registry table */
.registry-table{width:100%;border-collapse:collapse;margin-top:16px}
.registry-table th{text-align:left;padding:10px 12px;border-bottom:2px solid rgba(212,168,83,0.3);color:#d4a853;font-size:.85rem}
.registry-table td{padding:10px 12px;border-bottom:1px solid rgba(212,168,83,0.1);font-size:.9rem}
.registry-table tr:hover{background:rgba(212,168,83,0.05)}
.add-user-form{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.add-user-form input,.add-user-form select{flex:1;min-width:150px}
.badge-role{padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
.badge-bellboy{background:rgba(212,168,83,0.25);color:#d4a853}
.badge-concierge{background:rgba(23,162,184,0.25);color:#17a2b8}
.badge-guest{background:rgba(108,117,125,0.25);color:#adb5bd}

/* Scores table */
.score-table{width:100%;border-collapse:collapse;margin-top:16px}
.score-table th{text-align:left;padding:10px 12px;border-bottom:2px solid rgba(212,168,83,0.3);color:#d4a853;font-size:.85rem}
.score-table td{padding:10px 12px;border-bottom:1px solid rgba(212,168,83,0.1);font-size:.9rem}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:rgba(0,0,0,0.85);border:1px solid rgba(212,168,83,0.5);color:#f5e6c8;padding:14px 24px;border-radius:10px;z-index:200;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Confirm dialog */
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:150}
.confirm-box{background:linear-gradient(135deg,#1a0a0a,#2d1117);border:2px solid rgba(212,168,83,0.4);border-radius:14px;padding:28px;text-align:center;max-width:380px}
.confirm-box h3{margin-bottom:10px}
.confirm-box p{margin-bottom:20px;color:#c4a265}
.confirm-btns{display:flex;gap:12px;justify-content:center}

/* Celebration */
.celebration{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:200}
.celebration-inner{text-align:center;font-size:3rem;animation:popIn .5s ease}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* Responsive */
@media(max-width:768px){
  .pipeline{flex-direction:column}
  .pipeline-col{border-right:none;border-bottom:1px solid rgba(212,168,83,0.15)}
  .col-scroll{max-height:300px}
  .backoffice{flex-direction:column}
  .bo-sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:12px;gap:6px}
  .bo-sidebar h3{width:100%}
  .bo-sidebar-bottom{flex-direction:row;margin-top:8px;width:100%}
  .upload-section{flex-direction:column}
}
</style>

function App(){
  var[lang,setLang]=useState("es");
  var[user,setUser]=useState(null);
  var[view,setView]=useState("lobby");
  var[platforms,setPlatforms]=useState([]);
  var[users,setUsers]=useState(initialUsers.slice());
  var[ready,setReady]=useState(false);
  var[toast,setToast]=useState(null);
  var L=(lang==="es")?"es":"en";

  function showToast(msg){setToast(msg);setTimeout(function(){setToast(null)},3000)}
  function toggleLang(){var n=(lang==="es")?"en":"es";setLang(n);try{localStorage.setItem("ailobby_lang",n)}catch(e){}}

  useEffect(function(){
    try{var s=localStorage.getItem("ailobby_lang");if(s==="en"||s==="es")setLang(s)}catch(e){}
    if(!db){setReady(true);return}
    try{
      db.ref("platforms").on("value",function(snap){try{var d=snap.val();setPlatforms(d?calcScores(Object.values(d)):[]);setReady(true)}catch(e){console.error(e);setReady(true)}},function(){setReady(true)});
      db.ref("users").on("value",function(snap){try{var d=snap.val();if(d){var fb=Object.values(d),m=initialUsers.slice();for(var i=0;i<fb.length;i++){var ex=false;for(var j=0;j<m.length;j++){if(m[j].email===fb[i].email){ex=true;break}}if(!ex)m.push(fb[i])}setUsers(m)}}catch(e){console.error(e)}},function(e){console.error(e)});
    }catch(e){console.error(e);setReady(true)}
  },[]);

  function handleLogin(email){
    var found=null;
    for(var i=0;i<users.length;i++){if(users[i].email.toLowerCase()===email.toLowerCase()){found=users[i];break}}
    if(found){setUser(found);setView("lobby")}
    return found;
  }

  function addPlatform(p){
    var np=Object.assign({},p,{id:Date.now().toString(),date:new Date().toISOString().split("T")[0],uploadedBy:user?user.name:"Unknown"});
    var scored=calcScores([np])[0];
    var all=platforms.concat([scored]);
    setPlatforms(all);
    if(db){var o={};all.forEach(function(x){o[x.id]=x});try{db.ref("platforms").set(o)}catch(e){console.error(e)}}
    showToast(_t(L,"platformAdded")+" 🎉");
  }

  function removePlatform(id){
    var all=platforms.filter(function(p){return p.id!==id});
    setPlatforms(all);
    if(db){try{db.ref("platforms/"+id).remove()}catch(e){console.error(e)}}
  }

  function addUser(u){
    var nu=Object.assign({},u,{id:Date.now()});
    var all=users.concat([nu]);
    setUsers(all);
    if(db){try{db.ref("users/"+nu.id).set(nu)}catch(e){console.error(e)}}
    showToast(_t(L,"userAdded")+" 🔑");
  }

  function removeUser(id){
    setUsers(users.filter(function(u){return u.id!==id}));
    if(db){try{db.ref("users/"+id).remove()}catch(e){console.error(e)}}
    showToast(_t(L,"userRemoved"));
  }

  if(!ready)return(<div className="loading-screen"><h1 className="gold">AI LOBBY</h1><div className="bell">🔔</div><p>Loading...</p></div>);
  if(!user)return(<LoginScreen lang={L} onLogin={handleLogin} onToggleLang={toggleLang}/>);

  return(<>
    <TopBar lang={L} user={user} view={view} setView={setView} onLogout={function(){setUser(null);setView("lobby")}} onToggleLang={toggleLang}/>
    {view==="lobby"&&<Lobby lang={L} platforms={platforms} user={user} setView={setView}/>}
    {view==="backoffice"&&<BackOffice lang={L} user={user} users={users} platforms={platforms} onAddPlatform={addPlatform} onRemovePlatform={removePlatform} onAddUser={addUser} onRemoveUser={removeUser} setView={setView}/>}
    {toast&&<div className="toast">{toast}</div>}
  </>);
}

/* LOGIN */
function LoginScreen({lang,onLogin,onToggleLang}){
  var[email,setEmail]=useState("");
  var[err,setErr]=useState("");
  function submit(e){e.preventDefault();if(!email.trim())return;var r=onLogin(email.trim());if(!r)setErr(_t(lang,"loginErr"))}
  return(<div className="login-wrap">
    <div className="login-card">
      <div style={{position:"absolute",top:16,right:20}}><button className="btn-sm btn-outline" onClick={onToggleLang}>{_t(lang,"langBtn")}</button></div>
      <div style={{fontSize:"3rem",marginBottom:12}}>🏨</div>
      <h1>{_t(lang,"title")}</h1>
      <p>{_t(lang,"subtitle")}</p>
      <form onSubmit={submit}>
        <input value={email} onChange={function(e){setEmail(e.target.value);setErr("")}} placeholder={_t(lang,"emailPh")}/>
        {err&&<div className="error">{err}</div>}
        <button type="submit" className="btn-gold">{_t(lang,"login")} 🗝️</button>
      </form>
    </div>
  </div>);
}

/* TOP BAR */
function TopBar({lang,user,view,setView,onLogout,onToggleLang}){
  var access=AM[user.role]||AM.guest;
  return(<div className="topbar">
    <h2 className="gold">🏨 {_t(lang,"title")}</h2>
    <div className="topbar-right">
      {view==="lobby"&&access.config&&<button className="btn-sm btn-outline" onClick={function(){setView("backoffice")}}>{_t(lang,"backOffice")}</button>}
      {view==="backoffice"&&<button className="btn-sm btn-outline" onClick={function(){setView("lobby")}}>← {_t(lang,"backToLobby")}</button>}
      <button className="btn-sm btn-outline" onClick={onToggleLang}>{_t(lang,"langBtn")}</button>
      <div className="avatar-circle">{user.avatar}</div>
      <button className="btn-danger-sm" onClick={onLogout}>{_t(lang,"logout")}</button>
    </div>
  </div>);
}

/* LOBBY - 3 column pipeline */
function Lobby({lang,platforms,user}){
  var[selectedPlatform,setSelectedPlatform]=useState(null);
  var access=AM[user.role]||AM.guest;
  var sections=["tools","analysis","strategy"];
  var sectionNames={tools:_t(lang,"colTools")+" 🔧",analysis:_t(lang,"colAnalysis")+" 📊",strategy:_t(lang,"colStrategy")+" 🎯"};

  function getAccess(sec){
    var a=access[sec];
    if(a==="full")return{label:_t(lang,"accessFull"),cls:"access-full"};
    if(a==="view-only")return{label:_t(lang,"accessView"),cls:"access-view"};
    if(a==="use")return{label:_t(lang,"accessUse"),cls:"access-use"};
    return{label:_t(lang,"accessNo"),cls:"access-no"};
  }

  return(<div className="lobby">
    <div className="pipeline">
      {sections.map(function(sec){
        var items=platforms.filter(function(p){return p.section===sec});
        var imgs=HI[sec]||HI.tools;
        var acc=getAccess(sec);
        return(<div key={sec} className="pipeline-col">
          <div className="col-header">
            <h3>{sectionNames[sec]}</h3>
            <div className="col-count">{items.length} {items.length===1?"platform":"platforms"} · <span className={"access-badge "+acc.cls}>{acc.label}</span></div>
          </div>
          <div className="col-scroll">
            {items.length===0&&<div className="empty-col">{_t(lang,"emptyCol")}</div>}
            {items.map(function(p,idx){
              return(<div key={p.id} className="plat-card" onClick={function(){setSelectedPlatform(p)}}>
                <img className="plat-card-img" src={imgs[idx%imgs.length]} alt="" loading="lazy"/>
                <div className="plat-card-body">
                  <h4>{p.name}</h4>
                  {p.url&&<a className="plat-card-url" href={p.url} target="_blank" rel="noopener" onClick={function(e){e.stopPropagation()}}>🔗 {p.url}</a>}
                  {p.description&&<div className="plat-card-desc">{p.description}</div>}
                  <div className="plat-card-meta">
                    <span>{p.uploadedBy}</span>
                    <span>{p.date}</span>
                  </div>
                </div>
              </div>);
            })}
          </div>
        </div>);
      })}
    </div>

    {selectedPlatform&&<RoomDetail lang={lang} platform={selectedPlatform} user={user} onClose={function(){setSelectedPlatform(null)}}/>}
  </div>);
}

/* Room Detail Overlay */
function RoomDetail({lang,platform,user,onClose}){
  var p=platform;
  var imgs=HI[p.section]||HI.tools;
  return(<div className="room-overlay" onClick={onClose}>
    <div className="room-detail" onClick={function(e){e.stopPropagation()}}>
      <img src={imgs[0]} alt=""/>
      <h2 className="gold">{p.name}</h2>
      <p><strong>{_t(lang,"description")}:</strong> {p.description||"—"}</p>
      <p><strong>{_t(lang,"uploadedBy")}:</strong> {p.uploadedBy} · <strong>{_t(lang,"date")}:</strong> {p.date}</p>
      {p.url?<p><strong>🔗 {_t(lang,"platformLink")}:</strong> <a className="room-link" href={p.url} target="_blank" rel="noopener">{p.url}</a></p>:<p style={{color:"#8b6f47"}}>{_t(lang,"noLink")}</p>}
      {p.fileName&&<p>📎 <strong>{_t(lang,"fileAttached")}:</strong> {p.fileName}</p>}
      <div style={{marginTop:16,textAlign:"right"}}><button className="btn-gold" style={{width:"auto"}} onClick={onClose}>{_t(lang,"closeRoom")}</button></div>
    </div>
  </div>);
}

/* BACK OFFICE */
function BackOffice({lang,user,users,platforms,onAddPlatform,onRemovePlatform,onAddUser,onRemoveUser,setView}){
  var[tab,setTab]=useState("upload");
  var access=AM[user.role]||AM.guest;
  var tabs=[{id:"upload",label:_t(lang,"tabUpload")},{id:"registry",label:_t(lang,"tabRegistry")},{id:"scores",label:_t(lang,"tabScores")},{id:"disc",label:_t(lang,"tabDisc")}];

  return(<div className="backoffice">
    <div className="bo-sidebar">
      <h3 className="gold">{_t(lang,"backOffice")}</h3>
      {tabs.map(function(t){return <button key={t.id} className={"bo-nav-btn"+(tab===t.id?" active":"")} onClick={function(){setTab(t.id)}}>{t.label}</button>})}
      <div className="bo-sidebar-bottom">
        <button className="btn-back" onClick={function(){setView("lobby")}}>← {_t(lang,"backToLobby")}</button>
      </div>
    </div>
    <div className="bo-main">
      {tab==="upload"&&<UploadTab lang={lang} onAdd={onAddPlatform}/>}
      {tab==="registry"&&<RegistryTab lang={lang} users={users} onAdd={onAddUser} onRemove={onRemoveUser}/>}
      {tab==="scores"&&<ScoresTab lang={lang} platforms={platforms}/>}
      {tab==="disc"&&<DiscTab lang={lang} platforms={platforms}/>}
    </div>
  </div>);
}

/* UPLOAD TAB */
function UploadTab({lang,onAdd}){
  var[file,setFile]=useState(null);
  var[url,setUrl]=useState("");
  var[name,setName]=useState("");
  var[section,setSection]=useState("tools");
  var[desc,setDesc]=useState("");
  var[roles,setRoles]=useState(["bellboy","concierge","guest"]);
  var[dragOver,setDragOver]=useState(false);
  var[showCelebration,setShowCelebration]=useState(false);
  var[showForm,setShowForm]=useState(false);

  var hasContent=file||url.trim();
  var canPublish=hasContent&&name.trim();

  function handleDrop(e){e.preventDefault();setDragOver(false);if(e.dataTransfer.files&&e.dataTransfer.files[0])setFile(e.dataTransfer.files[0])}
  function handleFileInput(e){if(e.target.files&&e.target.files[0])setFile(e.target.files[0])}
  function toggleRole(r){if(roles.indexOf(r)>=0){setRoles(roles.filter(function(x){return x!==r}))}else{setRoles(roles.concat([r]))}}

  function publish(){
    if(!canPublish)return;
    onAdd({name:name,section:section,description:desc,url:url.trim(),fileName:file?file.name:"",fileSize:file?file.size:0,roles:roles});
    setShowCelebration(true);
    setTimeout(function(){
      setShowCelebration(false);
      setFile(null);setUrl("");setName("");setDesc("");setSection("tools");setRoles(["bellboy","concierge","guest"]);setShowForm(false);
    },2500);
  }

  return(<div>
    <h2 className="gold" style={{marginBottom:20}}>📦 {_t(lang,"tabUpload")}</h2>

    {/* Two boxes side by side: drag file | paste link */}
    <div className="upload-section">
      <div className={"upload-box"+(dragOver?" drag-over":"")} onDragOver={function(e){e.preventDefault();setDragOver(true)}} onDragLeave={function(){setDragOver(false)}} onDrop={handleDrop}>
        <input type="file" id="file-up" onChange={handleFileInput} style={{display:"none"}}/>
        <label htmlFor="file-up" style={{cursor:"pointer",textAlign:"center"}}>
          <div className="icon">📁</div>
          <h4 className="gold">{_t(lang,"dragTitle")}</h4>
          <div className="hint">{_t(lang,"dragText")}</div>
          <div className="hint">{_t(lang,"dragSub")}</div>
        </label>
        {file&&<div className="file-info">✓ {file.name}</div>}
      </div>

      <div className="link-box">
        <span className="icon">🔗</span>
        <h4 className="gold">{_t(lang,"linkTitle")}</h4>
        <input type="url" value={url} onChange={function(e){setUrl(e.target.value)}} placeholder={_t(lang,"linkPh")}/>
        {url.trim()&&<div className="file-info" style={{marginTop:8}}>✓ Link added</div>}
      </div>
    </div>

    {/* Show form button or form */}
    {hasContent&&!showForm&&<div style={{textAlign:"center",marginBottom:20}}><button className="btn-gold" style={{width:"auto",padding:"12px 40px"}} onClick={function(){setShowForm(true)}}>→ {lang==="es"?"Continuar con los detalles":"Continue with details"}</button></div>}

    {showForm&&<div className="upload-form">
      <div className="form-row">
        <div className="form-group">
          <label>{_t(lang,"nameLabel")}</label>
          <input value={name} onChange={function(e){setName(e.target.value)}} placeholder={_t(lang,"namePh")}/>
        </div>
        <div className="form-group">
          <label>{_t(lang,"sectionLabel")}</label>
          <select value={section} onChange={function(e){setSection(e.target.value)}}>
            <option value="tools">🔧 {_t(lang,"secTools")}</option>
            <option value="analysis">📊 {_t(lang,"secAnalysis")}</option>
            <option value="strategy">🎯 {_t(lang,"secStrategy")}</option>
          </select>
        </div>
      </div>
      <div className="form-group">
        <label>{_t(lang,"descLabel")}</label>
        <textarea value={desc} onChange={function(e){setDesc(e.target.value)}} placeholder={_t(lang,"descPh")}/>
      </div>
      <div className="form-group">
        <label>{_t(lang,"rolesLabel")}</label>
        <div className="roles-grid">
          {["bellboy","concierge","guest"].map(function(r){return <button key={r} className={"role-chip"+(roles.indexOf(r)>=0?" sel":"")} onClick={function(){toggleRole(r)}}>{r==="bellboy"?"🔑 Bellboy":r==="concierge"?"🛎️ Concierge":"👤 Guest"}</button>})}
        </div>
      </div>

      {/* Preview */}
      <div className="publish-preview">
        <h4 className="gold">{lang==="es"?"Vista previa":"Preview"}</h4>
        <p><strong>{_t(lang,"nameLabel")}:</strong> {name||"—"}</p>
        <p><strong>{_t(lang,"sectionLabel")}:</strong> {section}</p>
        {desc&&<p><strong>{_t(lang,"descLabel")}:</strong> {desc}</p>}
        {url.trim()&&<p><strong>🔗 Link:</strong> {url}</p>}
        {file&&<p><strong>📁 {_t(lang,"fileAttached")}:</strong> {file.name}</p>}
      </div>

      <button className="btn-gold" disabled={!canPublish} onClick={publish} style={{fontSize:"1.1rem",padding:"14px"}}>🥂 {_t(lang,"publish")}</button>
    </div>}

    {showCelebration&&<div className="celebration"><div className="celebration-inner">🥂🎉<br/><span style={{fontSize:"1.5rem",color:"#d4a853"}}>{_t(lang,"platformAdded")}</span></div></div>}
  </div>);
}

/* REGISTRY TAB */
function RegistryTab({lang,users,onAdd,onRemove}){
  var[ne,setNe]=useState("");
  var[nn,setNn]=useState("");
  var[nr,setNr]=useState("concierge");
  var[confirm,setConfirm]=useState(null);

  function handleAdd(){
    if(!ne.trim()||!nn.trim())return;
    var avatar=nn.trim().split(" ").map(function(w){return w[0]}).join("").toUpperCase().slice(0,2);
    onAdd({name:nn.trim(),email:ne.trim(),role:nr,avatar:avatar});
    setNe("");setNn("");setNr("concierge");
  }

  return(<div>
    <h2 className="gold" style={{marginBottom:20}}>📋 {_t(lang,"tabRegistry")}</h2>
    <div className="add-user-form">
      <input value={nn} onChange={function(e){setNn(e.target.value)}} placeholder={_t(lang,"nameCol")}/>
      <input value={ne} onChange={function(e){setNe(e.target.value)}} placeholder={_t(lang,"emailCol")}/>
      <select value={nr} onChange={function(e){setNr(e.target.value)}}>
        <option value="bellboy">Bellboy</option>
        <option value="concierge">Concierge</option>
        <option value="guest">Guest</option>
      </select>
      <button className="btn-gold" style={{width:"auto",whiteSpace:"nowrap"}} onClick={handleAdd}>{_t(lang,"addUser")}</button>
    </div>
    <table className="registry-table">
      <thead><tr><th>{_t(lang,"nameCol")}</th><th>{_t(lang,"emailCol")}</th><th>{_t(lang,"roleCol")}</th><th>{_t(lang,"actionsCol")}</th></tr></thead>
      <tbody>
        {users.map(function(u){return(<tr key={u.id||u.email}>
          <td><span className="avatar-circle" style={{display:"inline-flex",width:28,height:28,fontSize:".7rem",marginRight:8,verticalAlign:"middle"}}>{u.avatar}</span>{u.name}</td>
          <td>{u.email}</td>
          <td><span className={"badge-role badge-"+u.role}>{u.role}</span></td>
          <td>{u.id>6?<button className="btn-danger-sm" onClick={function(){setConfirm(u.id)}}>{_t(lang,"removeBtn")}</button>:"—"}</td>
        </tr>)})}
      </tbody>
    </table>

    {confirm&&<div className="confirm-overlay">
      <div className="confirm-box">
        <h3 className="gold">{_t(lang,"confirmTitle")}</h3>
        <p>{_t(lang,"confirmMsg")}</p>
        <div className="confirm-btns">
          <button className="btn-gold" style={{width:"auto"}} onClick={function(){onRemove(confirm);setConfirm(null)}}>{_t(lang,"confirm")}</button>
          <button className="btn-sm btn-outline" onClick={function(){setConfirm(null)}}>{_t(lang,"cancel")}</button>
        </div>
      </div>
    </div>}
  </div>);
}

/* SCORES TAB */
function ScoresTab({lang,platforms}){
  return(<div>
    <h2 className="gold" style={{marginBottom:20}}>📊 {_t(lang,"tabScores")}</h2>
    {platforms.length===0?<p style={{color:"#8b6f47"}}>{_t(lang,"emptyCol")}</p>:
    <table className="score-table">
      <thead><tr><th>{_t(lang,"platformCol")}</th><th>{_t(lang,"sectionLabel")}</th><th>{_t(lang,"rawCol")}</th><th>{_t(lang,"scoreCol")}</th><th>{_t(lang,"byCol")}</th></tr></thead>
      <tbody>{platforms.map(function(p){var s=p.scores||{};return(<tr key={p.id}><td>{p.name}</td><td>{p.section}</td><td>{s.raw||"—"}</td><td style={{color:s.final>=80?"#5cb85c":s.final>=60?"#ffc107":"#dc3545",fontWeight:700}}>{s.final||"—"}</td><td>{s.by||"—"}</td></tr>)})}</tbody>
    </table>}
  </div>);
}

/* DISCREPANCIES TAB */
function DiscTab({lang,platforms}){
  var discs=platforms.filter(function(p){return p.scores&&Math.abs(p.scores.raw-p.scores.final)>15});
  return(<div>
    <h2 className="gold" style={{marginBottom:20}}>⚠️ {_t(lang,"tabDisc")}</h2>
    {discs.length===0?<p style={{color:"#5cb85c"}}>✨ {_t(lang,"noDisc")}</p>:
    <table className="score-table">
      <thead><tr><th>{_t(lang,"platformCol")}</th><th>{_t(lang,"rawCol")}</th><th>{_t(lang,"scoreCol")}</th><th>Gap</th><th>Status</th></tr></thead>
      <tbody>{discs.map(function(p){var s=p.scores;var gap=Math.abs(s.raw-s.final);return(<tr key={p.id}><td>{p.name}</td><td>{s.raw}</td><td>{s.final}</td><td style={{color:"#ff6b6b",fontWeight:700}}>{gap}</td><td>⚠️ {_t(lang,"discAlert")}</td></tr>)})}</tbody>
    </table>}
  </div>);
}

/* RENDER */
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
